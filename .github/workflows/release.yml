name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish to NuGet, e.g. v1.3.0"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to NuGet.org
    needs: release-please
    # Runs after a release-please release (push) or on a manual dispatch for an existing tag.
    if: >
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet restore AxisSys.slnx
      - run: dotnet build AxisSys.slnx -c Release --no-restore
      - run: dotnet pack AxisSys.slnx -c Release --no-build -o artifacts
      - name: NuGet push
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
