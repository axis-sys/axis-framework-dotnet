id: migrations-add-column-render
title: RenderAddColumn emits one portable ALTER TABLE ADD COLUMN through the shared column pipeline
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  RenderAddColumn(table, column) is the portable way to evolve an existing table with a new column inside a
  new migration version. It renders exactly one ALTER TABLE {table} ADD COLUMN statement, pushing the column
  line through the SAME RenderColumn pipeline RenderCreateTable uses — the dialect owns the type mapping, so
  callers never hand-write engine tokens (TIMESTAMPTZ vs DATETIME(6)). Idempotency is NOT in the statement;
  it comes from the migration ledger.
invariants:
  - RenderAddColumn returns exactly one "ALTER TABLE {table} ADD COLUMN {column};" statement per call.
  - The column line goes through the same RenderColumn pipeline as RenderCreateTable, so type, collation, NOT NULL, DEFAULT and CHECK tokens render identically in both statements.
  - The statement is deliberately NOT "IF NOT EXISTS" (MySQL has no such form for ADD COLUMN); idempotency comes from the migration ledger, which never re-applies a recorded version.
  - A column with PrimaryKey true throws ArgumentException — adding a primary key via ALTER TABLE is not portable; declare it in the CREATE TABLE.
  - A NOT NULL column without a DEFAULT fails on Postgres when the table has rows (MySQL backfills an implicit default) — give it a default or add it nullable.
  - The base implementation is virtual on AxisSqlDialectBase, so a dialect with divergent ALTER syntax can override it while inheriting the shared behavior by default.
