notes: >
  Like the runner, a misuse throws instead of returning an AxisResult: DDL renders during bootstrap, before
  the app's railway starts. The "render" half of the seam stays symmetric — declare the shape once, let the
  dialect spell it — whether the table is new (RenderCreateTable) or evolving (RenderAddColumn).
