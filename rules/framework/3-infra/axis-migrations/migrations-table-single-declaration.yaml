id: migrations-table-single-declaration
title: A table is declared once as a dialect-agnostic AxisTable and rendered per dialect
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisTable is the single, dialect-agnostic declaration of one table — its columns, primary key, indexes,
  foreign keys, table-level checks and an optional idempotent seed. It replaces hand-writing (and hand-syncing)
  one CREATE TABLE per database: the same definition yields correct Postgres or MySQL DDL by swapping the
  injected IAxisSqlDialect. Every fluent builder method mutates the instance and returns the same instance,
  and Render(dialect) delegates the whole rendering to the dialect.
invariants:
  - A table is declared once as an AxisTable and its columns, indexes, foreign keys, checks and seed are read-only projections of what the fluent builder recorded.
  - Every fluent builder method (Column, Index, Unique, PartialIndex, PartialUnique, ForeignKey, Check, WithSeed) returns the SAME AxisTable instance for chaining.
  - AxisTable.Render(dialect) delegates to dialect.RenderCreateTable(this); the table holds no dialect-specific SQL of its own.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisTable.cs:8 — sealed AxisTable(name), read-only Columns/Indexes/ForeignKeys/Checks/Seed"
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisTable.cs:84 — Render(dialect) => dialect.RenderCreateTable(this)"
examples:
