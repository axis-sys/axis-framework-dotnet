    - "src/3-Infra/AxisRepository/AxisRepository.UnitTests/AxisSqlDialectBaseTests.cs — CompositePrimaryKeyRendersAsSingleTableLevelConstraint"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres.IntegrationTests/PostgresSqlDialectRenderTests.cs — RendersCompositePrimaryKeyAsTableLevelConstraint"
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql.IntegrationTests/MySqlSqlDialectRenderTests.cs — RendersCompositePrimaryKeyAsTableLevelConstraint"
  incorrect: []
exceptions: []
