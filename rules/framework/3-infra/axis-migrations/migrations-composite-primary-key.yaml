id: migrations-composite-primary-key
title: A composite primary key is declared once at table level, not per column
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisTable.PrimaryKey(params string[] columns) declares a multi-column natural key (e.g. a provider link
  identified by (Provider, ExternalId)) as ONE table-level PRIMARY KEY (col1, col2, …) constraint, rendered
  identically by every dialect. It exists because AxisColumn's primaryKey: true flag is per-column: setting it
  on two columns of the same table renders two inline PRIMARY KEY clauses on the column lines, which Postgres
  rejects (42P16 multiple primary keys for table) and MySQL rejects likewise. PrimaryKey(...) is additive — it
  does not replace primaryKey: true, which remains the right tool for a single-column key (including a
  surrogate id).
invariants:
  - "AxisTable.PrimaryKey(params string[] columns) requires at least 2 columns; fewer than 2 throws ArgumentException — a single-column key uses the primaryKey: true flag on Column instead."
  - When AxisTable.PrimaryKeyColumns is set, RenderCreateTable emits exactly one "PRIMARY KEY (col1, col2, …)" table-level constraint line, positioned after the column lines and before indexes/foreign keys/checks.
  - The composite PRIMARY KEY constraint is rendered identically by every dialect (AxisSqlDialectBase renders it in the shared RenderCreateTable, not in a per-dialect override) — there is no Postgres/MySQL divergence to declare.
  - "Declaring both AxisTable.PrimaryKey(...) and a column with primaryKey: true on the same table throws InvalidOperationException at render time, naming the table and telling the caller to pick one."
  - "AxisColumn's per-column primaryKey: true flag is unchanged and still the correct choice for a single-column primary key (natural or surrogate); PrimaryKey(...) only covers the multi-column case."
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisTable.cs:50 — PrimaryKey(params string[] columns)"
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisSqlDialectBase.cs:58 — table-level PRIMARY KEY emission and the column-flag conflict guard"
examples:
