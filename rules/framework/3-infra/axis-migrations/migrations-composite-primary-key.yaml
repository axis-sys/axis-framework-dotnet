notes: >
  Before this rule, a client BC needing a natural composite key had to work around the gap with a single-column
  surrogate id (e.g. a generated Guid v7) plus Unique(name, colA, colB) to still enforce the natural key's
  uniqueness. That workaround still works and is not deprecated — PrimaryKey(...) is for when the composite
  key itself, not just its uniqueness, should be the table's identity.
