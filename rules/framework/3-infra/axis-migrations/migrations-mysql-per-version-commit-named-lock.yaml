id: migrations-mysql-per-version-commit-named-lock
title: MySQL records each version as it succeeds and serializes runners with a session named lock
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  MySQL DDL causes an implicit commit and cannot be rolled back, so the MySQL runner uses NO enclosing
  transaction: each version's script runs and the version is recorded in MIGRATIONS immediately afterwards, so a
  failure mid-batch leaves the already-applied versions recorded and a re-run resumes from the next pending one.
  Concurrent runners for the same schema are serialized with a session-scoped named lock — GET_LOCK(schema, 30s),
  which throws if it cannot be acquired in time, always released with RELEASE_LOCK in a finally.
invariants:
  - The MySQL runner uses no enclosing transaction and records each version in MIGRATIONS immediately after its script succeeds.
  - A failure mid-batch leaves applied versions recorded, so a re-run resumes from the next pending version.
  - Concurrent runners are serialized by a session named lock GET_LOCK(schema, 30s) that throws if not acquired and is released with RELEASE_LOCK in a finally.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql/MySqlMigrationRunner.cs:71 — no transaction, per-version script then INSERT VERSION"
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql/MySqlMigrationRunner.cs:62 — GET_LOCK(name, timeout), throws if not acquired"
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql/MySqlMigrationRunner.cs:90 — RELEASE_LOCK in the finally"
