id: migrations-postgres-rendering
title: The Postgres dialect renders native types, standalone indexes and offset-pinned timestamps
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  PostgresSqlDialect pins the Postgres side of every dialect token. Types map to BOOLEAN, JSONB, TIMESTAMPTZ,
  INT, TEXT, VARCHAR(n) and NUMERIC(p,s); NowUtc is NOW() and boolean literals are TRUE/FALSE; an IsTrue check
  renders the bare column; no COLLATE is emitted (Postgres is case- and accent-sensitive by default); a seed
  no-op is ON CONFLICT (...) DO NOTHING. Indexes are emitted as standalone CREATE [UNIQUE] INDEX IF NOT EXISTS
  statements AFTER the table, with a real WHERE {predicate} for partial indexes; timestamp literals pin the
  offset (TIMESTAMPTZ '...+00') so they are UTC regardless of the session TimeZone.
invariants:
  - Types render as BOOLEAN, JSONB, TIMESTAMPTZ, NUMERIC(p,s), INT, TEXT and VARCHAR(n); NowUtc renders NOW() and booleans TRUE/FALSE.
  - No COLLATE clause is emitted and a seed conflict renders ON CONFLICT (...) DO NOTHING.
  - Indexes render as standalone CREATE [UNIQUE] INDEX IF NOT EXISTS after the table, with WHERE {predicate} for partials.
  - Timestamp literals pin the UTC offset as TIMESTAMPTZ '...+00'.
