id: migrations-column-line-order
title: A column line orders type, collation, key, default then check with primary key winning
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  RenderColumn emits a column line in a fixed token order — name, type immediately followed by collation, then
  the key/nullability keyword, then DEFAULT, then CHECK. PRIMARY KEY and NOT NULL are mutually exclusive on the
  line: a primary-key column emits PRIMARY KEY and never also NOT NULL, so the guard is expressed once. A
  nullable column with no default emits just its name and type.
invariants:
  - A column line is rendered in the order name, type+collation, PRIMARY KEY or NOT NULL, DEFAULT, CHECK.
  - PRIMARY KEY wins over NOT NULL on the same column — a primary-key column never also emits NOT NULL.
  - A nullable column with no default, key or check emits only its name and type.
