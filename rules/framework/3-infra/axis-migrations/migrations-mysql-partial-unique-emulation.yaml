id: migrations-mysql-partial-unique-emulation
title: MySQL emulates a partial UNIQUE with a STORED generated key column
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  MySQL has no filtered (partial) index, so PartialUnique is emulated: the dialect adds a STORED generated
  column that holds the last indexed column ONLY while the predicate holds and is NULL otherwise, then builds a
  UNIQUE KEY over the leading columns plus that generated column. Because MySQL ignores NULLs in a unique key,
  rows outside the predicate never collide — exactly the Postgres WHERE {predicate} semantics. A single-column
  partial unique keys on the generated column alone. This is why a partial UNIQUE cannot insert into the
  generated column: it is computed, so callers must name the real columns explicitly.
invariants:
  - A partial UNIQUE renders a STORED generated column computed as CASE WHEN {predicate} THEN {lastColumn} END, NULL outside the predicate.
  - The UNIQUE KEY spans the leading indexed columns plus the generated column (or the generated column alone when there is one indexed column).
  - Rows outside the predicate produce a NULL key and never collide, matching Postgres partial-unique semantics.
