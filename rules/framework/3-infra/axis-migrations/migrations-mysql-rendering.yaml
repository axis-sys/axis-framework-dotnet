id: migrations-mysql-rendering
title: The MySQL dialect renders native types, inline indexes and offset-free UTC timestamps
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  MySqlSqlDialect pins the MySQL side of every dialect token. Types map to TINYINT(1), JSON, DATETIME(6), INT,
  TEXT, VARCHAR(n) and DECIMAL(p,s); NowUtc is (UTC_TIMESTAMP(6)) and boolean literals are 1/0; an IsTrue check
  renders col = 1; a pinned collation emits COLLATE utf8mb4_0900_as_cs / as_ci; a seed no-op is ON DUPLICATE
  KEY UPDATE col = col. Indexes are emitted INLINE inside the CREATE TABLE (INDEX / UNIQUE KEY), a partial
  non-unique index drops its predicate to a plain index, and timestamp literals carry the UTC wall-clock
  WITHOUT an offset (the column defaults to UTC_TIMESTAMP(6) and the connection is UTC).
invariants:
  - Types render as TINYINT(1), JSON, DATETIME(6), DECIMAL(p,s), INT, TEXT and VARCHAR(n); NowUtc renders (UTC_TIMESTAMP(6)) and booleans 1/0.
  - A pinned collation emits COLLATE utf8mb4_0900_as_cs or as_ci and a seed conflict renders ON DUPLICATE KEY UPDATE col = col.
  - Indexes render inline in the CREATE TABLE (INDEX / UNIQUE KEY); a partial non-unique index drops its predicate to a plain index.
  - Timestamp literals carry the UTC wall-clock without an offset.
