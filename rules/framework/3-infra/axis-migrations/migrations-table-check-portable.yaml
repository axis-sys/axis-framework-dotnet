id: migrations-table-check-portable
title: A table-level CHECK carries a raw portable expression rendered identically everywhere
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisTableCheck models a table-level CHECK constraint as a name plus a raw boolean Expression (e.g. a
  cross-column XOR). Because the expression is emitted verbatim, every dialect renders it identically as
  CONSTRAINT {Name} CHECK ({Expression}) — which makes the expression the caller's contract: it MUST use SQL
  that is valid on every target engine, since nothing translates it.
invariants:
  - A table-level CHECK is an AxisTableCheck of a name and a raw boolean Expression, added via AxisTable.Check(name, expression).
  - Every dialect renders it identically as CONSTRAINT {Name} CHECK ({Expression}) with the expression passed through unchanged.
  - The Expression must be portable SQL because no dialect rewrites it.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisTableCheck.cs:8 — AxisTableCheck(Name, Expression), portable raw SQL"
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisSqlDialectBase.cs:39 — RenderTableCheck emits CONSTRAINT {Name} CHECK ({Expression}) for every dialect"
examples:
