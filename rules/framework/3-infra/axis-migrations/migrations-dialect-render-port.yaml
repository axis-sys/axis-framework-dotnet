id: migrations-dialect-render-port
title: IAxisSqlDialect is the swappable render port owning type mapping and layout
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  IAxisSqlDialect renders the dialect-agnostic Axis.Ddl model into one database's DDL through two methods —
  RenderCreateTable for a full table and RenderAddColumn for one incremental ALTER TABLE ADD COLUMN. It is the
  "render" half of the schema seam (the "apply" half is IAxisMigrationRunner): the dialect owns BOTH the type
  mapping (Bool to BOOLEAN/TINYINT(1), Json to JSONB/JSON) AND the layout (Postgres standalone CREATE INDEX vs
  MySQL inlined index lines). A single table definition therefore yields correct Postgres or MySQL schema by
  swapping the injected dialect, and each implementation lives next to its adapter's migration runner.
invariants:
  - IAxisSqlDialect exposes exactly two methods — RenderCreateTable(AxisTable), returning the full DDL for the table plus its indexes and seed, and RenderAddColumn(string, AxisColumn), returning one incremental ALTER TABLE ADD COLUMN statement (detailed in migrations-add-column-render).
  - The dialect owns both the logical-to-physical type mapping and the statement layout, so swapping the injected dialect is the only change needed to target another engine.
  - Each dialect implementation ships alongside its adapter's migration runner (AxisRepository.Postgres / AxisRepository.MySql).
