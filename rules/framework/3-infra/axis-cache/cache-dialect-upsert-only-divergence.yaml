id: cache-dialect-upsert-only-divergence
title: Only the upsert diverges by dialect; every other L2 statement is shared
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The one piece of L2 SQL that genuinely differs between databases is the upsert, so IAxisCacheSqlDialect
  exposes exactly one member — UpsertSql — with parameters @key, @value, @expiresAt, @updatedAt. Postgres
  uses INSERT ... ON CONFLICT DO UPDATE and casts the payload @value::JSONB; MySQL uses INSERT ... AS new ...
  ON DUPLICATE KEY UPDATE (the 8.0.19+ row alias) with no cast. The select, delete and delete-expired
  statements are standard SQL shared by the core CacheEntryStore.
invariants:
  - IAxisCacheSqlDialect exposes only UpsertSql; select/delete/delete-expired are shared in CacheEntryStore.
  - Postgres renders ON CONFLICT DO UPDATE with @value cast to ::JSONB.
  - MySQL renders ON DUPLICATE KEY UPDATE using the INSERT ... AS new row alias, without a JSON cast.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Ports/IAxisCacheSqlDialect.cs:8 — the single-member dialect: UpsertSql with @key/@value/@expiresAt/@updatedAt"
    - "src/3-Infra/AxisCache/Repository/Postgres/AxisCache.Postgres/PostgresCacheSqlDialect.cs:9 — ON CONFLICT upsert casting @value::JSONB"
    - "src/3-Infra/AxisCache/Repository/MySql/AxisCache.MySql/MySqlCacheSqlDialect.cs:9 — ON DUPLICATE KEY upsert with the AS new row alias"
examples:
