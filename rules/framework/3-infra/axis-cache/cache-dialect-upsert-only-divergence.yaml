    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Store/CacheEntryStore.cs:23 — the shared SelectSql/DeleteSql/DeleteExpiredSql, dialect from dialect.UpsertSql"
  incorrect: []
exceptions: []
