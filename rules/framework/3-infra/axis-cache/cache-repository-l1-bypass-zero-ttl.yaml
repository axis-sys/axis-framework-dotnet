id: cache-repository-l1-bypass-zero-ttl
title: An L1Ttl of zero bypasses the memory tier — every read hits L2
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  L1 is enabled only when settings.L1Ttl is greater than TimeSpan.Zero. Setting L1Ttl to zero disables the
  in-process tier entirely: reads never consult or warm L1 and every read goes to L2 directly. Use it when
  you need strict cross-instance consistency (no staleness window) and can accept an L2 round-trip per read;
  it is also how the adapter's own integration tests exercise L2 in isolation.
invariants:
  - L1 is active only when L1Ttl > TimeSpan.Zero; an L1Ttl of zero disables reads from and writes to L1.
  - With L1 disabled, every GetAsync/ExistsAsync consults L2 and no value is memoised in memory.
