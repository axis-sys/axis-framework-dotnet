id: cache-adapter-contract
title: A custom IAxisCache adapter must honour the port contract
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  Swapping the backend (Redis, Memcached, a hybrid L1+L2, a test double) is implementing five methods for
  IAxisCache and registering the class. To keep application code identical across that swap, an adapter must
  return AxisResult and never throw for an expected outcome, return Ok(null) on a GetAsync miss, never cache
  a GetOrCreateAsync factory failure, keep RemoveAsync idempotent, and read cancellation from the ambient
  IAxisMediatorAccessor. Register it as IAxisCache via an AddAxis* extension and no call site changes.
invariants:
  - The adapter returns AxisResult from every method and never throws for an expected outcome.
  - GetAsync returns Ok(null) on a miss; GetOrCreateAsync never caches a factory failure; RemoveAsync succeeds on a missing key.
  - The adapter reads cancellation from IAxisMediatorAccessor.AxisMediator?.CancellationToken rather than taking a token parameter.
  - Registering the adapter for IAxisCache via its own AddAxis* method changes no code that consumes IAxisCache.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/AxisCache/IAxisCache.cs:3 — the five-method port every adapter implements"
examples:
  correct:
    - "docs/en-us/3-Infra/AxisCache/custom-adapter.md:47 — the contract a custom adapter must honour"
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/RepositoryCacheAdapter.cs:15 — the bundled two-tier adapter implementing the same five methods"
  incorrect: []
exceptions:
  - Registration lifetime is the adapter's choice — the in-box memory adapter is Singleton, the two-tier SQL adapter is Scoped; both satisfy the contract.
derives_to:
  skills:
    - axis-cache
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisCache/custom-adapter.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The common swappable-infra-port pattern (IAxis* + AxisResult + AddAxis* swaps the adapter via DI) is
  canonical in the axis-dotnet-architect hub; this rule states its cache-specific obligations.
