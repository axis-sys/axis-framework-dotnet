id: cache-connection-autocommit-no-enlist
title: Cache L2 connections are autocommit and never enlist in the business transaction
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  IAxisCacheConnectionFactory is the per-provider connection seam: the Postgres and MySQL adapters each own a
  pooled data source (NpgsqlDataSource / MySqlDataSource) for the process and hand the shared store an open
  DbConnection to drive with plain ADO.NET. Cache reads and writes are autocommit and stand OUTSIDE the
  application's request-scoped unit of work — they never enlist in a business transaction, so caching a value
  cannot be rolled back with the domain write, and vice versa.
invariants:
  - Each storage adapter registers one pooled IAxisCacheConnectionFactory (NpgsqlDataSource / MySqlDataSource) as a process singleton.
  - Cache L2 operations run autocommit on their own connection and never enlist in the application's unit of work / business transaction.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Ports/IAxisCacheConnectionFactory.cs:11 — pooled data source outside the request-scoped UoW, autocommit, never enlists"
    - "src/3-Infra/AxisCache/Repository/Postgres/AxisCache.Postgres/PostgresCacheConnectionFactory.cs:8 — opens from a pooled NpgsqlDataSource the adapter owns"
    - "src/3-Infra/AxisCache/Repository/MySql/AxisCache.MySql/MySqlCacheConnectionFactory.cs:8 — opens from a pooled MySqlDataSource the adapter owns"
examples:
