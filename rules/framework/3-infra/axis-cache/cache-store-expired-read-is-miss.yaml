id: cache-store-expired-read-is-miss
title: An L2 entry expired at the caller's now reads as a miss and is deleted in passing
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  When the L2 store reads a row whose EXPIRES_AT has passed the caller-supplied nowUtc, it treats the entry
  as absent (returns null) AND deletes the stale row in passing. Expiry is always evaluated against the
  caller's UTC instant, never the database clock, so the comparison is identical on Postgres and MySQL
  regardless of server timezone. A null EXPIRES_AT means the entry never expires and is invalidated only
  explicitly.
invariants:
  - GetAsync returns null for a row whose EXPIRES_AT is at or before the supplied nowUtc, and deletes that row in the same call.
  - Expiry is compared against the caller-supplied UTC instant, not the database clock, so it is dialect- and timezone-independent.
  - A null EXPIRES_AT means the entry never expires; it is removed only by an explicit Remove.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Store/CacheEntryStore.cs:57 — expired row: delete then report a miss"
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Persistence/CacheEntriesTable.cs:21 — expiry evaluated against a caller-supplied UTC instant, EXPIRES_AT nullable = never expires"
examples:
