notes: >
  The store also exposes DeleteExpiredAsync for a bulk sweep of expired rows (see cache-store-l2-port).
  AxisCacheSweepWorker, a hosted BackgroundService, invokes it on AxisCacheRepositorySettings.SweepInterval
  (default 5 minutes) whenever SweepEnabled is set (the default) — passive delete-on-read still applies in
  between sweeps, so a key that is never read again is still reclaimed within one sweep interval.
