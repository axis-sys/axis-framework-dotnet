id: cache-set-overwrite-optional-ttl
title: SetAsync overwrites silently and its TTL is optional
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: contracts
severity: must
status: canonical
description: >
  SetAsync<T>(key, value, expiration?) stores the value, replacing any existing entry for the key without
  complaint. The expiration is an optional TimeSpan?: pass it for a time-bounded entry, omit it (the default
  null) for an entry with no time-based expiry that lives until eviction, restart, or explicit removal.
invariants:
  - SetAsync overwrites an existing entry for the same key with no error.
  - The expiration parameter is an optional TimeSpan?; omitting it stores a value with no time-based expiry.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/AxisCache/IAxisCache.cs:7 — SetAsync<T>(string key, T value, TimeSpan? expiration = null)"
    - "src/3-Infra/AxisCache/MemoryCache/AxisMemoryCache/MemoryCacheAdapter.cs:19 — Set with or without expiration.Value"
examples:
  correct:
    - "src/3-Infra/AxisCache/MemoryCache/AxisMemoryCache.UnitTests/Memory/MemoryCacheAdapterTests.cs:119 — SetAsync overwrites an existing value"
    - "src/3-Infra/AxisCache/MemoryCache/AxisMemoryCache.UnitTests/Memory/MemoryCacheAdapterTests.cs:103 — SetAsync stores with an explicit expiration"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-cache
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisCache/iaxiscache.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  In the two-tier SQL adapter the same TTL becomes an absolute EXPIRES_AT column on the L2 row, not a
  sliding window.
