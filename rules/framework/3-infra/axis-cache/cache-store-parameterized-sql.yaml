id: cache-store-parameterized-sql
title: Every L2 statement binds values as parameters, never string interpolation
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
lens: [security]
severity: must
status: canonical
description: >
  The L2 store builds every command through a single Command helper that creates a DbParameter for each
  value (@key, @value, @expiresAt, @updatedAt, @now). Cache keys and payloads are untrusted user data, so
  they are always bound as parameters — never concatenated or interpolated into the SQL text. Only fixed
  identifiers (table and column names from the constants) are ever part of the command string.
invariants:
  - Every dynamic value reaches the database as a named DbParameter built by the store's Command helper, never interpolated into SQL text.
  - The SQL strings contain only fixed table/column identifiers plus @-parameter placeholders.
reference:
  kind: framework-source
  at:
