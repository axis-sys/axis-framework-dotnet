id: cache-port-contract
title: IAxisCache is five async methods that all return AxisResult and never throw
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: contracts
severity: must
status: canonical
description: >
  The cache port is one small interface every adapter implements: GetAsync, SetAsync, GetOrCreateAsync,
  RemoveAsync and ExistsAsync. Every method is async and returns AxisResult (or AxisResult<T>), so callers
  chain cache work on the railway and never wrap it in try/catch. Keys are plain strings — pick a
  "<entity>:<id>" convention. The surface is deliberately minimal: there is no Refresh, no batch, no tags.
invariants:
  - IAxisCache declares exactly GetAsync<T>, SetAsync<T>, GetOrCreateAsync<T>, RemoveAsync and ExistsAsync — nothing else.
  - Every method is asynchronous and returns Task<AxisResult> or Task<AxisResult<T>>; none returns a bare value or void.
  - Cache keys are plain strings; there is no Refresh, batch, tag or pattern operation on the contract.
