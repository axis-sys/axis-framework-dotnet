    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository.UnitTests/RepositoryCacheAdapterTests.cs:124 — GetOrCreate does not cache a factory failure (0 upserts)"
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository.UnitTests/RepositoryCacheAdapterTests.cs:101 — the factory runs once on miss, then the cached value serves"
