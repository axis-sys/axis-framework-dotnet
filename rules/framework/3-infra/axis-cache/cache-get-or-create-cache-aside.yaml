notes: >
  Not memoising a failure is what stops "this id does not exist" from being cached and then missing a
  freshly inserted row. The memory adapter's miss path is guarded by try/catch; the two-tier adapter reuses
  its own GetAsync + SetAsync, so the SQL write failure also aborts the cache-fill.
