id: cache-get-or-create-cache-aside
title: GetOrCreateAsync is cache-aside — a factory failure is never cached
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: contracts
severity: must
status: canonical
description: >
  GetOrCreateAsync<T>(key, factory, expiration?) is the cache-aside pattern in one call: on a hit it returns
  the cached value and never runs the factory; on a miss it runs the factory, and ONLY if the factory
  succeeds does it store the value (honouring the optional TTL) and return it. If the factory returns a
  failure, that failure flows straight through and NOTHING is cached, so the next call gets a fresh attempt.
invariants:
  - On a hit GetOrCreateAsync returns the cached value and does not invoke the factory.
  - On a miss it runs the factory and stores the value only when the factory succeeds, applying the optional expiration.
  - A factory failure is propagated as-is and is never written to the cache.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/AxisCache/IAxisCache.cs:9 — GetOrCreateAsync<T>(key, Func<Task<AxisResult<T>>> factory, TimeSpan? expiration)"
    - "src/3-Infra/AxisCache/MemoryCache/AxisMemoryCache/MemoryCacheAdapter.cs:34 — hit short-circuits; only IsSuccess triggers Set"
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/RepositoryCacheAdapter.cs:64 — miss runs factory, stores only on success"
examples:
