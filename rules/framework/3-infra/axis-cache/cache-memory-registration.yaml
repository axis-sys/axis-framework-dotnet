id: cache-memory-registration
title: AddAxisMemoryCache registers the in-memory adapter as a Singleton
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  A single-process app enables the in-memory cache by calling AddAxisMemoryCache(). It does exactly two
  things — AddMemoryCache() (Microsoft's IMemoryCache) and AddSingleton<IAxisCache, MemoryCacheAdapter>() —
  and returns the same IServiceCollection for chaining. The adapter additionally needs IAxisMediatorAccessor
  (from AddAxisMediator) for the ambient CancellationToken.
invariants:
  - AddAxisMemoryCache calls AddMemoryCache() and registers IAxisCache -> MemoryCacheAdapter with a Singleton lifetime.
  - AddAxisMemoryCache returns the same IServiceCollection so registration can be chained.
  - The adapter resolves IMemoryCache and IAxisMediatorAccessor from DI; the accessor supplies the ambient token.
