notes: >
  The cache twin of the AxisSaga / AxisBus storage bootstrap. This worker only creates the schema; the
  separate AxisCacheSweepWorker (see cache-store-expired-read-is-miss) periodically invokes
  DeleteExpiredAsync when AxisCacheRepositorySettings.SweepEnabled is set (the default).
