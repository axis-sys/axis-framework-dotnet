id: cache-storage-bootstrap-worker
title: A hosted worker creates the L2 schema once on startup, idempotently
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  When RunStartupMigration is true (the default), AddAxisCacheRepositoryCore hosts
  AxisCacheStorageInitializerWorker, a BackgroundService that runs IAxisCacheStorageInitializer.InitializeAsync()
  once after the host starts. The per-dialect initializer renders the AXIS_CACHE schema and applies it through
  the framework migration runner — idempotent, so it is safe on every restart and a no-op if a fixture
  migrated first. Turn RunStartupMigration off for hosts that must not touch the database at boot (e.g. test
  hosts that fake the storage ports), and migrate explicitly via AxisCacheMigrations.Initialize{Postgres,MySql}Async.
invariants:
  - With RunStartupMigration true, AxisCacheStorageInitializerWorker runs IAxisCacheStorageInitializer.InitializeAsync() once post-start.
  - InitializeAsync renders and applies the AXIS_CACHE schema idempotently, so it is safe on every startup and a no-op if already applied.
  - Setting RunStartupMigration false suppresses the worker; the schema is then applied explicitly via AxisCacheMigrations.Initialize{Postgres,MySql}Async.
