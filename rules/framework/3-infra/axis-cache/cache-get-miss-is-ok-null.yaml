id: cache-get-miss-is-ok-null
title: A cache miss is a successful Ok(null), never a failure
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: contracts
severity: must
status: canonical
description: >
  GetAsync<T> returns AxisResult<T?>: a hit is Ok(value), a miss is Ok(null). A miss is a normal outcome,
  not an error, so it must NOT put the railway on the failure track — a downstream Then keeps running. A
  result is IsFailure only when the adapter genuinely failed (threw) or the operation was cancelled.
invariants:
  - GetAsync returns Ok(null) when the key is absent, so a miss does not short-circuit a Then/Map chain.
  - GetAsync is IsFailure only on a real adapter fault or cancellation, never merely because the key was missing.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/AxisCache/IAxisCache.cs:5 — GetAsync<T> returns AxisResult<T?> (nullable value)"
    - "src/3-Infra/AxisCache/MemoryCache/AxisMemoryCache/MemoryCacheAdapter.cs:10 — Get<T> returns default on miss, wrapped in Ok"
examples:
