id: storage-container-capability
title: IAxisStorageContainer exposes exists, ensure-exists and a public-access probe
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  IAxisStorageContainer is container-level administration, distinct from the object-level IAxisStorage.
  ExistsAsync() reports whether the bucket/container itself exists; EnsureExistsAsync() provisions it if
  missing and is idempotent (call it at tenant/environment setup, not implicitly on first upload);
  IsPubliclyAccessibleAsync() reports whether the container serves objects without a signed URL.
invariants:
  - IAxisStorageContainer.ExistsAsync() reports whether the bucket/container itself exists.
  - EnsureExistsAsync() creates the container if missing and is idempotent.
  - IsPubliclyAccessibleAsync() reports whether the container serves objects without a signed URL.
