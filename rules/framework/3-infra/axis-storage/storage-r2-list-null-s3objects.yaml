id: storage-r2-list-null-s3objects
title: The R2 lister coalesces a null S3Objects collection to an empty list
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: should
status: canonical
description: >
  Some S3-compatible providers (e.g. MinIO) return a NULL S3Objects collection, not an empty one, when no key
  matches the prefix. The R2 adapter coalesces it — (response.S3Objects ?? []) — so ListAsync returns an
  empty list rather than throwing a NullReferenceException. A custom S3-compatible adapter must do the same.
invariants:
  - ListAsync treats a null S3Objects page as empty, not as a fault.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/CloudflareR2StorageAdapter.cs:174 — (response.S3Objects ?? []).Select(o => o.Key)"
examples:
  correct:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2.UnitTests/CloudflareR2/CloudflareR2StorageAdapterTests.cs:653 — a null S3Objects response yields an empty list"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-storage
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisStorage/cloudflare-r2.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  A real S3-compatibility divergence: MinIO returns null where AWS S3 returns an empty collection. The rule
  is captured because a hand-rolled S3 adapter would otherwise NRE against MinIO.
