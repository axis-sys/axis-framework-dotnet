id: storage-servable-url-decides-vs-reports
title: GetServableUrlAsync decides and emits; IsPubliclyAccessibleAsync only reports
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
lens: [security]
severity: must
status: canonical
description: >
  The two look related but answer different questions. IAxisStorageContainer.IsPubliclyAccessibleAsync
  reports a fact — whether the container serves objects without a signature — and leaves the branching to
  you. IAxisStorageUrlResolver.GetServableUrlAsync consults that same fact and returns the finished URL: a
  raw public URL (IsPublic true, ExpiresAt null) when the container is public, or a signed URL (IsPublic
  false, ExpiresAt = now + expiration) when it is not. Reach for the resolver to hand a client one URL
  without branching yourself; reach for the reporter when you need the raw fact for another decision.
invariants:
  - GetServableUrlAsync returns a raw public URL (IsPublic true, ExpiresAt null) when the container is public.
  - GetServableUrlAsync returns a signed URL (IsPublic false, ExpiresAt = now + expiration) when the container is private.
  - IsPubliclyAccessibleAsync only reports the public/private fact and does not emit a URL.
