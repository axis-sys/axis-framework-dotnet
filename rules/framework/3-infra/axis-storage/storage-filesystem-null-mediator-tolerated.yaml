id: storage-filesystem-null-mediator-tolerated
title: The FileSystem adapter tolerates a null ambient mediator
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: may
status: canonical
description: >
  Unlike the cloud adapters, which dereference IAxisMediatorAccessor.AxisMediator with the null-forgiving
  operator (and would throw a NullReferenceException with no ambient mediator), the FileSystem adapter falls
  back to CancellationToken.None when accessor.AxisMediator is null —
  accessor.AxisMediator?.CancellationToken ?? CancellationToken.None. So filesystem operations run in a
  background context (a reconciler, a startup task) that has no ambient mediator.
invariants:
  - The FileSystem adapter reads accessor.AxisMediator?.CancellationToken ?? CancellationToken.None, tolerating a null ambient mediator.
  - FileSystem operations succeed in a context with no ambient mediator; the cloud adapters do not make that guarantee.
