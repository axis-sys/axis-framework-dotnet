id: storage-upload-overwrites
title: UploadAsync overwrites an existing key silently and sets the content type
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  There is no if-not-exists mode in the contract. UploadAsync writes the stream under key, overwriting any
  existing object; it sets the object Content-Type from the required contentType argument (there is no
  default); and it returns a valueless Ok() with no metadata back. If you need confirmation, query
  ExistsAsync.
invariants:
  - UploadAsync overwrites any existing object at key; the contract has no if-not-exists mode.
  - UploadAsync sets the object Content-Type from the required contentType argument; there is no default.
  - UploadAsync returns a valueless AxisResult.Ok() carrying no metadata back to the caller.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/AxisStorage/IAxisStorage.cs:5 — UploadAsync(key, Stream content, string contentType) -> Task<AxisResult>"
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/CloudflareR2StorageAdapter.cs:17 — PutObjectRequest sets ContentType and overwrites the key"
examples:
  correct:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2.IntegrationTests/CloudflareR2StorageAdapterIntegrationTests.cs:84 — a second upload overwrites the first"
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2.IntegrationTests/CloudflareR2StorageAdapterIntegrationTests.cs:67 — the content type is preserved on the stored object"
    - "src/3-Infra/AxisStorage/FileSystem/AxisStorage.FileSystem.UnitTests/FileSystemStorageAdapterTests.cs:60 — the filesystem adapter overwrites an existing key"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-storage
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisStorage/upload-download.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  A custom adapter that needs if-not-exists must expose a new method rather than change UploadAsync's
  overwrite semantics (see storage-custom-adapter-contract).
