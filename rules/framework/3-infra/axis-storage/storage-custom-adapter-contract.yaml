notes: >
  The common swappable-infra-port pattern (IAxis* + AxisResult + AddAxis* swaps the adapter via DI) is
  canonical in the axis-dotnet-architect hub; this rule states its storage-specific obligations. For a real
  disk/NAS backend, use the in-box AxisStorage.FileSystem rather than hand-rolling one.
