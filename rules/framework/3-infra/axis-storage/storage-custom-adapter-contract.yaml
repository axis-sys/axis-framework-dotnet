id: storage-custom-adapter-contract
title: A custom IAxisStorage adapter must honour the port contract
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  Adding a provider (plain AWS S3, Google Cloud Storage, a test double, a read-one/write-many mirror) is
  implementing the five methods and registering the class for IAxisStorage. To keep application code
  identical across the swap, the adapter must return AxisResult and never throw cooperatively (wrap the SDK
  in AxisResult.TryAsync), overwrite silently on upload, return a caller-disposed Stream on download, return
  Ok(false) rather than a failure for a missing key on ExistsAsync, be idempotent on delete, and honour the
  ambient CancellationToken. A bucket-level feature is added as a NEW interface in the AxisStorage package,
  required of the adapter — never as a parameter on IAxisStorage.
invariants:
  - A custom adapter implements the five IAxisStorage methods and is registered for IAxisStorage.
  - The adapter returns AxisResult, never throwing cooperatively, by wrapping the SDK call in AxisResult.TryAsync.
  - The adapter honours upload-overwrites, a caller-owned download stream, Ok(false) on a missing Exists, idempotent delete, and ambient cancellation.
  - A new bucket-level capability is a new interface in the AxisStorage package that the adapter implements, not a parameter added to IAxisStorage.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/AxisStorage/IAxisStorage.cs:3 — the five-method port a custom adapter satisfies"
    - "docs/en-us/3-Infra/AxisStorage/custom-adapter.md:42 — the contract a custom adapter must honour"
examples:
  correct:
    - "docs/en-us/3-Infra/AxisStorage/custom-adapter.md:60 — an illustrative local-disk adapter honouring the contract"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:9 — a full, non-illustrative example implementing the port and all optional capabilities"
  incorrect: []
exceptions:
  - Honouring ambient cancellation is recommended, not compiler-enforced; a purely in-memory test double may have nothing to cancel.
