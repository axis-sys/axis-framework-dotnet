id: storage-filesystem-capabilities-no-url-resolver
title: The FileSystem adapter implements container and lister but not URL resolution
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisStorage.FileSystem implements IAxisStorage, IAxisStorageContainer and IAxisStorageLister but
  deliberately NOT IAxisStorageUrlResolver — a file:// path is meaningless to a remote client, and serving a
  file over HTTP is the job of whatever fronts the disk. Its DI binds only those three interfaces.
  GetPresignedUrlAsync returns a file:// URI (a local path reference, not an HTTP URL), and
  IsPubliclyAccessibleAsync returns Ok(true) because a filesystem has no signed-URL concept.
invariants:
  - FileSystemStorageAdapter implements IAxisStorage, IAxisStorageContainer and IAxisStorageLister, and does not implement IAxisStorageUrlResolver.
  - AddAxisFileSystemStorage binds only those three interfaces; there is no IAxisStorageUrlResolver registration.
  - GetPresignedUrlAsync returns a file:// URI and IsPubliclyAccessibleAsync returns Ok(true).
