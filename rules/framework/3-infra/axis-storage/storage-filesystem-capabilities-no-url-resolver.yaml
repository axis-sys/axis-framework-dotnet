    - "src/3-Infra/AxisStorage/FileSystem/AxisStorage.FileSystem/FileSystemStorageAdapter.cs:47 — GetPresignedUrlAsync returns a file:// URI"
    - "src/3-Infra/AxisStorage/FileSystem/AxisStorage.FileSystem/DependencyInjection.cs:15 — DI binds only IAxisStorage, IAxisStorageContainer and IAxisStorageLister"
