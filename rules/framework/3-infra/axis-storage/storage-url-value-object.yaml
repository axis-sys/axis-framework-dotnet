id: storage-url-value-object
title: AxisStorageUrl carries the URL, its public flag and its expiry together
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: should
status: canonical
description: >
  AxisStorageUrl is a sealed record with exactly three members — string Url, bool IsPublic, DateTimeOffset?
  ExpiresAt. GetServableUrlAsync returns it so the caller need not re-derive whether the URL is public or when
  it expires; all three travel together. A public URL has IsPublic true and ExpiresAt null; a signed URL has
  IsPublic false and ExpiresAt set to now + expiration.
invariants:
  - AxisStorageUrl is a sealed record with exactly three members, Url, IsPublic and ExpiresAt.
  - ExpiresAt is null for a public URL and set to now + expiration for a signed URL.
reference:
  kind: framework-source
  at:
