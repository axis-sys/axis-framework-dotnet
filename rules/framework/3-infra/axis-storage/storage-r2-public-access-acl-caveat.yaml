id: storage-r2-public-access-acl-caveat
title: The R2 public-access probe reads the legacy bucket ACL and may not reflect R2 reality
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
lens: [security]
severity: may
status: canonical
description: >
  IsPubliclyAccessibleAsync on the S3 adapter probes the bucket ACL (GetBucketAcl) and reports true when the
  AllUsers grantee holds a READ grant. Bucket ACL is the most broadly S3-compatible way to detect public
  access, but some S3-compatible providers — Cloudflare R2 among them — manage public access OUTSIDE the
  legacy ACL API, so this call may not honour public access the way AWS S3/MinIO do. Verify against your
  bucket before relying on it in production.
invariants:
  - The S3 adapter's IsPubliclyAccessibleAsync reports true only when the AllUsers grantee holds a READ grant in the bucket ACL.
  - The result may not reflect real public access on providers that manage it outside the legacy ACL API (e.g. Cloudflare R2).
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/CloudflareR2StorageAdapter.cs:145 — GetBucketAcl checked for an AllUsers READ grant"
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/CloudflareR2StorageAdapter.cs:142 — the code comment documenting the S3-compatibility caveat"
examples:
