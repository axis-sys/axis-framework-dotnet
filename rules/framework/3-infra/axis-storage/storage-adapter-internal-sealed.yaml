id: storage-adapter-internal-sealed
title: In-box storage adapters are internal sealed and are never newed by consumers
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  CloudflareR2StorageAdapter, AzureBlobStorageAdapter and FileSystemStorageAdapter are internal sealed by
  design. A consumer obtains an IAxisStorage only through DI (AddAxis*Storage) or the runtime-destination
  factory (I*StorageFactory.Create), never by new — so the vendor SDK, credentials and endpoint stay behind
  the composition root and the adapter can evolve without breaking callers.
invariants:
  - Each in-box adapter type (CloudflareR2, AzureBlob, FileSystem) is declared internal sealed.
  - A consumer never instantiates an adapter with new; it resolves IAxisStorage from DI or a factory.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/CloudflareR2StorageAdapter.cs:9 — internal sealed class"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:9 — internal sealed class"
    - "src/3-Infra/AxisStorage/FileSystem/AxisStorage.FileSystem/FileSystemStorageAdapter.cs:6 — internal sealed class"
examples:
