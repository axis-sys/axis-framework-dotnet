    - "docs/en-us/3-Infra/AxisStorage/cloudflare-r2.md:3 — consume through DI or the factory, never by new"
    - "docs/en-us/3-Infra/AxisStorage/azure-blob.md:3 — the adapter type is internal sealed"
  incorrect: []
exceptions: []
derives_to:
