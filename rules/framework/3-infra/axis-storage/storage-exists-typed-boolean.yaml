id: storage-exists-typed-boolean
title: ExistsAsync returns a typed boolean, not a 404 exception
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  ExistsAsync returns Ok(true) or Ok(false); a known-missing key is Ok(false), NOT a failure, so callers can
  branch without exception flow and save a 404-shaped exception on a known-missing path. Only a genuine error
  (auth, a non-404 server error, cancellation) is IsFailure. The S3 adapter catches an AmazonS3Exception
  whose StatusCode is NotFound and returns false; the Azure adapter uses the SDK's typed ExistsAsync.
invariants:
  - ExistsAsync returns AxisResult<bool>; a missing key is Ok(false), never a failure.
  - A non-404 error (auth, server error) surfaces as IsFailure.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/CloudflareR2StorageAdapter.cs:51 — catches AmazonS3Exception with StatusCode NotFound and returns false"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:51 — BlobClient.ExistsAsync returns a typed boolean"
examples:
  correct:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2.UnitTests/CloudflareR2/CloudflareR2StorageAdapterTests.cs:233 — a missing key returns Ok(false)"
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2.UnitTests/CloudflareR2/CloudflareR2StorageAdapterTests.cs:247 — a non-404 server error returns a failed AxisResult"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob.UnitTests/AzureBlob/AzureBlobStorageAdapterTests.cs:205 — the Azure adapter returns Ok(false) for a missing key"
  incorrect: []
exceptions: []
derives_to:
