notes: >
  The shared-instance-under-all-interfaces shape is identical across the two cloud adapters; the FileSystem
  registration omits the IAxisStorageUrlResolver binding (see storage-filesystem-capabilities-no-url-resolver).
  This is the storage instance of the swappable-infra-port pattern (IAxis* + AxisResult + AddAxis*) owned by
  the axis-dotnet-architect hub.
