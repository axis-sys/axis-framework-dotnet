id: storage-di-shared-singleton
title: AddAxis*Storage registers one Singleton adapter under every interface it implements
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The registration extension constructs the adapter once and binds a single Singleton instance under
  IAxisStorage and each optional capability interface the adapter implements, via
  sp.GetRequiredService<TAdapter>(). The settings object is a Singleton too. Because the whole application
  depends only on IAxisStorage (plus capabilities), swapping one AddAxis*Storage for another changes no
  application code. The method returns the same IServiceCollection for chaining.
invariants:
  - AddAxis*Storage registers the adapter as a Singleton and exposes the SAME instance under IAxisStorage and every capability interface it implements.
  - The settings object is registered as a Singleton.
  - Swapping one AddAxis*Storage registration for another changes no publisher or handler code.
  - The registration method returns the same IServiceCollection so registration can be chained.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/DependencyInjection.cs:23 — one adapter Singleton bound under all four interfaces, settings Singleton, returns services"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/DependencyInjection.cs:25 — same shared-instance registration shape for Azure"
    - "src/3-Infra/AxisStorage/FileSystem/AxisStorage.FileSystem/DependencyInjection.cs:13 — filesystem binds three interfaces to one Singleton"
