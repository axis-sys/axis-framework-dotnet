id: storage-azure-public-access-cache-ttl
title: Azure caches the public-access probe only on the servable-URL path
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
lens: [performance, concurrency]
severity: should
status: canonical
description: >
  To avoid a GetProperties round-trip on every GetServableUrlAsync, the Azure adapter caches the "is this
  container public?" answer for a short TTL — but ONLY on the resolver path.
  IAxisStorageContainer.IsPubliclyAccessibleAsync still probes live on every call. The TTL is
  AzureBlobStorageOptions.PublicAccessCacheTtl (default 15 minutes), configurable through the optional
  Action<AzureBlobStorageOptions> passed to AddAxisAzureBlobStorage / AddAxisAzureBlobStorageFactory.
invariants:
  - GetServableUrlAsync caches the container public-access answer for AzureBlobStorageOptions.PublicAccessCacheTtl (default 15 minutes).
  - IsPubliclyAccessibleAsync is never served from that cache; it probes live on every call.
  - The TTL is configurable via the optional Action<AzureBlobStorageOptions> on the Azure registration methods.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:145 — IsPublicCachedAsync caches the probe on the resolver path"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:93 — IsPubliclyAccessibleAsync probes live every call"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageOptions.cs:5 — PublicAccessCacheTtl default 15 minutes"
examples:
