id: storage-port-five-methods
title: IAxisStorage is a five-method vendor-neutral object-storage port
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  IAxisStorage is the whole universal surface every adapter must implement: five async methods, each keyed
  by a string and returning an AxisResult. UploadAsync and DeleteAsync return a valueless AxisResult;
  DownloadAsync returns AxisResult<Stream>, ExistsAsync AxisResult<bool>, GetPresignedUrlAsync
  AxisResult<string>. The bucket/container, region and endpoint are the adapter's business, configured once,
  never method parameters the caller passes.
invariants:
  - IAxisStorage exposes exactly five methods, UploadAsync, DownloadAsync, DeleteAsync, ExistsAsync and GetPresignedUrlAsync.
  - Every method is keyed by a string key and returns Task<AxisResult> or Task<AxisResult<T>>.
  - UploadAsync(string key, Stream content, string contentType) and DeleteAsync(string key) return a valueless Task<AxisResult>.
  - DownloadAsync returns Task<AxisResult<Stream>>, ExistsAsync returns Task<AxisResult<bool>>, GetPresignedUrlAsync returns Task<AxisResult<string>>.
  - The bucket/container, region and endpoint are adapter configuration, never method parameters.
