id: email-error-code-is-contract
title: ERROR_SENDING_EMAIL is the caller-facing failure code
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: should
status: canonical
description: >
  The failure the adapter returns carries the code ERROR_SENDING_EMAIL, typed as
  AxisErrorType.InternalServerError. That code — not the human-readable log message — is the contract callers
  branch on. A custom adapter should return the same code on delivery failure so caller-side handling is
  identical across a transport swap.
invariants:
  - The in-box adapter's failure carries the code ERROR_SENDING_EMAIL with type InternalServerError.
  - Callers that branch on failure use the code/type, not the log message.
  - A custom adapter should reuse the same code so caller handling is unchanged when the transport is swapped.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:39 — AxisError.InternalServerError with code ERROR_SENDING_EMAIL"
examples:
  correct:
    - "docs/en-us/3-Infra/AxisEmail/custom-adapter.md:47 — match the in-box code for identical handling"
    - "docs/en-us/3-Infra/AxisEmail/api-reference.md:59 — the behaviour contract table"
  incorrect: []
exceptions:
  - A provider adapter may surface finer-grained codes if its callers expect them; matching the in-box code is the recommendation, not a hard requirement.
derives_to:
  skills:
    - axis-email
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisEmail/custom-adapter.md"
