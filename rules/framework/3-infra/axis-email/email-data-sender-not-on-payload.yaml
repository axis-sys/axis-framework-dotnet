id: email-data-sender-not-on-payload
title: The sender is not on AxisEmailData — no From, Bcc or attachment fields
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisEmailData carries recipients (To, Cc), Subject, Body and BodyTextType — and nothing else. The sender
  (From) is deliberately absent: it lives in AxisEmailSettings and is applied by the adapter. The model has no
  From, no Bcc and no attachment members; an email that needs those needs a richer contract and a custom
  adapter.
invariants:
  - AxisEmailData has exactly five members — To, Subject, Body, BodyTextType, Cc — and no others.
  - There is no From field; the sender identity comes from AxisEmailSettings.Sender, applied by the adapter.
  - There is no Bcc member and no attachments member on the payload.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisEmail/AxisEmail/AxisEmailData.cs:3 — the five-member record, no From/Bcc/attachments"
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:21 — From comes from settings, not the payload"
examples:
  correct:
    - "docs/en-us/3-Infra/AxisEmail/axis-email-data.md:3 — the sender is not on the payload"
    - "docs/en-us/3-Infra/AxisEmail/settings.md:44 — Sender lives in settings"
  incorrect: []
exceptions:
  - Attachments, Bcc or a per-message From are legitimate needs; they require extending the contract and implementing them in a custom adapter, not on this payload.
derives_to:
  skills:
    - axis-email
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisEmail/axis-email-data.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  Shape gotcha — a payload imagined as to/from/subject/body/attachments does not match the code: From is in
  settings and attachments/Bcc are unsupported by the in-box model.
