id: email-settings-binding-section
title: AxisEmailSettings binds from Axis:Email:Settings via IOptions
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The settings are bound from the configuration section Axis:Email:Settings and resolved through
  IOptions<AxisEmailSettings>. AddAxisMimeKitEmail wires the binding; the adapter captures emailSettings.Value
  in its constructor. Because the service is Scoped, a fresh instance re-reads Value per request scope.
invariants:
  - AxisEmailSettings is bound from configuration.GetSection with the section key Axis:Email:Settings.
  - The adapter consumes IOptions<AxisEmailSettings> and reads .Value, captured once in the constructor field.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/DependencyInjection.cs:13 — Configure from the Axis:Email:Settings section"
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:13 — captures emailSettings.Value"
examples:
  correct:
    - "docs/en-us/3-Infra/AxisEmail/settings.md:64 — the Axis:Email:Settings JSON shape"
    - "docs/en-us/3-Infra/AxisEmail/getting-started.md:22 — appsettings binding"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-email
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisEmail/settings.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The docs describe the value as read lazily on every send; in code it is captured once at construction, so
  the Scoped lifetime is what makes a config change visible on the next request scope.
