id: email-send-ambient-cancellation
title: SendAsync takes no CancellationToken — cancellation is ambient
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  Consistent with the framework's cancellation model, SendAsync accepts only AxisEmailData; the
  CancellationToken is never a method parameter. A cancellation-aware adapter reads the ambient token from
  IAxisMediatorAccessor rather than receiving it. The bundled MimeKit adapter threads no token into MailKit,
  so an in-box send is not cooperatively cancellable.
invariants:
  - IAxisEmailService.SendAsync accepts only AxisEmailData; the CancellationToken is never a parameter.
  - The bundled MimeKit adapter passes no token to MailKit's ConnectAsync/AuthenticateAsync/SendAsync/DisconnectAsync, so its send cannot be cancelled cooperatively.
  - An adapter that needs cancellation reads it from IAxisMediatorAccessor.AxisMediator?.CancellationToken, not from a parameter.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisEmail/AxisEmail/IAxisEmailService.cs:5 — SendAsync(AxisEmailData) has no token parameter"
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:31 — MailKit calls pass no CancellationToken"
examples:
  correct:
    - "docs/en-us/3-Infra/AxisEmail/iaxisemailservice.md:5 — the one-argument port"
  incorrect: []
exceptions:
  - The in-box adapter's lack of token plumbing is a known gap, not an intended contract; a custom adapter may honour the ambient token.
derives_to:
