id: email-mimekit-registration
title: AddAxisMimeKitEmail binds the settings and registers the service as Scoped
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  A host enables SMTP email by calling AddAxisMimeKitEmail(IConfiguration). The extension binds
  AxisEmailSettings from Axis:Email:Settings, registers IAxisEmailService -> AxisEmailService with a Scoped
  lifetime, and returns the same IServiceCollection for chaining. The service depends on
  IOptions<AxisEmailSettings> and IAxisLogger<AxisEmailService>.
invariants:
  - AddAxisMimeKitEmail(IConfiguration) binds AxisEmailSettings from the Axis:Email:Settings section.
  - It registers IAxisEmailService -> AxisEmailService with AddScoped (Scoped lifetime).
  - It returns the same IServiceCollection so registration can be chained.
