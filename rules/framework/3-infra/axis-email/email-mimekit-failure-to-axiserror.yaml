id: email-mimekit-failure-to-axiserror
title: Any send exception becomes a logged InternalServerError
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
lens: [observability]
severity: must
status: canonical
description: >
  The entire build-and-send is wrapped in try/catch(Exception). On any exception the adapter logs it via
  IAxisLogger with the code ERROR_SENDING_EMAIL and returns AxisError.InternalServerError with that same code;
  on success it returns AxisResult.Ok(). Auth, network, SMTP-rejection and MIME errors all collapse into that
  one typed error at the adapter boundary — the original exception survives only in the logs.
invariants:
  - Build, connect, authenticate and send run inside a single try/catch(Exception).
  - The catch logs via logger.LogError(ex, ERROR_SENDING_EMAIL) and returns AxisError.InternalServerError(ERROR_SENDING_EMAIL).
  - A successful send returns AxisResult.Ok(); the adapter distinguishes no failure sub-types — every failure maps to InternalServerError.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:36 — catch(Exception ex)"
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:38 — LogError then InternalServerError"
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:42 — AxisResult.Ok() on success"
examples:
