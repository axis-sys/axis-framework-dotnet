id: email-settings-sender-credentials
title: Sender.Address is both the From and the SMTP username; Password is the secret
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
lens: [security]
severity: should
status: canonical
description: >
  The Sender group does double duty in the bundled adapter. Sender.Address is both the visible From address
  and the SMTP authentication username; Sender.Password is the SMTP password. Keep the password in a secret
  store (User Secrets, Key Vault, environment variable) — application code never sees it, configuration binds
  it once.
invariants:
  - The adapter authenticates with client.AuthenticateAsync(Sender.Address, Sender.Password) — Address is the SMTP username.
  - Sender.Address is also the From address applied to the outgoing message (with Sender.Name).
  - Sender.Password is the SMTP secret and belongs in a secret store, not in source control.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:32 — AuthenticateAsync(Sender.Address, Sender.Password)"
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:21 — From uses Sender.Name and Sender.Address"
examples:
  correct:
    - "docs/en-us/3-Infra/AxisEmail/settings.md:107 — password via environment variable / secret store"
    - "docs/en-us/3-Infra/AxisEmail/mimekit-adapter.md:57 — the sender's password is the SMTP password"
  incorrect: []
exceptions:
  - A provider whose username differs from the From address requires a custom adapter with its own settings; the in-box adapter reuses Sender.Address for both.
derives_to:
  skills:
    - axis-email
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisEmail/settings.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The coupling of From identity and SMTP username is a property of the MimeKit adapter, not of the port; the
  secret-store guidance is the security recommendation.
