id: email-port-single-method
title: IAxisEmailService is a one-method port — SendAsync(AxisEmailData)
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The whole email port is a single method. IAxisEmailService (namespace Axis) exposes
  Task<AxisResult> SendAsync(AxisEmailData data) and nothing else — no overloads, no subscribe/receive, no
  configuration surface. Every recipient, header, subject and body travels inside the one AxisEmailData
  argument; the return is the non-generic Task<AxisResult>.
invariants:
  - IAxisEmailService declares exactly one member — Task<AxisResult> SendAsync(AxisEmailData data) — in namespace Axis.
  - The method returns the non-generic Task<AxisResult> (not ValueTask, not AxisResult<T>).
  - The entire email payload is the single AxisEmailData parameter; the port has no other parameters or members.
