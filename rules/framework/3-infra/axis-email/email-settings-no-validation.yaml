id: email-settings-no-validation
title: Email settings are bound but not validated
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
lens: [security]
severity: should
status: canonical
description: >
  There is no options validation on AxisEmailSettings — no ValidateOnStart, no data annotations, no required
  checks. A missing or blank Host, Address or Password binds to its empty default and passes startup
  silently; the misconfiguration surfaces only at send time as AxisError.InternalServerError with the code
  ERROR_SENDING_EMAIL. Validate SMTP configuration yourself if you need fail-fast startup.
invariants:
  - AddAxisMimeKitEmail binds the settings but registers no validation (no ValidateOnStart, no data annotations).
  - Missing or blank Sender/Smtp values bind to their empty defaults and do not fail startup.
  - A misconfigured setting manifests only as a runtime send failure on the AxisResult rail, not as a startup error.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/DependencyInjection.cs:13 — Configure with no Validate/ValidateOnStart"
    - "src/3-Infra/AxisEmail/AxisEmail/AxisEmailSettings.cs:10 — empty-string defaults absorb missing config"
examples:
  correct:
    - "docs/en-us/3-Infra/AxisEmail/settings.md:31 — configuration is the source of truth, bound once at startup"
  incorrect: []
exceptions:
  - An application may add its own IValidateOptions<AxisEmailSettings> or ValidateOnStart to get fail-fast behaviour; the package does not.
derives_to:
  skills:
    - axis-email
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisEmail/settings.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  Gotcha — blank credentials do not fail fast; the first send fails with ERROR_SENDING_EMAIL and the real
  cause (e.g. authentication failure) lives only in the logged exception.
