id: email-send-returns-result-never-throws
title: SendAsync returns AxisResult and never throws for a delivery failure
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  Sending mail is a railway step. SendAsync returns AxisResult.Ok() when the message is accepted and an
  AxisError on the failure rail otherwise; a delivery failure is a value, never a thrown exception. Callers
  compose the send with ThenAsync/OrElseAsync like any other AxisResult, so a failed send can be
  dead-lettered without a try/catch at the call site.
invariants:
  - SendAsync yields AxisResult.Ok() when the adapter accepts and sends the message.
  - Any expected delivery failure (auth, network, SMTP rejection, MIME error) is returned as an AxisError on the failure rail, not thrown.
  - The result composes on the railway — callers chain the send with ThenAsync/OrElseAsync without wrapping it in try/catch.
reference:
  kind: framework-source
  at:
