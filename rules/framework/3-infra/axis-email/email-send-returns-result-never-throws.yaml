notes: >
  This is result-no-throw applied at the email edge. The in-box adapter enforces it with a
  try/catch(Exception) that projects every exception onto AxisError (see email-mimekit-failure-to-axiserror);
  a custom adapter must preserve the same no-throw guarantee.
