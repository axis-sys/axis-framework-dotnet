id: repository-dbunitofwork-dialect-seam
title: IDbUnitOfWork<TCommand> is the provider-typed seam carrying NewCommandAsync and the fault/write flags
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  IDbUnitOfWork<TCommand> extends IAxisUnitOfWork with the provider-typed members AxisRepositoryBase consumes,
  so the shared base never names a concrete provider type. NewCommandAsync(sql) creates a command bound to the
  unit of work's connection and transaction (opening them lazily). IsFaulted/MarkFaulted let the base abort a
  transaction after a command error; HasUncommittedWrites/MarkWrite record whether a durable write has landed,
  which drives the transient-retry write-safety decision. The base is generic over TCommand : DbCommand and
  reaches these members only through this interface.
invariants:
  - IDbUnitOfWork<TCommand> declares NewCommandAsync(string) : Task<TCommand> where TCommand : DbCommand.
  - It declares IsFaulted / MarkFaulted() and HasUncommittedWrites / MarkWrite().
  - AxisRepositoryBase names only IDbUnitOfWork<TCommand>, never a concrete provider unit-of-work type.
