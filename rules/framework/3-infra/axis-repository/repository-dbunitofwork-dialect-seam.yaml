  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/IDbUnitOfWork.cs:11 — IDbUnitOfWork<TCommand> : IAxisUnitOfWork; NewCommandAsync, IsFaulted, HasUncommittedWrites, MarkWrite"
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:7 — the base is generic over TCommand and injects IDbUnitOfWork<TCommand> uow"
