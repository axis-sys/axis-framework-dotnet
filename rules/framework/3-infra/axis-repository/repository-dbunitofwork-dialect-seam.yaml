notes: >
  Each provider's public unit-of-work interface (IPostgresUnitOfWork, IMySqlUnitOfWork) simply closes this
  over its command type and adds nothing, so consumers keep injecting the provider name while all members come
  from here (repository-provider-adapter-shape).
