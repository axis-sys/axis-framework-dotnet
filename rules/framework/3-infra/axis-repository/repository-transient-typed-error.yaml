id: repository-transient-typed-error
title: A surfaced transient maps to a logged, transient ServiceUnavailable that faults the unit of work
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
lens: [concurrency, observability]
severity: must
status: canonical
description: >
  When a transient DbException (deadlock, serialization failure, dropped connection) is not resolved by the
  in-place retry, it maps to AxisError.ServiceUnavailable("{PREFIX}_TRANSIENT_ERROR") on every surface, is
  logged, and faults the unit of work. The error is transient (IsTransient true) so an upstream caller — the
  saga resumer, for instance — can replay the whole unit of work; the distinct ServiceUnavailable type keeps
  it from collapsing into a generic 500 execution error.
invariants:
  - A surfaced transient returns AxisError.ServiceUnavailable("{ErrorPrefix}_TRANSIENT_ERROR") with IsTransient true.
  - The transient path calls LogError and faults the unit of work.
  - Every surface (Execute, ExecuteCount, Get, List) produces the same typed transient on a transient failure.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:92 — catch IsTransient: MarkFaulted + LogError + ServiceUnavailable(_TRANSIENT_ERROR)"
examples:
