id: repository-error-classification-hooks
title: The base defers DbException classification to five abstract dialect hooks
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisRepositoryBase owns the shared retry/fault/AxisResult machinery but knows nothing provider-specific.
  It defers every classification decision to abstract members each adapter must implement — IsTransient,
  IsDuplicateKey and IsSchemaMissing classify a DbException; ErrorPrefix names the dialect in every error code
  (POSTGRES / MYSQL); LogError routes a failure through the concrete repository's typed logger. Adding a new
  provider is implementing these five members, not re-writing the mapping logic.
invariants:
  - AxisRepositoryBase declares abstract bool IsTransient(DbException), bool IsDuplicateKey(DbException) and bool IsSchemaMissing(DbException).
  - AxisRepositoryBase declares abstract string ErrorPrefix and abstract void LogError(Exception, string).
  - The shared core maps failures using these hooks only; a new provider is added by implementing the five members, not by editing the mapping.
