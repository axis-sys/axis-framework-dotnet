id: repository-postgres-classification
title: The Postgres adapter classifies failures by NpgsqlException SqlState, not by message text
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  PostgresRepositoryBase implements the classification hooks against NpgsqlException.SqlState so detection is
  locale-independent — a Conflict must not become a generic 500 on a non-English server. Transient covers
  40001 (serialization failure), 40P01 (deadlock detected) and the connection classes 08006/08003/08001/57P03.
  Duplicate is 23505 (unique_violation). Schema-missing is 42P01 (undefined_table, raised by DML against a
  schema-qualified relation) and 3F000 (invalid_schema_name, raised when the schema is resolved first). The
  ErrorPrefix is POSTGRES; LogError routes through the typed logger.
invariants:
  - IsTransient matches NpgsqlException.SqlState in {40001, 40P01, 08006, 08003, 08001, 57P03}.
  - IsDuplicateKey matches SqlState 23505; IsSchemaMissing matches 42P01 or 3F000.
  - Classification reads SqlState, never the exception message; ErrorPrefix is "POSTGRES".
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresRepositoryBase.cs:15 — IsTransient / IsDuplicateKey / IsSchemaMissing by SqlState; ErrorPrefix POSTGRES"
examples:
