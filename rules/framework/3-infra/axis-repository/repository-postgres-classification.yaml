    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres.IntegrationTests/PostgresRepositoryBaseTests.cs:293 — a 42P01 missing relation maps to SCHEMA_NOT_READY"
  incorrect: []
