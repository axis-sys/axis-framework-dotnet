id: repository-unitofwork-in-transaction-railway
title: InTransactionAsync runs work on the railway — commit on success, roll back on a failed result or exception
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  IAxisUnitOfWork provides default InTransactionAsync methods (non-generic and generic) that wrap a unit of
  work as one railway step. They StartAsync, run the supplied work, TapErrorAsync(RollbackAsync) so a failed
  AxisResult rolls back, then ThenAsync(SaveChangesAsync) to commit only on success. If work throws, the only
  try/catch rolls back and re-throws — the exceptional-cleanup boundary. Success and failure flow is the
  railway chain, not if/else; the valueless Then preserves the result value across the commit.
invariants:
  - InTransactionAsync starts the transaction, and returns early without committing or rolling back when StartAsync fails.
  - A failed work result triggers RollbackAsync and no SaveChangesAsync.
  - A successful work result triggers SaveChangesAsync; the generic overload preserves the work's value across the commit.
  - A thrown exception inside work rolls back and re-throws (the only try/catch is this cleanup boundary).
