notes: >
  These are interface default methods, so every dialect adapter inherits the same commit/rollback choreography
  for free; an adapter only supplies Start/Save/Rollback. Re-throwing after rollback keeps a genuine defect
  visible rather than swallowing it into a rolled-back success.
