notes: >
  Without the shared instance, injecting IAxisDbRepository (bound to the provider unit of work) and
  IAxisUnitOfWork (to commit) would silently use two transactions. The MySQL provider is internal and its
  GetUnitOfWork throws ArgumentException on a null key; the Postgres provider is public.
