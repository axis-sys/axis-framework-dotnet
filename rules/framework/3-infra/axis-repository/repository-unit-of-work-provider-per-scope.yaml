id: repository-unit-of-work-provider-per-scope
title: The unit-of-work provider caches one instance per key per scope so both interfaces share one connection
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  The keyed IAxisUnitOfWork and provider interface must resolve to the SAME unit of work within a DI scope,
  otherwise a repository and its caller would each get a separate connection and transaction and the caller's
  SaveChanges would not commit the repository's writes. {Provider}UnitOfWorkProvider caches one unit of work
  per service key in a ConcurrentDictionary and both keyed registrations delegate to it. It uses GetOrAdd (not
  TryGetValue + TryAdd) so concurrent callers in the same scope all observe the single winning instance, never
  a discarded copy with its own connection.
invariants:
  - Both keyed registrations (IAxisUnitOfWork and the provider interface) resolve through the provider to one cached unit of work per key.
  - The provider caches per key with ConcurrentDictionary.GetOrAdd, so concurrent callers share the single winning instance.
  - Within a scope, the two interfaces for a key return the same instance (same connection and transaction).
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresUnitOfWorkProvider.cs:19 — GetUnitOfWork caches per key via GetOrAdd"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/DependencyInjection.cs:22 — both keyed registrations delegate to the provider"
examples:
