id: repository-keyed-db-repository-registration
title: AddAxis{Provider}DbRepository registers the concrete executor as scoped IAxisDbRepository bound to the keyed unit of work
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AddPostgresDbRepository(serviceKey) / AddMySqlDbRepository(serviceKey) register the ready-to-use concrete
  executor ({Provider}DbRepository) as the scoped IAxisDbRepository, resolving the provider unit of work by the
  same service key passed to AddAxis{Provider}UnitOfWork. This lets a shared, dialect-agnostic repository layer
  compose one provider executor by injecting IAxisDbRepository, without every application writing its own keyed
  subclass of the provider base. The executor and the unit of work it uses share the key, hence the same scope
  instance.
invariants:
  - AddPostgresDbRepository / AddMySqlDbRepository register {Provider}DbRepository as the scoped IAxisDbRepository.
  - The executor resolves the provider unit of work (IPostgresUnitOfWork / IMySqlUnitOfWork) by the same service key as the unit-of-work registration.
  - A shared repository composes the executor by injecting IAxisDbRepository; no per-key subclass is required.
reference:
