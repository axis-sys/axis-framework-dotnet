id: repository-execution-surface
title: IAxisDbRepository exposes exactly four execution methods with fixed result semantics
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The dialect-agnostic execution port has four members and no more. ExecuteAsync runs a non-query and returns
  AxisResult. ExecuteCountAsync runs a non-query and returns the rows-affected count as AxisResult<int>, so a
  caller can branch on "did the guarded UPDATE fire?" without a dialect-specific RETURNING or ROW_COUNT().
  GetAsync<T> maps the first row via a map delegate and returns AxisError.NotFound(notFoundCode) when no row
  matches. ListAsync<T> maps every row into an AxisResult<IEnumerable<T>>. NotFound is a value on the failure
  rail, not a null return.
invariants:
  - IAxisDbRepository declares exactly ExecuteAsync, ExecuteCountAsync, GetAsync<T> and ListAsync<T>.
  - ExecuteAsync returns AxisResult; ExecuteCountAsync returns AxisResult<int> carrying the rows-affected count.
  - GetAsync<T> maps the first row and returns AxisError.NotFound(notFoundCode) when the query yields no row.
  - ListAsync<T> maps every row into AxisResult<IEnumerable<T>>.
