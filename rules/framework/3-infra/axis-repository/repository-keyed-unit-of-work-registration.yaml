id: repository-keyed-unit-of-work-registration
title: AddAxis{Provider}UnitOfWork registers a keyed data source and a scoped unit of work behind both interfaces under one service key
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  Each Bounded Context registers its database with AddPostgresUnitOfWork(serviceKey, connectionString) or
  AddMySqlUnitOfWork(serviceKey, connectionString). The call registers a data source and a scoped per-key
  unit of work resolvable under that key behind BOTH IAxisUnitOfWork (dialect-agnostic) and the provider
  interface (IPostgresUnitOfWork / IMySqlUnitOfWork). The service key is the multi-database seam: several BCs,
  each with its own key and connection string, coexist in one process, and code injects the unit of work by key.
invariants:
  - AddPostgresUnitOfWork / AddMySqlUnitOfWork take a serviceKey and connectionString and register the data source keyed by serviceKey.
  - The unit of work is registered keyed and scoped behind both IAxisUnitOfWork and the provider interface (IPostgresUnitOfWork / IMySqlUnitOfWork) under the same key.
  - Multiple Bounded Contexts coexist by registering distinct service keys; consumers resolve the unit of work by key.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/DependencyInjection.cs:14 — AddPostgresUnitOfWork: keyed data source + keyed scoped IAxisUnitOfWork and IPostgresUnitOfWork"
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql/DependencyInjection.cs:14 — AddMySqlUnitOfWork: the MySQL twin"
examples:
