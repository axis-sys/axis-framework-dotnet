  reviewed_on: 2026-07-12
notes: >
  Keeping metrics and tracing on separate interfaces lets a component ask for IAxisMetrics without pulling in
  span machinery. The common swappable-infra-port pattern (IAxis* + AddAxis* swaps the adapter via DI) is
  canonical in axis-dotnet-architect; here telemetry diverges from most ports by NOT returning AxisResult.
