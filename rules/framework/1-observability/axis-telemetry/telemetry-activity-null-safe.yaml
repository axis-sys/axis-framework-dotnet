id: telemetry-activity-null-safe
title: An unsampled span is a silent no-op — ActivityAxisSpan tolerates a null Activity
tier: framework
family: 1-observability
package: AxisTelemetry
concern: package-mechanics
layer: driven
lens: [observability, performance]
severity: must
status: canonical
description: >
  ActivityAxisSpan is the internal Activity-backed IAxisSpan the OpenTelemetry adapter returns. Its Activity
  can be null — ActivitySource.StartActivity returns null when no listener is attached OR when sampling drops
  the span — and every member is written to survive that: SetTag/SetStatus/RecordException/AddEvent/Dispose
  all use `activity?.`, and TraceId/SpanId fall back to string.Empty. So a dropped or unsampled span is a
  fully silent no-op that still chains and never throws; instrumentation code needs no null checks.
invariants:
  - StartActivity returns null when nothing listens or when sampling drops the span; ActivityAxisSpan wraps that null without failing.
  - Every ActivityAxisSpan member guards the Activity with `activity?.` so all operations are no-ops on a null Activity.
  - On a null Activity, TraceId and SpanId return string.Empty and the mutators still return the span.
