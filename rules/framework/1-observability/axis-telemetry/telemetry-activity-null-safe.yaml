notes: >
  The sampling gotcha — because sampling drops produce a null Activity, span tags set on an unsampled request
  simply vanish rather than erroring, and TraceId/SpanId read as empty strings. ActivityAxisSpan is internal
  (InternalsVisibleTo the UnitTests project); callers only ever see it through IAxisSpan.
