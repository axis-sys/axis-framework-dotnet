  reviewed_on: 2026-07-12
notes: >
  The returned-failure vs thrown-exception distinction is the key gotcha for sink queries — failure rate
  comes from invocations(ResultSuccess=false), exception rate from the separate exceptions counter, and the
  two do not overlap.
