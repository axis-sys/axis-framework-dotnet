id: telemetry-span-kind
title: AxisSpanKind is the five span kinds, defaulting to Internal
tier: framework
family: 1-observability
package: AxisTelemetry
concern: package-mechanics
layer: contracts
lens: [observability]
severity: should
status: canonical
description: >
  AxisSpanKind classifies a span for downstream tooling (trace waterfalls, service graphs): Internal for
  in-process work such as a handler or validator, Server for an inbound request, Client for an outbound call
  (HTTP / DB / external), Producer for publishing a message, Consumer for consuming one. StartSpan defaults
  the kind to Internal, so a plain StartSpan(name) is an internal span. Pick the kind that matches the
  operation; the OpenTelemetry adapter maps it one-to-one onto ActivityKind.
invariants:
  - AxisSpanKind has exactly five values — Internal, Server, Client, Producer, Consumer.
  - StartSpan's kind parameter defaults to AxisSpanKind.Internal.
reference:
