notes: >
  This is the canonical gotcha — the no-op adapter is the way to disable telemetry, not conditional call
  sites. The unit-test TestHost must still register a telemetry sink (Null is the natural choice) because the
  behavior pipeline resolves IAxisTelemetry/IAxisMetrics at runtime.
