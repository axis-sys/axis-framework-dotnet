notes: >
  Lives in AxisLogger (1-observability), not AxisResult (0-foundations): AxisResult must stay
  dependency-free, and AxisLogger already has visibility into AxisResult (proven by the pre-existing
  LogResult method) — no new package needed, unlike Axis.Testing which specifically had to be usable
  without dragging in the full observability stack. Severity is a small closed Axis-native enum
  (AxisFailureLogSeverity: Warning|Error; AxisSuccessLogSeverity: Information|Warning), not
  Microsoft.Extensions.Logging.LogLevel, to keep IAxisLogger's interface layer decoupled from MEL (it
  deliberately exposes named methods, not a generic Log(level, ...)) and to make illegal severities
  unrepresentable. Discovered while reviewing a reference-app background worker
  (ReconcilerPollLoop) that hand-rolled `if (result.IsFailure) logger.LogWarning(...)` at every poll.
