id: logger-registration-scoped
title: AddAxisLogger registers IAxisLogger as an open-generic Scoped service
tier: framework
family: 1-observability
package: AxisLogger
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AddAxisLogger() wires the logger with two calls — AddLogging() (so the underlying ILogger<T> pipeline
  exists even if the host forgot it) and AddScoped(typeof(IAxisLogger<>), typeof(AxisLogger<>)) — and returns
  the same IServiceCollection for chaining. Scoped is deliberate: the logger reads request-scoped correlation
  ids from the ambient IAxisMediator, so its lifetime matches the request.
invariants:
  - AddAxisLogger calls AddLogging() and registers IAxisLogger<> -> AxisLogger<> as an open generic with a Scoped lifetime.
  - AddAxisLogger returns the same IServiceCollection so registration can be chained.
  - AddAxisLogger does not register TimeProvider; AxisLogger<T> needs TimeProvider and IAxisMediator from DI, so one of them must be registered elsewhere.
