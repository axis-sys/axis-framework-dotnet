notes: >
  Gotcha — AddAxisLogger() alone does not register TimeProvider, which AxisLogger<T>'s ctor requires; the
  unit tests add TimeProvider.System explicitly, and in an app AddLoggingBehavior() (or the host) supplies
  it. Scoped, not Singleton, because the ambient correlation ids are per request.
