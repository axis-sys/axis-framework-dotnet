notes: >
  The object? value type lets a sink destructure (e.g. Serilog renders ("Order", order) per its config). A
  value passed under a key that collides with an always-on default (UtcTime/OriginId/TraceId/JourneyId)
  overwrites it — see logger-ambient-scope-enrichment.
