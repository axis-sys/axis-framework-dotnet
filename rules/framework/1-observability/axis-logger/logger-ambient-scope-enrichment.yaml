notes: >
  Per-entry BeginScope is the right tool for per-request fields, unlike a global Serilog enricher (correct
  only for static fields) or a manual LogContext.PushProperty (easy to leak). Outside a mediator scope there
  is no ambient IAxisMediator to read, so use ILogger<T> directly there instead.
