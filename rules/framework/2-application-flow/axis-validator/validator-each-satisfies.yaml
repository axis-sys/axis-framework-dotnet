id: validator-each-satisfies
title: EachSatisfies applies a predicate to every item of a collection property
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  EachSatisfies validates each element of an IEnumerable<TItem> property against a Func<TItem?, bool>. It
  builds on RuleForEach, so the predicate runs per item and any failing item fails the collection with the
  error code.
invariants:
  - EachSatisfies runs the predicate against each item of the collection via RuleForEach.
  - The collection fails with the error code when any single item makes the predicate return false.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation/AxisValidatorBase.cs:203 — RuleForEach(...).Must(item => predicate(item))"
examples:
  correct:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation.UnitTests/AxisValidatorBaseTests.cs:768 — all valid passes; one invalid item fails with the code"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-validator
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/2-ApplicationFlow/AxisValidator/validator-base.md"
ledger:
