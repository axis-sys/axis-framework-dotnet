id: validator-satisfies
title: Satisfies asserts a custom predicate over the property or over the whole instance
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  Satisfies is the general single-field predicate helper with two overloads: one takes Func<TProperty?, bool>
  over just the property value, the other takes Func<T, TProperty?, bool> with access to the whole instance
  for a cross-field check. The property value is passed as-is (including null), so the predicate must handle
  null itself; a false result fails with the error code.
invariants:
  - The property-only overload runs Func<TProperty?, bool> over the property value and fails with the code when it returns false.
  - The instance overload runs Func<T, TProperty?, bool> with the root instance and the property value for cross-field checks.
  - The value is passed to the predicate unfiltered, including null, so the predicate must guard null itself.
