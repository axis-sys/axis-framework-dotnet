id: validator-required-slug
title: RequiredSlug requires a present string of slug characters within the length limit
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  RequiredSlug validates a URL-safe identifier. The value must be present, at most the given length (default
  255), and composed only of ASCII letters, digits, hyphen and underscore. Whitespace, punctuation, dots,
  slashes and accented characters all fail.
invariants:
  - The value must pass the presence check (not null, empty or whitespace-only).
  - Every character must be in [a-zA-Z0-9-_]; whitespace, punctuation and accented characters fail.
  - The value length must be at most the given length, which defaults to 255.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation/AxisValidatorBase.cs:92 — presence + Length <= length + All(IsValidSlugChar)"
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation/AxisValidatorBase.cs:101 — IsValidSlugChar allows a-z A-Z 0-9 - _"
examples:
  correct:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation.UnitTests/AxisValidatorBaseTests.cs:217 — valid slugs pass; whitespace, special chars, accents and too-long fail"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-validator
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/2-ApplicationFlow/AxisValidator/validator-base.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The slug alphabet is ASCII-only by design; "ação" fails on the accented characters.
