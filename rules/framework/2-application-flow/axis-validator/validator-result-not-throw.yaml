    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation.UnitTests/AxisValidatorBaseTests.cs:479 — adapter returns Ok on valid and a coded failure on invalid"
  incorrect: []
exceptions: []
derives_to:
