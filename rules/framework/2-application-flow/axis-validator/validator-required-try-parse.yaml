id: validator-required-try-parse
title: RequiredTryParse requires a present string that a custom parse predicate accepts
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  RequiredTryParse is the extension point for custom format checks. When the value is null it fails the
  presence check; when present it must be present AND the supplied Func<object?, bool> parse must return true.
  The predicate receives the boxed property value, so a validator plugs in any TryParse-style function
  (int.TryParse, CpfValidator.Validate, SsnValidator.Validate, ...).
invariants:
  - A null value fails RequiredTryParse with the presence check.
  - A present value must additionally make the supplied parse predicate return true.
  - The parse delegate receives the property value as object? and decides validity.
reference:
  kind: framework-source
  at:
