id: validator-max-count
title: MaxCount caps a collection's size and treats null as valid
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  MaxCount bounds the number of elements. A null collection passes (MaxCount is an upper bound, not a
  presence check); a non-null collection must have at most max items. It counts via ICollection.Count when
  available, otherwise by enumeration.
invariants:
  - A null collection passes MaxCount.
  - A non-null collection must have at most max items.
  - A non-null collection with more than max items fails with the error code.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation/AxisValidatorBase.cs:181 — Must(collection is null or CountOf(collection) <= max)"
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation/AxisValidatorBase.cs:124 — CountOf uses ICollection.Count or enumeration"
examples:
  correct:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation.UnitTests/AxisValidatorBaseTests.cs:670 — within-limit passes, above-limit fails, null passes"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-validator
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/2-ApplicationFlow/AxisValidator/validator-base.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  Compose with RequiredCollection when the collection must be both present and bounded.
