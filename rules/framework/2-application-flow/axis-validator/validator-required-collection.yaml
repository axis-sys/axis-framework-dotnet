id: validator-required-collection
title: RequiredCollection requires a non-null collection with at least one item
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  RequiredCollection is the presence helper for collections. The property must be non-null AND contain at
  least one element; a null or empty collection fails. It counts efficiently, using ICollection.Count when
  available and otherwise enumerating just enough to prove non-emptiness.
invariants:
  - A null collection fails RequiredCollection.
  - An empty collection fails RequiredCollection.
  - A collection with one or more items passes.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation/AxisValidatorBase.cs:173 — Must(collection is not null and HasAny(collection))"
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation/AxisValidatorBase.cs:108 — HasAny uses ICollection.Count or a single MoveNext"
examples:
  correct:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation.UnitTests/AxisValidatorBaseTests.cs:637 — with items passes; empty and null fail with the code"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-validator
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/2-ApplicationFlow/AxisValidator/validator-base.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  Contrast with MaxCount, where a null collection passes; RequiredCollection is the presence assertion.
