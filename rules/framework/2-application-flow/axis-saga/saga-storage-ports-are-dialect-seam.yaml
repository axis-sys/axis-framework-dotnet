id: saga-storage-ports-are-dialect-seam
title: The engine talks only to storage ports; each dialect implements them and never throws
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The saga runtime is fully dialect-agnostic. The engine, mediator, resumer and janitor never spell out SQL —
  they call four store ports (ISagaInstanceStore, ISagaStageLogStore, ISagaDefinitionStore) plus
  IAxisSagaStorageInitializer, and each database (Postgres, MySQL, …) provides one set of implementations. The
  instance-store contract is explicit that every method converts exceptions into AxisResult and never throws;
  duplicate ids map to Conflict("SAGA_ID_ALREADY_EXISTS"). Adding a new backend means implementing these ports,
  nothing in the runtime changes.
invariants:
  - The runtime (engine, mediator, resumer, janitor) depends only on the store ports and the storage initializer, never on dialect SQL.
  - Store implementations return AxisResult and never throw; e.g. a duplicate id is mapped to AxisError.Conflict("SAGA_ID_ALREADY_EXISTS").
  - A new storage backend is added by implementing the four store ports + IAxisSagaStorageInitializer; the dialect-agnostic runtime is reused unchanged.
