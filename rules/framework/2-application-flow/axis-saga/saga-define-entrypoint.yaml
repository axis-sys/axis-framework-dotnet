id: saga-define-entrypoint
title: A saga is declared once through AxisSagaDefinitions.Define<TPayload>(name, configure)
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  Every saga topology is authored by calling the static AxisSagaDefinitions.Define<TPayload>(sagaName,
  configure), which news up an AxisSagaConfigurator<TPayload>, runs the caller's configure delegate and
  returns the compiled, immutable AxisSagaDefinition. The convention is a static Configure(IAxisSagaConfigurator)
  method per saga wrapped by Define; the resulting definition is registered as a singleton so the registry
  and the initializer pick it up. TPayload is constrained to a reference type (class).
invariants:
  - A saga topology is produced only by AxisSagaDefinitions.Define<TPayload>(sagaName, configure); it returns a compiled AxisSagaDefinition.
  - The configure delegate is required; Define calls ArgumentNullException.ThrowIfNull(configure) before building.
  - TPayload is constrained to class (a reference type), matching every saga surface (configurator, stage builder, handler, instance).
  - The compiled AxisSagaDefinition is immutable (a record of SagaName, PayloadType, ForwardStages, ErrorStages) and is registered as a singleton so the in-memory registry loads it at startup.
