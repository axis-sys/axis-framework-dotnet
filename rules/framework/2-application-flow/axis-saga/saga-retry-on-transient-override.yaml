id: saga-retry-on-transient-override
title: RetryOnTransient overrides the transient-retry cap for a single stage
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: application
severity: may
status: canonical
description: >
  A stage may override the global transient-retry policy with RetryOnTransient(maxAttempts, baseDelay?).
  maxAttempts is the total attempt count and must be >= 1 (1 disables retry); baseDelay defaults to the global
  AxisSagaSettings value when null. Omitting the call inherits both global settings — the definition carries
  nullable TransientRetryMaxAttempts / TransientRetryBaseDelay whose null means inherit. maxAttempts < 1 or a
  negative delay throws ArgumentOutOfRangeException at configuration time.
invariants:
  - RetryOnTransient(maxAttempts, baseDelay?) sets the stage's TransientRetryMaxAttempts and TransientRetryBaseDelay overrides.
  - maxAttempts must be >= 1; a value below 1 throws ArgumentOutOfRangeException, and a negative baseDelay throws ArgumentOutOfRangeException.
  - Omitting RetryOnTransient (or passing baseDelay=null) leaves the override null, so the engine inherits the global AxisSagaSettings value.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisSaga/AxisSaga/Core/AxisSagaStageBuilder.cs:51 — RetryOnTransient validates and records the per-stage override"
    - "src/2-ApplicationFlow/AxisSaga/AxisSaga/Contracts/Configuration/AxisSagaStageDefinition.cs:16 — nullable TransientRetryMaxAttempts / TransientRetryBaseDelay (null inherits)"
examples:
