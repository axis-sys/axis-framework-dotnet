id: saga-stage-logs-append
title: The engine appends one stage-log row per stage attempt, and log write failures are swallowed
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The engine writes a forensic stage-attempt log through ISagaStageLogStore: WriteStarted when it picks a stage
  up, then MarkCompleted on success or MarkFailed (with the first/joined error codes) on failure. This is the
  Started -> Completed | Failed trail the resumer reads to skip stages that already succeeded after a crash.
  Stage-log write failures are logged and swallowed by the implementation — a missing log line is recoverable
  (the next run just re-executes the stage), so it is never propagated as a saga failure.
invariants:
  - The engine writes exactly one Started row per stage attempt, then one Completed (success) or Failed (failure, with error codes) row.
  - The stage log is what saga-skip-completed-stage-on-resume consults (IsCompletedAsync) to avoid re-running a completed stage.
  - Stage-log write failures are swallowed by the store, never surfaced as a saga failure, because a missing log is recoverable.
reference:
