id: saga-error-code-contract
title: AxisSagaErrors holds the stable saga error-code constants
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: any
severity: should
status: canonical
description: >
  The saga runtime reports failures with the string codes in AxisSagaErrors — SagaDefinitionNotFound,
  SagaInstanceNotFound, StageHandlerNotFound, StageNotFound, ConcurrencyConflict, PayloadDeserializationFailed,
  PayloadSerializationFailed, PersistenceFailed. These constants (plus the store-owned
  SAGA_ID_ALREADY_EXISTS / validation codes) are the stable code contract callers pivot on, carried on the
  AxisError and persisted to LAST_ERROR_CODE. Match on the code, not the human-readable message.
invariants:
  - Saga failures carry an AxisSagaErrors code (or a store/validation code such as SAGA_ID_ALREADY_EXISTS), and these codes are the stable contract callers match on.
  - The code, not the message, is what downstream code and the persisted LAST_ERROR_CODE key on.
