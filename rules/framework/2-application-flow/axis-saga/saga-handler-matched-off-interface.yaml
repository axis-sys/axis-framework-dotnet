id: saga-handler-matched-off-interface
title: The invoker matches a handler by SagaName + StageName read off the interface type
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  A handler is selected by content, not by type: for the runtime payload type the invoker resolves every
  registered IAxisSagaStageHandler<TPayload> and picks the one whose SagaName and StageName match the stage
  being run. Those two properties are read off the INTERFACE type via the type's interface map, so a handler
  that implements the contract explicitly (string IAxisSagaStageHandler<T>.SagaName => ...) still matches —
  reading the concrete type would see only public members and miss explicit implementations. Two sagas can
  share a payload type; the (SagaName, StageName) pair disambiguates.
invariants:
  - The invoker resolves all IAxisSagaStageHandler<TPayload> and matches by SagaName == sagaName && StageName == stageName.
  - SagaName/StageName are read off the interface type (not the concrete class) so explicit interface implementations match.
  - No matching handler yields AxisError.NotFound("SAGA_STAGE_HANDLER_NOT_FOUND_...") rather than an exception.
