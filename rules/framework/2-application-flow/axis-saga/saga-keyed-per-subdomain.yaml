  reviewed_on: 2026-07-12
notes: >
  The AddSingleton<IHostedService> vs AddHostedService<T> distinction is load-bearing: AddHostedService uses
  TryAddEnumerable, which would silently drop a second key's worker and collide with the keyless one.
