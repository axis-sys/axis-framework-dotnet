id: saga-handlers-di-registration
title: AddAxisSagaHandlers scans an assembly and registers each stage handler as scoped
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  Stage handlers are wired by AddAxisSagaHandlers(assembly): it finds every non-abstract, non-generic class
  implementing IAxisSagaStageHandler<> and registers it as scoped against each implementing interface variant.
  Handlers are discovered by scan, not registered one by one, and they stay UNKEYED even under the keyed
  (per-subdomain) saga registration — the invoker matches them by (payload type, saga name, stage name), so a
  single set of handlers serves every keyed store.
invariants:
  - AddAxisSagaHandlers(assembly) registers every non-abstract, non-generic IAxisSagaStageHandler<> implementation as scoped, once per implementing interface variant.
  - Handlers are discovered by assembly scan, not registered individually.
  - Stage handlers stay unkeyed by design, even alongside the keyed per-subdomain saga stores; the invoker matches by content.
