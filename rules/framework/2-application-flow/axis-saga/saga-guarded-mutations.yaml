    - "src/2-ApplicationFlow/AxisSaga/Postgres/AxisSaga.Postgres.IntegrationTests/SagaLeaseConcurrencyTests.cs:65 — concurrent runs execute the stage once (version/lease guard)"
  incorrect: []
exceptions: []
