notes: >
  The runner token is unique per poll pass (not per row), mirroring AxisSagaResumerWorker. At-least-once, not
  exactly-once end-to-end: handlers must be idempotent. Only the partition head is ever claimed (FIFO per
  ordering key), so a failing head halts its partition until it clears rather than advancing past it.
