id: bus-outbox-enqueue-in-uow-transaction
title: Publishing enqueues on a request-scoped queue the unit of work drains into its own transaction at commit
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The atomic-outbox adapter never writes on its own connection. IAxisBus.PublishAsync only ENQUEUES the event
  on a request-scoped IOutboxScopedQueue (resolving the ordering key, stamping the ambient trace/journey,
  serializing) and returns an enqueue acknowledgement. The business unit of work drains that queue through
  IAxisRepositoryOutbox.DrainAsync into its OWN connection and transaction immediately before COMMIT, so the
  event rows and the business state change land atomically — commit persists both, rollback persists neither.
  There is no autocommit and no separate connection for the write path, so an event cannot be published without
  a committing unit of work to drain it.
invariants:
  - PublishAsync enqueues on the request-scoped IOutboxScopedQueue and never opens a connection or inserts a row itself.
  - The unit of work invokes IAxisRepositoryOutbox.DrainAsync(connection, transaction) between its guards and CommitAsync, writing the queued rows on the unit of work's own connection and transaction.
  - The event rows and the business state commit atomically in one transaction; a drain failure aborts the commit so neither persists.
  - A drained event requires a committing unit of work — there is no autocommit write path and no way to publish an event outside a unit of work.
  - In application code the publish therefore PRECEDES SaveChangesAsync; a publish placed after the commit enqueues on a queue no commit will drain and the event is silently lost.
