notes: >
  This is the textbook transactional outbox: the event and the state share one transaction, closing the
  dual-write window the previous autocommit model left open (bus-outbox-autocommit-no-enlist, superseded).
  Delivery is still at-least-once and handlers must be idempotent — the atomicity is between the state write and
  the outbox row, not between the row and its later dispatch. The connection factory now serves only the
  read/dispatch path.
