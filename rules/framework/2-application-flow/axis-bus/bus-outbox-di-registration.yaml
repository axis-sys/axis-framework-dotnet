notes: >
  Scoped-because-ambient-logger is the same reason the AxisCache L2 store and the AxisSaga stores are scoped;
  the poll worker resolves these scoped services from its own fresh per-pass scope, never the root scope. The
  hosted initializer and dispatcher workers are registered here too, each behind a settings flag
  (bus-outbox-hosted-workers).
