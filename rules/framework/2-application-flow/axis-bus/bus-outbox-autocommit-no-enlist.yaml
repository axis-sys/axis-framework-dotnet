id: bus-outbox-autocommit-no-enlist
title: Outbox writes are autocommit and do not enlist in the business transaction
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: should
status: superseded
superseded_by: bus-outbox-enqueue-in-uow-transaction
description: >
  The durable adapter owns its own pooled data source through IAxisBusConnectionFactory, separate from the
  application's request-scoped unit of work. Each outbox INSERT runs autocommit on its own connection and
  never enlists in the caller's business transaction. So the adapter's guarantee is durability and
  at-least-once delivery — not single-transaction atomicity between the triggering state change and the
  publish. A row can be written whose business change later rolls back, or vice versa.
invariants:
  - The connection factory owns a pooled data source outside the request-scoped unit of work.
  - An outbox write is autocommit on its own connection and does not join the caller's business transaction.
  - The adapter provides durability/at-least-once delivery, not atomic dual-write with the business state change.
