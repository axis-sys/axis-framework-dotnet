id: bus-outbox-store-no-throw-ambient-ct
title: The outbox store never throws and reads the ambient cancellation token
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: superseded
superseded_by: bus-outbox-enqueue-in-uow-transaction
description: >
  BusEventStore is the dialect-agnostic write store. It drives plain parameterized ADO.NET over a
  DbConnection and returns an AxisResult on every path — a caught exception is logged and returned as
  AxisError.InternalServerError(AXIS_BUS_PERSISTENCE_FAILED), never rethrown. The CancellationToken is read
  from the ambient IAxisMediatorAccessor, never taken as a method parameter.
invariants:
  - Every BusEventStore path returns an AxisResult; a thrown DB exception is caught, logged, and returned as AxisError PersistenceFailed.
  - The store reads its CancellationToken from IAxisMediatorAccessor.AxisMediator?.CancellationToken, not from a parameter.
  - SQL is executed with bound DbParameters (never string-interpolated values), the try/catch living at this adapter edge.
