notes: >
  SUPERSEDED by bus-outbox-enqueue-in-uow-transaction. There is no longer a standalone BusEventStore: the write
  path is RepositoryOutboxDrain, which still never throws (returns an AxisResult error that aborts the commit) and
  still binds every value as a DbParameter, but takes its CancellationToken as an explicit parameter from the
  unit of work rather than reading the ambient IAxisMediatorAccessor. The dispatch-side store
  (IBusEventDispatchStore) is likewise driven by the background worker with an explicit token. Kept for history.
