id: bus-outbox-scope-per-row
title: The dispatcher resolves handlers in a fresh service scope per row
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  For every outbox row the dispatcher creates a new IServiceScope from the injected IServiceScopeFactory and
  resolves that row's handlers from it — never from the dispatcher's own scope. This gives each row's handlers
  the same isolation a normal request-scoped PublishAsync would get: one row's handlers never share scoped
  state (a DbContext, a unit of work) with another row's.
invariants:
  - The dispatcher opens a new IServiceScope per row via IServiceScopeFactory and resolves the row's handlers from it.
  - One row's handlers never share scoped dependencies with another row's handlers.
  - The poll worker likewise runs each pass in its own fresh scope, never the container's root scope.
