id: bus-outbox-single-storage-per-process
title: A process registers exactly one AxisBus storage adapter
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AddAxisBusPostgres and AddAxisBusMySql each guard against double registration: if an AxisBusRepositorySettings
  is already in the container they throw InvalidOperationException. AxisBus supports a single durable storage
  per process by design, so the adapter must be registered exactly once at startup — you cannot wire both the
  Postgres and the MySQL outbox, nor register the same one twice.
invariants:
  - AddAxisBusPostgres / AddAxisBusMySql throws InvalidOperationException if an AxisBus storage adapter is already registered.
  - A process wires exactly one durable AxisBus storage adapter, called once at startup.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisBus/Repository/Postgres/AxisBus.Postgres/DependencyInjection.cs:18 — throws if AxisBusRepositorySettings already registered"
    - "src/2-ApplicationFlow/AxisBus/Repository/MySql/AxisBus.MySql/DependencyInjection.cs:19 — same single-storage guard for MySQL"
examples:
  correct: []
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-bus
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/2-ApplicationFlow/AxisBus/custom-adapter.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The guard keys on the presence of AxisBusRepositorySettings, which AddAxisBusRepositoryCore registers as a
  singleton — so any core-backed storage adapter trips it.
