notes: >
  In MySQL a SCHEMA is a database, so the runner issues CREATE SCHEMA IF NOT EXISTS for AXIS_OUTBOX. The
  no-status, delete-on-dispatch shape is the core difference from the earlier design; the table keeps the
  SAGA_INSTANCES lease columns but drops any retention window.
