ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  SUPERSEDED by bus-outbox-lease-claim. The atomic-outbox redesign removed retention entirely: there is no
  terminal Processed/Failed status, no DELETE_NOT_BEFORE and no RetainForSeconds. A dispatched row is DELETED
  immediately (delete-after-dispatch) and a failed row keeps its place for re-claim — the presence of a row is
  the pending state. Kept for history.
