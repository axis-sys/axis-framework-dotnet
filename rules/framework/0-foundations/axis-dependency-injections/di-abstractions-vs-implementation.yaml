id: di-abstractions-vs-implementation
title: The Abstractions variant re-exports the DI contracts; the unsuffixed variant re-exports the container
tier: framework
family: 0-foundations
package: AxisDependencyInjections
concern: package-mechanics
layer: build
severity: must
status: canonical
description: >
  The package ships in two variants that mirror Microsoft's own abstractions/implementation split.
  AxisDependencyInjections.Abstractions re-exports the DI contracts; AxisDependencyInjections re-exports the
  container implementation on top of them. A project picks the abstractions variant to name only IServiceCollection
  and the unsuffixed variant only to construct or inspect the container itself.
invariants:
  - AxisDependencyInjections.Abstractions depends only on Microsoft.Extensions.DependencyInjection.Abstractions, re-exporting the DI contracts (IServiceCollection, IServiceProvider, ServiceLifetime and the ServiceCollection registration-extension helpers) without the container implementation.
  - AxisDependencyInjections depends on Microsoft.Extensions.DependencyInjection, re-exporting the container implementation (ServiceCollection, ServiceProvider, BuildServiceProvider) on top of those contracts.
  - A project references the Abstractions variant to declare an AddAxis*(this IServiceCollection) registration extension, and needs the unsuffixed variant only when it must build or inspect the container itself.
reference:
  kind: framework-source
  at:
