notes: >
  The sole consumer of the unsuffixed variant, AxisValidator.FluentValidation, uses only abstraction-level helpers
  (AddScoped/AddTransient live in the Abstractions package), so its reference to the container variant is not
  strictly required. The abstractions/implementation selection is a design intent, not yet enforced by any hook.
