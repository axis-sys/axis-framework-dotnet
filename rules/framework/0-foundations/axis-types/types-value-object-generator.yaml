id: types-value-object-generator
title: The [ValueObject] generator emits the conversions, equality and TryParse; the author writes the ctor and validation
tier: framework
family: 0-foundations
package: AxisTypes
concern: package-mechanics
layer: any
severity: must
status: canonical
description: >
  The [ValueObject] incremental source generator turns a partial type into a string-backed value object.
  It emits the mechanical half — the string conversions, ToString, case-insensitive equality and TryParse
  — into a matching partial that mirrors the declared kind, while the author supplies the private
  constructor, the backing property and the validation. Each generated feature is toggled by an option on
  the attribute.
invariants:
  - The [ValueObject] attribute applies to a class or struct, and the generator emits a partial of the same declared kind, mirroring readonly record struct, readonly struct, partial struct, partial record or partial class.
  - The generator always emits an implicit conversion to string and a ToString, both returning the backing property named by PropertyName (default "Value").
  - The generator conditionally emits implicit-from-string (ImplicitFromString), case-insensitive Equals plus GetHashCode (CaseInsensitiveEquals) and TryParse (TryParse), each gated by its attribute option.
  - The generator never emits the constructor, the backing property or any validation — the author writes those in the hand-written partial.
  - The ValueObjectAttribute is emitted internal sealed via RegisterPostInitializationOutput, so a consumer references the generator only, with no runtime package.
