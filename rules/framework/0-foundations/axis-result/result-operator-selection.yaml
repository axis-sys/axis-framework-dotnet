notes: >
  This is the discovery rule for the AxisResult cluster: each invariant is one row of the
  smell-to-operator mapping, and every named operator is verified present in the framework source
  (Functional, Factory, Extensions.Parallel, Extensions.Rop, AxisError). The reference app's rulebook
  states the same routing habit; that convention-tier rule becomes an examples anchor once migrated.
