notes: >
  Born from a field case: a client processor deconstructed every intermediate result
  (var (ok, value, errors) = await step) and guarded with if (!ok) return, silently escaping
  AXIS0002 (which sees only IsSuccess/IsFailure member access) while abandoning the rail. The
  analyzer inspects how the extracted flag is consumed and suggests the fitting operator in the
  diagnostic message (guard-return -> Then/ThenAsync; log-in-guard -> TapError/LogIfFailure;
  two-arm ternary -> Match/MatchAsync).
