notes: >
  Two surface decisions are deliberate: (1) next is same-type by design — the false branch returns
  this, so a transforming variant to TNew could not type-check; conditional transformation to a NEW
  type still routes to Then with the branch inside the lambda (see result-thenunless-success-guard
  notes for the shared history of this decision); (2) the predicate is synchronous by design — an
  async check that can fail is a validation and routes to Ensure or Then. The idempotency guard at
  the TOP of a saga stage handler intentionally stays an imperative if returning Ok(payload)
  (architecture-saga-stage-handlers), not a ThenWhen — the pipeline has not started there and the
  guard reads better as an entry check; ThenWhen is for conditions over values born MID-pipeline.
