id: result-thenwhen-conditional-step
title: Run a same-type transforming step only when a condition on the value holds with ThenWhen
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: must
status: canonical
description: >
  ThenWhen is the conditional step: it runs the fallible, same-type transforming next only when the
  predicate over the flowing value is true, and passes the success through untouched when the
  predicate is false — the step simply does not apply. It replaces the ternary
  cond ? Step(x) : Ok(x) written inside a Then lambda. It is the mirror of ThenUnless: where
  ThenUnless guards a valueless side effect (the value always survives), ThenWhen's next returns
  AxisResult<TValue> and, when it runs, its result REPLACES the flowing one. The value type cannot
  change — a conditional step producing a different type still routes to Then with the branch inside
  the lambda, because the pass-through branch could not produce the new type.
invariants:
  - ThenWhen is defined only on AxisResult<TValue>; the predicate reads the flowing value and next returns AxisResult<TValue> of the same type.
  - When the predicate is false, the result passes through unchanged (value preserved) and next never runs.
  - When the predicate is true, next runs and its result replaces the flowing one — a transformed value on success, next's errors on failure.
  - An already-failed upstream result short-circuits — neither the predicate nor next runs.
  - The predicate is always synchronous (Func<TValue, bool>); async variants (Task, ValueTask and CancellationToken-aware) exist only for next.
