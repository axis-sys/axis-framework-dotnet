id: result-map-cannot-fail
title: Use Map for a transform that cannot fail; Then for one that can
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: must
status: canonical
description: >
  Map projects the success value from T to TNew with a function that cannot fail, and is skipped on
  the failure rail so the errors flow through untouched. Map invokes the mapper directly with no
  try/catch, so an exception thrown inside it is treated as a programmer bug and propagates rather
  than becoming an AxisError. Any step that can fail returns AxisResult and belongs in Then.
invariants:
  - On the success rail Map projects the value from T to TNew and returns Ok with the projected value.
  - On the failure rail Map is skipped and the existing errors propagate unchanged.
  - Map invokes the mapper with no try/catch, so an exception thrown inside it propagates and never becomes an AxisError.
  - A step that can fail returns AxisResult and belongs in Then, not Map.
reference:
