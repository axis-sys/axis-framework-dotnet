id: result-thenunless-success-guard
title: Skip a fallible step when the desired state already holds with ThenUnless
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: must
status: canonical
description: >
  ThenUnless is the success guard: it runs the fallible next step only when the predicate over the
  flowing value is false, and passes the success through untouched when the predicate is true — the
  state you want already holds, so there is nothing to do. It replaces the manual ternary
  cond ? Ok() : Step() and the guard if (!cond) return Ok() that break out of the rail. It guards
  ONE step, not the rest of the chain: the success it returns keeps flowing, and a sub-chain that
  should be skipped as a whole is composed inside next.
invariants:
  - ThenUnless is defined only on AxisResult<TValue>; the predicate reads the flowing value.
  - When the predicate is true, the result passes through unchanged (value preserved) and next never runs.
  - When the predicate is false, the fallible next runs; on next success the original value is preserved, on next failure the next's errors propagate as AxisResult<TValue>.
  - An already-failed upstream result short-circuits — neither the predicate nor next runs.
  - The predicate is always synchronous (Func<TValue, bool>); async variants (Task, ValueTask and CancellationToken-aware) exist only for next.
