notes: >
  Three surface decisions are deliberate and should not be reopened casually: (1) no valueless form —
  like Ensure, the operator needs a flowing value for the predicate, and a bare-bool overload would
  invite condition-outside-the-rail usage; (2) no transforming variant to a DIFFERENT type (next
  returning AxisResult<TNew>) — the pass-through branch returns this, so the return type could not
  be consistent; a SAME-type conditional transformation routes to the sibling ThenWhen
  (result-thenwhen-conditional-step), and a type-changing one still routes to Then with the branch
  inside the lambda; (3) the predicate is synchronous by design — an async check that can fail is a
  validation and routes to Ensure or Then. This operator is the canonical destination for the
  success-side branch smell that result-no-if-else-flow flags.
