notes: >
  TapError and TapErrorAsync are virtual/overridden alongside Tap so both rails can be observed in one
  pipeline. The reference app documents the same observe-only semantic in its rulebook; that rule
  becomes an examples.correct anchor once the convention tier is migrated.
