id: result-tap-side-effects
title: Observe with Tap (success) and TapError (failure); they never alter the result
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: should
status: canonical
description: >
  Tap runs a success-only side effect (log, metric, accumulate) and returns the result intact;
  TapError observes failures the same way. Neither changes the rail nor the value — they only
  observe. Because Tap ignores the effect's outcome while Then propagates it, use Then whenever the
  effect can itself fail and must short-circuit the pipeline.
invariants:
  - Tap runs its action only when the result IsSuccess and returns the same result unchanged.
  - TapError runs its action only when the result IsFailure and returns the same result unchanged.
  - Tap and TapError never alter the success/failure rail nor the carried value.
  - Tap ignores the effect's outcome and never fails the rail; if the effect can fail, use Then instead.
