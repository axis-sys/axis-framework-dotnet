notes: >
  Publish/subscribe is owned by axis-bus. AddCqrsMediator does register IAxisEventHandler implementations,
  but they are driven by the bus, not the mediator — a disjoint registration surfaced in the AxisMediator
  runtime cluster. The compiler already blocks routing an event through Cqrs, so this rule is guidance
  about the boundary rather than a mechanically enforced constraint.
