id: mediator-events-out-of-band
title: Domain events are published out-of-band through the bus, not the mediator
tier: framework
family: 0-foundations
package: AxisMediator.Contracts
concern: package-mechanics
layer: application
severity: should
status: canonical
description: >
  The mediator handles request/response only. Events are a separate channel — IAxisEvent is not a
  request, and the dispatch surface has no publish method. Reaching for the mediator to raise a domain
  event is a dead end; the canonical path is the bus, which is fire-and-topology and decouples the
  emitter from its consumers.
invariants:
  - IAxisEvent is not an IAxisRequest and cannot be dispatched through IAxisMediator.Cqrs, which exposes no publish method.
  - An IAxisEventHandler<TEvent> is a reaction to a published event, not a use case invoked through the mediator.
  - Raising a domain event uses the bus (IAxisBus); the mediator is reserved for command, query and stream dispatch.
reference:
  kind: framework-source
  at:
