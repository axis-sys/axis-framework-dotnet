    - "src/0-Foundations/AxisMediator.Contracts/CQRS/Handlers/IAxisMediatorHandler.cs:7 — the dispatch surface has no publish method"
    - "src/0-Foundations/AxisMediator.Contracts/CQRS/Events/IAxisEventHandler.cs:5 — an event handler reacts to a published event"
