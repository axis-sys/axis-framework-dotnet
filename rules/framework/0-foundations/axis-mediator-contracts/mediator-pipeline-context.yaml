notes: >
  Analyzer AXIS0403 — flag a string-literal key passed to AxisPipelineContext.Get or Set and
  suggest an AxisPipelineContextKeys constant (a literal-key to const discovery rule). Because Get<T>
  collapses absent, null and wrong-type into one default, a behavior that needs presence semantics must
  read AxisPipelineContext.Items directly rather than inferring absence from a default.
