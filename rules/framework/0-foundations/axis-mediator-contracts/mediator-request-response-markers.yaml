    - "src/0-Foundations/AxisMediator.Contracts/CQRS/Commands/IAxisCommand.cs:3 — IAxisCommand and IAxisCommand<TResponse> both extend IAxisRequest (sibling asymmetry)"
    - "src/0-Foundations/AxisMediator.Contracts/CQRS/Queries/IAxisQuery.cs:5 — IAxisQuery<TResponse> extends the non-generic IAxisQuery"
    - "src/0-Foundations/AxisMediator.Contracts/CQRS/Queries/IAxisStreamQuery.cs:3 — IAxisStreamQuery<out TItem> extends IAxisRequest, covariant TItem"
    - "src/0-Foundations/AxisMediator.Contracts/CQRS/Events/IAxisEvent.cs:3 — IAxisEvent is outside the request hierarchy"
