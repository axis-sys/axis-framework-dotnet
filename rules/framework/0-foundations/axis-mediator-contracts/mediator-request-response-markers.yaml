notes: >
  The asymmetry is a real footgun — code that reaches for the non-generic IAxisCommand to mean "any
  command" silently excludes every valued command, whereas the same trick works for queries. Events are
  dispatched out-of-band through IAxisBus, not the mediator (see mediator-events-out-of-band).
