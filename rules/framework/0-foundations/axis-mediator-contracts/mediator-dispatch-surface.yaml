notes: >
  The Facade is owned by axis-use-case-cqrs; this rule only states that dispatch lives there. Analyzer AXIS0401 — flag an access to IAxisMediator.Cqrs inside a class that implements an Axis handler
  interface. The stream path also throws on a missing handler instead of returning a failed AxisResult;
  that runtime asymmetry is documented in the AxisMediator runtime cluster.
