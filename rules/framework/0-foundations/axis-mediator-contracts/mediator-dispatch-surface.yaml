id: mediator-dispatch-surface
title: CQRS dispatch goes through IAxisMediator.Cqrs and is issued only from a Facade
tier: framework
family: 0-foundations
package: AxisMediator.Contracts
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  The only way to run a command, query or stream is through IAxisMediator.Cqrs (IAxisMediatorHandler).
  Its four methods pick the dispatch by message kind, and the stream method deliberately leaves the
  AxisResult railway. Dispatch is issued from the Facade that exposes the use case, never from inside a
  handler, so one handler never secretly orchestrates another.
invariants:
  - Commands, queries and streams are dispatched only through IAxisMediator.Cqrs, never by resolving a handler instance directly.
  - A valueless command is dispatched with ExecuteAsync<TCommand> and a valued command with ExecuteAsync<TCommand, TResponse>; the two are overloaded by arity.
  - A query is dispatched with QueryAsync<TQuery, TResponse> and a streaming query with StreamAsync<TQuery, TItem>.
  - StreamAsync returns a bare IAsyncEnumerable<TItem> and bypasses both the AxisResult railway and the behavior pipeline.
  - A handler never calls mediator.Cqrs; cross-use-case dispatch is composed in the Facade, not inside a handler.
