notes: >
  The no-CancellationToken-parameter fact is the contract face of mediator-cancellation-is-ambient. A
  handler must also be a concrete, non-abstract, non-generic class or the AddCqrsMediator scan silently
  skips it — that registration mechanic belongs to the AxisMediator runtime cluster, not the contracts.
