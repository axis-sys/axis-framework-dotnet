notes: >
  The embedded PerformanceBehavior implements only the valued overload, so valueless commands get no
  performance timing — a coverage gap detailed in the AxisMediator runtime cluster. Proving next is
  called exactly once is not mechanically decidable across branches, so no analyzer enforces it; the
  registration order and wiring live in the runtime cluster.
