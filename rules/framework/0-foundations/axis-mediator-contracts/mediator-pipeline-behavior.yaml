id: mediator-pipeline-behavior
title: A pipeline behavior implements one of the two IAxisPipelineBehavior overloads and calls next exactly once
tier: framework
family: 0-foundations
package: AxisMediator.Contracts
concern: package-mechanics
layer: application
severity: should
status: canonical
description: >
  A cross-cutting concern that must wrap every dispatch is a pipeline behavior, not code sprinkled into
  handlers. There are two overloads — one for valueless requests and one for requests with a response —
  and a behavior continues the chain by invoking next exactly once, or short-circuits by returning a
  failed AxisResult without calling it. Ordering is a wiring decision, not an attribute on the behavior.
invariants:
  - A cross-cutting concern is a pipeline behavior implementing IAxisPipelineBehavior<TRequest> for valueless requests or IAxisPipelineBehavior<TRequest, TResponse> for requests with a response.
  - The valued overload constrains TResponse to the broad IAxisResponse, so one behavior type spans both command responses and query responses.
  - HandleAsync receives the request, the shared AxisPipelineContext and a next delegate, and invokes next exactly once to continue the chain, or short-circuits by returning a failed AxisResult without calling next.
  - A behavior that must apply to every request is registered for both the valueless and the valued overload; registering only the valued overload skips valueless commands.
  - Behaviors execute in DI registration order, so the first-registered behavior is the outermost wrapper and ordering is decided at wiring time.
