notes: >
  The All order is load-bearing because the DbEntity reads by ordinal in exactly that order
  (persistence-dbentity-fromreader-ordinal): reordering All without reordering FromReader silently mis-maps
  rows — change both together, always. Table has exactly one home, beside Define(), so the schema DDL
  (persistence-ddl-axistable-define) and the runtime SQL both reference the same const.
