notes: >
  This is a conditional convention: targeting multiple providers is an application decision, and the
  framework enables it (a single-sourced DDL AST rendered per dialect, provider-agnostic execution) without
  mandating it. When two engines are in play, deterministic tie-breaking in ORDER BY and per-engine
  verification of lock-sensitive code are the concrete traps — those patterns are owned by
  persistence-dual-provider-concurrency-traps.
