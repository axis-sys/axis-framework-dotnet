notes: >
  RenewAsync exists because relational engines differ on read isolation: under a repeatable-read snapshot
  a later non-locking read can see stale data that a read-committed engine would have refreshed, so a
  read-then-act-under-lock sequence must restart the transaction first. That cross-provider concern is owned
  by persistence-dual-provider-concurrency-traps; the commit itself stays single per use case.
