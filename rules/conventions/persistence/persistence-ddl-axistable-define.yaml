notes: >
  The AST is rendered per provider by IAxisSqlDialect at migration time, so the table is defined exactly
  once regardless of how many providers the app targets. The Table const the AST is built over is the same
  one the runtime SQL uses (persistence-columns-single-source), and the rendered migrations are applied by
  the runner described in persistence-dbinit-migrator.
