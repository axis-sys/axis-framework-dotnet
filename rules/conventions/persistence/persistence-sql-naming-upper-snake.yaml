notes: >
  Table names are unique per schema, not globally, so two bounded contexts may each own a similarly named
  table under their own schema. The Schema const declared here is the same one the migrations orchestrator
  runs against (persistence-dbinit-migrator) and the DDL AST is built under (persistence-ddl-axistable-define).
