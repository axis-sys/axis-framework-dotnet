notes: >
  The runner is a port paired with the SQL dialect so the same {BC}DbInit set serves every targeted
  provider; the DDL it renders is the dialect-rendered AST (persistence-ddl-axistable-define). Once a version
  is applied in a real environment it is never edited — the edit-V1-in-place regime is strictly pre-deploy.
  Schema naming (UPPER_SNAKE_CASE, one schema per bounded context) is owned by
  persistence-sql-naming-upper-snake.
