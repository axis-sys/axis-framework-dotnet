  reviewed_on: 2026-07-12
notes: >
  This is a conditional convention scoped to multi-tenant applications; multi-tenancy is an application
  choice, not a framework mandate. The tenant key originates from an ambient scoped accessor in the
  application and is already a validated value object by the time it reaches a port — the port signature
  simply makes the filter impossible to forget.
