notes: >
  The no-throw discipline is the persistence face of the framework rule result-no-throw: the try/catch that
  turns a driver or SDK exception into a typed AxisError lives inside IAxisDbRepository, and the repository
  only names the two codes it wants surfaced. Application-owned use-case codes stay in their own internal
  {Aggregate}Errors classes; the persistence-owned codes declared beside the ports are the single source
  both layers reference.
