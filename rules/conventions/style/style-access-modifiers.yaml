notes: >
  Driving DTO records (commands, queries, responses) are declared public record; event and saga records are
  public sealed record. Whether to seal every DTO is a per-solution choice, not enforced here. This is the
  type-visibility face of the swappable-port and facade patterns: interfaces and dumb records cross the
  boundary, implementations never do.
