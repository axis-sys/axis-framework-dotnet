notes: >
  Because the concrete-record name ({X}Properties) is the same at both levels, the Entity segment lives only
  on the interface. The lookup versus writable-entity split follows the aggregate-level model (N0 lookup
  versus N2 entity) owned by the domain-modelling skill.
