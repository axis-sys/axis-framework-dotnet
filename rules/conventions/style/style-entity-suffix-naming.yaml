id: style-entity-suffix-naming
title: Name mutable entities I{X}EntityProperties and reader-only lookups plain I{X}Properties
tier: convention
concern: style
layer: domain
severity: should
status: canonical
description: >
  The Properties interface name signals the aggregate level. I{X}EntityProperties marks a real entity — one
  created and mutated by use cases and backed by a WritePort — while plain I{X}Properties without the Entity
  segment marks a reader-only seeded lookup. Only the interface name carries the level signal; the concrete
  record name is identical for both.
invariants:
  - An entity that has a WritePort names its properties interface I{X}EntityProperties.
  - A reader-only seeded lookup, reached only through a ReaderPort, names its properties interface I{X}Properties with no Entity segment.
  - The concrete internal record drops both the leading I and the Entity segment, so {X}Properties implements I{X}EntityProperties for entities and I{X}Properties for lookups.
reference:
  kind: none-yet
  at: []
examples:
  correct: []
  incorrect: []
exceptions:
  - Do not rename a deviating interface retroactively without a coordinated sweep; it is referenced across ports, repositories and tests.
