  skills:
    - axis-domain-modeling
  hooks:
    - AXIS0606
  scaffolds: []
  docs: []
ledger:
  reviewed_against: 6eb31e5
  reviewed_on: 2026-07-18
notes: >
  Enforced by the Axis.Conventions.Analyzers diagnostic AXIS0606 (category Axis.Style), which shares the
  I…Properties detection with domain-properties-contract-pair (AXIS0604) but drops that rule's same-assembly
  restriction so a repository DbEntity — whose interface lives in the domain assembly — is also in scope.
  There is no .editorconfig / dotnet-format switch that wraps positional-record parameters one per line, which
  is why the guarantee is an analyzer rather than a formatter setting. The companion FromReader new(...) layout
  is a style convention the analyzer does not police.
