  hooks: []
  scaffolds: []
  docs: []
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The .ValueObjects suffix is reserved for [ValueObject]-generated types; reusing it as a plain-DTO folder
  or namespace name collides with this convention and should be avoided. The value objects themselves are
  produced by the [ValueObject] source generator covered by the domain-modelling skill.
