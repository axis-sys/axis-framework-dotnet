notes: >
  Entity state for arranging a scenario still uses a Fake{Entity} record implementing the property interface
  (testing-fake-entity-property-records); Moq is the only mocking framework (testing-allowed-packages).
  Driving the use case through the Facade — not the handler directly — is what keeps the validation and
  behavior pipeline honest. Adapter coverage lives in testing-pyramid-four-projects.
