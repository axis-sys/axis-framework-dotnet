notes: >
  Phases are read from whitespace and from setup extracted into private Build()/factory helpers, not from
  labels. The ban on fluent-assertion libraries and the concrete xUnit Assert surface are governed by
  testing-allowed-packages; this rule only fixes the AAA layout.
