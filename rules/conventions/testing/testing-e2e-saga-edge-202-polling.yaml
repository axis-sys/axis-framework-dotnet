notes: >
  The saga edge is the 202 + GET status-polling pair; the accepted response, the polling endpoint and the
  terminal payload shape are owned by the saga and controller rules, which this test merely exercises from
  the outside. Typed error codes come from the Application constants so the wire contract stays literal-free.
