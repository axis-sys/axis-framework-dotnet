notes: >
  The risk being pinned is that database engines carry different default isolation levels, so the same
  read-then-act sequence commits under one and over-claims under another; only an exact assertion after real
  parallelism catches it. This rule is conditional on multi-provider deployments and complements
  testing-dual-db-repository-parity, which pins non-concurrent dialect divergences.
