notes: >
  The testing hub describes a three-layer pyramid (unit/integration/e2e); the fourth executable layer —
  architecture tests — is an addition, not a replacement, and the review gate treats it as part of the
  suite. Which behaviors live where is refined by the per-layer rules and by axis-review.
