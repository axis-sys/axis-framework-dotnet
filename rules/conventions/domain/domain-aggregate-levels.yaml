notes: >
  N0 and N1 are the common resting altitudes; the N2 shape (a behavior-rich entity plus Rules in the domain
  project, AggregateFactory plus AggregateApplication in the application layer) is the target pattern for a
  rule-bearing aggregate and is described here as the shape to reach for rather than scaffolded preemptively.
  Treat any new "if" about business state as the moment to introduce the first N2 aggregate, deciding its
  shape then. The N1 factory is governed by domain-aggregate-factories and entity state by
  domain-properties-contract-pair.
