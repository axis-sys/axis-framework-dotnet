notes: >
  Error codes are a sibling convention ({Aggregate}Errors, UPPER_SNAKE_CASE constants in the application
  layer); this rule covers lookup and status catalogs only. A catalog may additionally expose a
  value-object-typed accessor over one of its constants, but the members themselves stay plain const strings.
  Choosing the lowest layer that needs the catalog keeps the domain project off the reference path of
  contracts and adapters that only need to name a value.
