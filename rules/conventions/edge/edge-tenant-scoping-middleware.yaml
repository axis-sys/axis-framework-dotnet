notes: >
  This rule is conditional on multi-tenancy — it is the tenant-scoping shape for applications that have
  tenants, and it does not apply to single-tenant hosts. Sagas re-establish the ambient tenant
  themselves from their payload; the middleware covers only the HTTP request scope. The header-derived
  tenant is validated through the same authorization grants model the permission filter uses
  (edge-permission-authorization), which works because the token is thin (edge-auth-schemes).
