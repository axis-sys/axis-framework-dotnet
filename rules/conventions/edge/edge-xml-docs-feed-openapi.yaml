notes: >
  Under a minimal-comment policy the XML docs on the documentation-visible surface are the sanctioned
  exception, because they become the API's public contract rather than internal narration. See
  edge-openapi-doc-hub for how the document is shaped and edge-controller-shape for the controller they
  annotate.
