notes: >
  The version segment follows a fixed api prefix (api/v{version}/{resource}), resolved together with the
  single-shared-host model (architecture-composition-root). The version suffix on the controller class name
  is the standard that lets two versions coexist. See edge-controller-shape for the attribute stack that
  declares the version.
