id: edge-url-versioning
title: Version every business route in a URL path segment
tier: convention
concern: edge
layer: driving
severity: must
status: canonical
description: >
  API versioning places the version in a URL path segment: business routes carry a version segment, a
  default version is assumed when the caller omits it, and served versions are reported. Controllers are
  suffixed with the version they serve so a later version can coexist file-by-file, and the driving
  contracts mirror the version in their namespace.
invariants:
  - The API-versioning setup sets a default API version, assumes it when unspecified, reports the served versions, and reads the version from a URL path segment.
  - The API-explorer setup formats the version group name and substitutes the resolved version back into the URL.
  - Every controller declares its API version and a route of the form api/v{version}/{resource}, with the version segment following the fixed api prefix.
  - Controller class names carry the version suffix (e.g. {Aggregate}V1Controller) so a later version coexists as a separate file.
  - The driving contracts mirror the version in their namespace ({BC}.{Aggregate}.v1.{UseCase}).
reference:
  kind: framework-sample
  at:
    - "src/scaffolds/Host/Scaffolds.ECommerce.Host/Program.cs:26 — AddApiVersioning sets the default version, assumes it when unspecified, and reports served versions"
examples:
