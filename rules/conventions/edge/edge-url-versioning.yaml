    - "src/scaffolds/Contracts/Scaffolds.ECommerce.Contracts.Driving/Customers/v1/EnsureCustomer/EnsureCustomerCommand.cs:1 — driving contracts mirror the version in their namespace (.Customers.v1.)"
  incorrect: []
exceptions: []
