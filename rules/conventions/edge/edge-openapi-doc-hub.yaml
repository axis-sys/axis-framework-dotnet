notes: >
  The concrete documentation UI is an application choice and only ever a non-exclusive example — the
  invariant is that a single rendered UI over the transformer-shaped OpenAPI document is the hub, not
  that any specific tool renders it. The security scheme names shared here are the same ones the edge
  auth schemes are registered under (see edge-auth-schemes); the narrative-doc-over-lean-README split
  ties to the docs method (axis-docs).
