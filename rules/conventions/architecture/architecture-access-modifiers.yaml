notes: >
  Reachability is engineered, not granted by visibility: the public facade plus assembly scanning is what
  makes internal handlers reachable (see architecture-facade-pattern), and the single public composition
  extension is the only registration surface (see architecture-di-registration). Everything else stays
  behind the assembly wall.
