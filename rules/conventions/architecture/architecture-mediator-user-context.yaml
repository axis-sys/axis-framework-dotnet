id: architecture-mediator-user-context
title: Populate the mediator's ambient identity at the edge; read it through a single seam
tier: convention
concern: architecture
layer: driving
severity: should
status: canonical
description: >
  The Axis pattern expects driving middleware to populate the mediator context accessor so handlers can
  read the acting identity from the mediator's ambient AxisEntityId. Edge middleware, placed after
  authentication, maps the authenticated principal claim to AxisEntityId and sets the ambient
  CancellationToken from the request. The application never reads AxisEntityId directly — it flows through
  a single current-user seam, so audit events carry the real user and telemetry gets the user tag for free.
invariants:
  - The acting identity is populated at the driving edge by middleware placed after authentication, mapping the principal id claim to AxisEntityId via AxisEntityId.TryParse; a missing or invalid claim leaves it null (anonymous or system).
  - A handler that needs the acting user reads it through a single current-user seam (nullable, never throwing), never from the mediator directly and never from the transport context.
  - AxisEntityId is named in exactly two places — the edge middleware that writes it and the current-user seam that reads it; the application depends only on the seam.
  - A background, saga or worker flow that must attribute a user sets the mediator context accessor in its own scope, or resolves the user from its own input data instead of the ambient identity.
