notes: >
  AxisEntityId is a settable property the application must fill; it is the write half whose read half is
  governed by architecture-ambient-context and the framework rule mediator-ambient-context-access. TraceId
  is generated by the framework; correlation ids stay unpopulated until telemetry is turned on, and the
  same edge middleware is their home. A resumed saga stage re-establishes context from its payload rather
  than the ambient identity (architecture-saga-stage-handlers).
