notes: >
  This is the application-facing face of the swappable infra-port concept: a contract is an IAxis* (or an
  app-owned I{X}Port) interface, every method returns AxisResult, try/catch lives only in the adapter, and
  an Add* registration swaps the adapter by DI. The set of concrete adapters is open-ended — a real
  adapter is only ever a non-exclusive example, never an exhaustive catalogue; further standard adapters
  are expected to be built over time.
