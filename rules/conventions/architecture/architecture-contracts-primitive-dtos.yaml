    - axis-validator
  hooks: []
  scaffolds: []
  docs: []
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The CQRS marker interfaces come from the framework rule mediator-request-response-markers; where each DTO
  lives is architecture-contracts-location and how the folder is laid out is architecture-contracts-versioned-layout.
  The string-to-value-object parse happens in validators/handlers (architecture-validator-conventions,
  framework rule types-value-object-parsing). Events are sealed positional records governed by
  architecture-bus-events; the plain public record is the dominant style for commands, queries and responses.
