notes: >
  Services and policies are the home for logic that has no aggregate of its own; a reconciler is only its
  RunOnceAsync, and the schedule that drives it lives in a worker slice (architecture-workers-vertical-slices).
  A RunOnceAsync takes an explicit CancellationToken because it runs outside the mediator scope — the
  sanctioned exception in architecture-ambient-context. Placement follows architecture-vertical-slice-layout
  (sibling folders per aggregate) and both are wired by architecture-di-registration.
