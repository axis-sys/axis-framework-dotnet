id: architecture-di-registration
title: A single composition entry scans handlers and registers every other seam explicitly
tier: convention
concern: architecture
layer: any
severity: must
status: canonical
description: >
  Every project wires itself through one public registration extension — a class literally named
  DependencyInjection at the project root. CQRS handlers, validators and saga stage handlers are
  discovered by assembly scanning; everything else — factories, services, policies,
  application-implemented ports, ambient accessors, saga definitions, per-BC repository ports — is
  registered explicitly, with a rationale comment where the registration encodes a decision. A project
  that spans several bounded contexts decomposes that single entry into one internal DependencyInjection
  per BC/feature folder that registers services (architecture-one-folder-per-feature), each called only
  by the root extension — the decomposition never adds a second PUBLIC door. This rule fixes the shape of
  that composition entry, not the host that calls it.
invariants:
  - A project exposes exactly one public registration extension as its whole composition surface — a public static class DependencyInjection at the project root; nothing else in the project is public for wiring.
  - A project spanning several bounded contexts may decompose its registration into one DependencyInjection per BC/feature folder that registers services, but every one of those nested classes is internal static, never public — only the root extension crosses the assembly boundary.
  - The root extension orchestrates the per-BC ones (and any cross-cutting registration, such as a shared IUnitOfWork binding) by calling each internal Add{BC}... extension in turn.
  - Handlers, validators and saga stage handlers are registered by assembly-scanning extensions (the mediator, validator and saga-handler scans), never one type at a time.
  - Factories, policies, services, application-implemented ports and repository ports are registered as scoped with explicit interface-to-implementation pairs.
  - A class implementing two interfaces is registered once, and both interfaces forward to that same scoped instance.
  - Settings records are registered with a TryAdd so a host's earlier registration wins.
  - Each saga contributes its own Add{Saga}Saga extension, invoked from the owning BC's registration (which is in turn invoked from the single project-level registration entry).
  - A registration that encodes a decision (a lifetime, a provider choice, an interface forward) carries a rationale comment; a plain interface-to-impl pair needs none.
