notes: >
  The single public entry is the composition counterpart of architecture-access-modifiers: because
  everything else is internal, that one extension is the only door the project opens — enforced by
  AXIS0607, which flags a second public class named DependencyInjection in the same assembly. Swappable
  infra adapters are chosen in composition too (architecture-swappable-infra-ports), so a provider choice
  is a wiring change. This rule does not prescribe the host model — a web host, a worker host or a test
  host all call the same extension. The per-BC decomposition itself is
  architecture-one-folder-per-feature's "one DependencyInjection per registering folder" invariant; this
  rule adds the accessibility half — internal below the root, public only at it.
