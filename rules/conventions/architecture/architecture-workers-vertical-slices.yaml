notes: >
  The worker is only the schedule; the reconciliation logic is an application service with a RunOnceAsync
  (architecture-services-and-policies), which takes an explicit CancellationToken because it runs outside
  the mediator scope (architecture-ambient-context). Opt-in registration follows the composition discipline
  of architecture-di-registration.
