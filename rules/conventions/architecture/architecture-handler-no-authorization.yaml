notes: >
  Was briefly enforced by the AXIS0606 analyzer (HandlerAuthorizationAnalyzer), which flagged any
  AxisError.Unauthorized/Forbidden lexically inside a handler. That was too blunt — it false-positived on
  legitimate authentication/token handlers (RequestToken, RefreshToken, RequestServiceToken) and on genuine
  domain permission gates, which cannot move to the [Authorize] edge because the decision needs the database
  (a secret hash, a refresh-token lookup) or per-resource context. The analyzer was removed on 2026-07-13; the
  convention is now a context-aware judgment applied through the use-case and edge skills. Same "don't
  duplicate what another layer already guarantees" theme as architecture-handler-shape's value-object-cast
  invariant (the handler trusts the already-validated input instead of re-parsing it).
