notes: >
  The concrete-once-with-forwards shape is what lets a Reader and a Write port that resolve to the same
  class share a scope. Keying the unit of work and db repository by AppKey is what keeps the business pool
  separate from the saga pool (persistence-connection-pooling-separation). This rule fixes the wiring; the
  swappable-adapter principle it instantiates is the architecture rule architecture-swappable-infra-ports.
