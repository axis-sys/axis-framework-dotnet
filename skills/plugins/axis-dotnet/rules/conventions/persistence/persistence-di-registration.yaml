id: persistence-di-registration
title: Register repositories per-BC, scoped, concrete-once with port forwards; the unit of work is keyed by AppKey
tier: convention
concern: persistence
layer: driven
severity: must
status: canonical
description: >
  Wiring follows a fixed three-level shape: each bounded context folder has an Add{BC}Repositories
  extension; the provider-agnostic project composes them plus the IUnitOfWork adapter; each provider project
  adds the keyed unit of work and db repository, the dialect singletons and the migrator. The host picks a
  provider through a single configuration switch.
invariants:
  - A repository class is registered scoped exactly once, and each of its ports forwards to that single registration, so the Reader and Write ports share one instance per scope.
  - Per-entity SQL dialect implementations are stateless and registered as singletons in the provider project's per-BC registration.
  - The framework unit of work and db repository are keyed by the application's AppKey, so the business connection pool is isolated from other consumers such as a saga store.
  - The single IUnitOfWork implementation wraps the keyed framework unit of work resolved by that AppKey.
  - Provider selection happens only at the host through one configuration switch; no repository code branches on the provider.
  - Each provider entry point fails fast when its own connection string is missing.
