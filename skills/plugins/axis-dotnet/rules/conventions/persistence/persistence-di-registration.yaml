  kind: framework-sample
  at:
    - "src/scaffolds/Adapters/Scaffolds.ECommerce.Adapters.Driven.Repository/Catalog/DependencyInjection.cs:1 — the BC-folder Add{BC}Repositories extension, internal, registering three repositories scoped with explicit port-to-implementation pairs"
    - "src/scaffolds/Adapters/Scaffolds.ECommerce.Adapters.Driven.Repository/DependencyInjection.cs:1 — the provider-agnostic project composing every Add{BC}Repositories plus the IUnitOfWork adapter"
