notes: >
  The isolation starts at registration: keying the business unit of work and db repository by AppKey
  (persistence-di-registration) is what gives the business pool its own identity separate from the saga
  store, even against one physical database. Sizing both to fit the server's connection ceiling is what
  keeps background fan-out from exhausting request-handling capacity.
