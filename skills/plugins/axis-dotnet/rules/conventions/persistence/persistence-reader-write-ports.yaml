notes: >
  Filter and read-model helper records used by search live beside the port in the same contract folder,
  not in the driving contracts. The property interfaces the reads project into are the domain's
  I{Entity}EntityProperties, keeping the concrete DbEntity internal to the adapter
  (persistence-dbentity-fromreader-ordinal).
