notes: >
  This is the application-side counterpart of the unit-of-work contract (persistence-unit-of-work-contract):
  the contract fixes the interface and its two members, this rule fixes who calls the commit and when.
  Railway composition (Then, Map, Match) is owned by the AxisResult framework rules; this rule only fixes
  where the single commit sits in the chain.
