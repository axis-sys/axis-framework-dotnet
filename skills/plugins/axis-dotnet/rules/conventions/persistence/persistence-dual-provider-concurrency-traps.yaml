notes: >
  This is a conditional convention: dual-provider support is an application choice, not a framework
  obligation. The transaction-renew primitive is the same RenewAsync declared on the single unit-of-work
  contract (persistence-unit-of-work-contract); the retry of a transient deadlock lives inside the
  framework's provider adapter, not in application or repository code. Proving parity across engines is the
  discipline owned by persistence-dual-database-parity.
