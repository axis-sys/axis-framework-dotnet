notes: >
  The binder and execution helpers come from the framework's IAxisDbRepository, consumed as-is; the
  repository writes SQL and supplies bindings, never opening a connection itself. Provider-specific SQL
  differences ride a per-entity dialect seam whose fragments are still bound through the same binder.
