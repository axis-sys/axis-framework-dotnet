notes: >
  Neighboring persistence rules already assume this composition — persistence-sql-parameterized-pure,
  persistence-dbentity-fromreader-ordinal, persistence-di-registration, persistence-repo-no-try-catch and
  persistence-columns-single-source. The dialect seam is what lets one repository serve multiple providers
  without a base-class hierarchy.
