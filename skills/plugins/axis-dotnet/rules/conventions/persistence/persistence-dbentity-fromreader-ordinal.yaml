notes: >
  The mapper takes the provider-neutral DbDataReader, never a provider-specific reader type, so the same
  DbEntity serves every targeted provider. The ordinal contract is why {Entities}Columns.All order is
  load-bearing (persistence-columns-single-source): the two must be reordered together. Value-object
  non-nullability is a domain rule; the lifted cast is how the adapter honours it at the persistence edge.
