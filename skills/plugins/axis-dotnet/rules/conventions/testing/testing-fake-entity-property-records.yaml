    - axis-integration-tests
  hooks: []
  scaffolds: []
  docs: []
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  Because the domain entity is internal, the properties interface is the only seam the test can build
  against; the write port consuming that interface is what lets the fake stand in for the real entity end
  to end. Where the fakes physically live is an application choice; the shape (Fake{Entity} :
  I{Entity}EntityProperties, positional, interface order) is the invariant. Container composition that
  consumes these fakes is covered by testing-integration-di-provider.
