id: testing-test-method-naming
title: Name test methods {WhatItDoes}When{Condition}Async in PascalCase
tier: convention
concern: testing
layer: tests
severity: should
status: canonical
description: >
  Test methods are named for the behavior they assert, in PascalCase, as {WhatItDoes}When{Condition}, with
  the Async suffix on asynchronous tests. Test classes are named {Subject}Tests. The name reads as the
  specification of the case under test.
invariants:
  - A test method name is PascalCase in the form {WhatItDoes}When{Condition}, naming the asserted behavior and its condition.
  - An asynchronous test method carries the Async suffix.
  - A test class is named {Subject}Tests after the unit or journey it covers.
