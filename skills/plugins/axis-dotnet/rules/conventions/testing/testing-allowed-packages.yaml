notes: >
  xUnit v3 specifics recur throughout: IAsyncLifetime returns ValueTask and cancellation flows via
  TestContext.Current.CancellationToken (the end-to-end project passes it to every HttpClient call). The
  assertion-library ban pairs with testing-aaa-structure, which fixes the concrete xUnit Assert usage.
