notes: >
  The load-bearing trap: the failure is flaky and only appears under full parallel load (most likely in the
  VS Test Explorer), because a host must outlive a concurrent disposal for the race to land — the same suite
  passes in isolation and in small parallel groups. The surfaced exception (ObjectDisposedException on
  TestServer vs EventLogInternal) depends on timing; both share the one root — a host being disposed while it
  still serves requests. Clearing providers removes the only process-global resource in the failure stacks and
  unmasks any genuine error underneath. This is host hygiene, not a bug in the code under test.
