  hooks: []
  scaffolds: []
  docs: []
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  One container and one migration run per collection keeps the suite fast and hermetic; per-test isolation
  is achieved with fresh keys rather than resetting the schema. Per-step scoping inside a journey is a
  separate concern covered by testing-journey-scope-per-step.
