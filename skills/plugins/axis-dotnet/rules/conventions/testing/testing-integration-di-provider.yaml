id: testing-integration-di-provider
title: Compose integration providers via a shared helper; always register IAxisTelemetry and TimeProvider.System
tier: convention
concern: testing
layer: tests
severity: must
status: canonical
description: >
  Integration tests build a real DI container per test with a shared DependencyInjection helper that
  mirrors production composition, rather than duplicating the wiring. The Axis behavior pipeline fails at
  runtime without IAxisTelemetry and TimeProvider, so any test container that drives the mediator pipeline
  registers the null telemetry instance and TimeProvider.System. Repository-only containers stub the
  ambient mediator instead of booting the real one.
invariants:
  - Full-stack integration tests obtain their container from a shared DependencyInjection helper (ServiceProviderWith{Provider}) that mirrors production composition.
  - Any test service provider that drives the Axis mediator/behavior pipeline registers IAxisTelemetry (the null telemetry instance) and TimeProvider.System.
  - Repository-only containers stub the ambient mediator (canned trace/origin ids, CancellationToken.None) instead of booting the real mediator.
  - Ambient request context (such as the current tenant) is bound to a fixed test value; it is ambient, never a command field.
  - Test-tuned settings are injected as singletons with a comment stating why they diverge from production.
  - The helper accepts an optional Action<IServiceCollection> seam so a test can swap one service without forking the composition.
