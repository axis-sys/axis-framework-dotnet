notes: >
  The required IAxisTelemetry + TimeProvider.System registrations materialize wherever the Axis behavior
  pipeline actually runs: in integration containers that drive the real mediator, and in any unit TestHost
  that does the same. Tests that bypass the mediator entirely need neither. Cancellation stays ambient via
  the mediator (mediator-cancellation-is-ambient); the entity fakes seeded here follow
  testing-fake-entity-property-records.
