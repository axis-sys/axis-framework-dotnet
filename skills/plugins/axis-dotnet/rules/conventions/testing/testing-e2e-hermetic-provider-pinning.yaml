notes: >
  The load-bearing trap: startup I/O before builder.Build() sees only environment and build-time config,
  which is why the container-owned connection string is exported as an environment variable inside
  InitializeAsync, not layered as UseSetting afterward. DisableParallelization on both provider collections
  exists for exactly this reason: InitializeAsync mutates process-wide environment state, and xUnit runs
  different collections in parallel by default. Fixture topology is owned by
  testing-integration-fixture-per-collection.
