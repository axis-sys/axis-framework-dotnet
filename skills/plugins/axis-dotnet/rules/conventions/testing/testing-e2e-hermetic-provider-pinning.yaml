id: testing-e2e-hermetic-provider-pinning
title: Pin the E2E database provider at compile time and the connection string to the factory's own container
tier: convention
concern: testing
layer: tests
severity: must
status: canonical
description: >
  The provider under test is a compile-time decision, not an environment lookup: a shared DefaultProvider
  constant pins it, and each provider's coverage class derives a [Fact(Skip)] guard from that constant, so
  a disabled provider skips whole and visibly. Startup I/O that runs before builder.Build() only observes
  process environment and build-time configuration — an E2E factory that only layers in-memory config
  after the fact can silently run against a developer's real database. The DB-backed factory therefore
  owns a Testcontainers instance and points the connection string at it (environment variable set in
  InitConnectionAsync and nulled on dispose, mirrored in the boot configuration).
invariants:
  - The database provider under test is pinned at compile time by the shared DefaultProvider constant; each provider's coverage class computes a const [Fact(Skip)] guard from it, so a disabled provider's whole collection skips visibly.
  - The DB-backed factory combines WebApplicationFactory<Program> with IAsyncLifetime, owns its Testcontainers instance, points the connection string at it (environment variable set in InitConnectionAsync, reset to null on dispose, mirrored in the boot configuration) and runs all migrations once at startup; its sharing topology follows testing-integration-fixture-per-collection.
  - The saga runtime is wired identically in E2E and in production — the same AddAxisSagaPostgres/MySql call, resumer included; a test-only in-process or resumer-disabled saga would hide bugs the real hosted worker (schema bootstrap, crash recovery) would otherwise catch.
  - Configuration that only needs to exist before builder.Build() (auth keys, token lifetimes, bootstrap admin ids, a placeholder connection string) lives in the factory's boot-configuration dictionary, not in scattered UseSetting calls.
  - Any Testcontainers-fragile tuning (for example capping a fan-out window that would saturate the container pool) is applied for the test run with a comment stating why.
