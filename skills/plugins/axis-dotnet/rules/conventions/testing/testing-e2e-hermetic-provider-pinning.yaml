    - "src/scaffolds/Tests/Scaffolds.ECommerce.E2ETests/Fixtures/Factories/ECommerceWebAppFactory.cs:43 — DisposeAsync nulls both environment variables before stopping the container"
    - "src/scaffolds/Tests/Scaffolds.ECommerce.E2ETests/Fixtures/Factories/PostgresECommerceWebAppFactory.cs:1 — a concrete per-provider factory + its own [CollectionDefinition(DisableParallelization = true)] (mirrored by MySqlECommerceWebAppFactory.cs)"
    - "src/scaffolds/Tests/Scaffolds.ECommerce.E2ETests/Fixtures/Factories/ECommerceProviderPin.cs:8 — the shared DefaultProvider constant"
    - "src/scaffolds/Tests/Scaffolds.ECommerce.E2ETests/PostgresCoverageTests.cs:17 — the const Skip guard computed from ECommerceProviderPin.DefaultProvider, applied to every [Fact] in the class (mirrored by MySqlCoverageTests.cs)"
  incorrect: []
exceptions:
  - A DB-less E2E factory may compose the host's in-memory driven adapter (or swap ports for fakes in ConfigureTestServices) instead of owning a container, when the bounded context under test has no real repository at all.
