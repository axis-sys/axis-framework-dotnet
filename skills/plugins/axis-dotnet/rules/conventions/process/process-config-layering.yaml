notes: >
  Layering is a security control as much as an ergonomics one: the committed layers never carry a live
  credential, and the secrets-template makes the required keys discoverable without leaking their values.
  Configuration read at startup is read lazily by the composition root (see process-no-startup-io), so a
  test host can override it.
