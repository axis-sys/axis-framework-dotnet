notes: >
  Keeping the provider choice in one place is what lets the rest of the code stay provider-agnostic and
  return AxisResult uniformly. Separate stores are given separate pools deliberately, because a shared pool
  can be exhausted by fan-out on one store while starving another. Provider names are illustrative, not a
  fixed catalogue — the set of supported engines is an application decision.
