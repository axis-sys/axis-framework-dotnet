notes: >
  Discovered while orchestrating a real multi-BC implementation (Auth/Identity/DataPrivacy) across parallel
  agents in a client repo: naively parallelizing by BC caused a consumer BC to start before the facade/stage/
  event it depended on existed in the producer BC. This rule formalizes the invariant at the process/
  planning level; the channel taxonomy itself is owned by architecture-cross-bc-communication — this rule
  only adds the ordering/parallelism consequence for IMPLEMENTATION SEQUENCING, not runtime topology.
