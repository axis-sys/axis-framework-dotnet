notes: >
  Because the catalog is hand-maintained it can drift from the controllers; a periodic diff of the catalog
  against the OpenAPI document is the cheap consistency check. Living outside the product source tree also
  keeps the CLI out of the product build and image, so it can never leak into what ships.
