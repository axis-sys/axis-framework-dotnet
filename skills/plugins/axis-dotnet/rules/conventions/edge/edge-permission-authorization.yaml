notes: >
  The authorization facade is the driving contract of a read-only authorization bounded context; the
  edge consumes it read-only and its cache is invalidated through the events published by the
  membership/identity/licensing use cases. The filter and the tenant middleware share one grants lookup
  model and cache (see edge-tenant-scoping-middleware). Grants are resolved server-side precisely
  because the token is thin (edge-auth-schemes), and failures render through the same builder as
  controllers (edge-axisresult-render).
