notes: >
  The framework leaves authentication, URL versioning and OpenAPI to the application; this rule records
  the shape the edge converges on. See edge-controller-facade-injection for what may be injected,
  edge-url-versioning for the version segment, and edge-axisresult-render for how each action terminates.
