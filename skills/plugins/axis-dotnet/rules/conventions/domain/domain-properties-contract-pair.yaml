notes: >
  Folder layout is {BC}/{Aggregate}/Properties/, with nested folders for sub-aggregates. The interface is
  what ports, factories and use cases depend on; the sealed record is materialized only inside the
  application (through InternalsVisibleTo) and by a repository's DbEntity when mapping a reader row. The
  behavior that a Properties record deliberately omits belongs to the N2 entity described in
  domain-aggregate-levels.
