notes: >
  The no-throw rule everywhere else is the framework rule result-no-throw; this private constructor is its
  single sanctioned exception inside the core. The AxisTypes source generator is referenced with
  PrivateAssets set to all in the kernel project only, so every other project consumes the generated surface
  through the compiled assembly. Because the generated TryParse throws on null, guarding optionals at the
  application boundary keeps the no-throw discipline intact along the rest of the railway.
