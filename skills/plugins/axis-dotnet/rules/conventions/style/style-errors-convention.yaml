notes: >
  Persistence-owned codes (not-found or already-exists emitted by repositories) may keep their single
  declaration next to the ports they come from, with the application matching on those same consts rather
  than redeclaring them. The no-throw discipline these codes serve is the framework rule result-no-throw.
