notes: >
  This is the cross-layer layout rule with no single-layer counterpart: the same {BC}/{Feature} mirroring
  drives the application slices (architecture-vertical-slice-layout) and the driving contracts
  (architecture-contracts-versioned-layout). In the driven repository adapters a child entity's nested
  folder carries the aggregate's per-entity file set (repository, entity, columns, table, and a dialect
  seam where needed) beside the parent, so parent and child persistence are always co-located. The
  DependencyInjection-per-folder half of invariant 4 is enforced mechanically by AXIS0607 (hooked on
  architecture-di-registration, the rule that owns the public/internal split); this rule owns the folder
  and namespace shape, that one owns which of those classes is allowed to be public.
