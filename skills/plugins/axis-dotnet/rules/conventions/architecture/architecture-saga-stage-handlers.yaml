notes: >
  The split between an in-payload business outcome and an errored AxisResult is what lets the saga route to
  compensation versus fail hard; errors-as-values is the framework rule result-errors-as-values. A resumed
  stage re-establishes app-scoped context from the payload because the ambient context does not survive the
  resume (architecture-ambient-context, architecture-mediator-user-context). A stage that reaches another
  bounded context does so through the sanctioned saga channel (architecture-cross-bc-communication), and the
  payload it evolves is architecture-saga-payloads.
