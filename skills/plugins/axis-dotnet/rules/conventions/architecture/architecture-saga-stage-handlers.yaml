id: architecture-saga-stage-handlers
title: Saga stage handlers are idempotent, evolve the payload with `with`, and separate business failure from stage error
tier: convention
concern: architecture
layer: application
severity: must
status: canonical
description: >
  Each stage is an internal sealed IAxisSagaStageHandler<TPayload> in the owning bounded context's
  Sagas/{SagaName}/Handlers/ folder, keyed by SagaName/StageName consts. Stages re-run after crashes or
  resumer pickup, so every stage first checks whether its work already happened. Expected business failures
  travel inside the payload so the saga can route to a compensation stage; only unexpected or
  infrastructure problems surface as an errored AxisResult.
invariants:
  - A stage handler is internal sealed, implements IAxisSagaStageHandler<TPayload>, and exposes SagaName/StageName as expression-bodied properties referencing the {Saga}Saga consts.
  - ExecuteAsync(TPayload payload) returns Task<AxisResult<TPayload>>; the payload is immutable and evolved only via `with` expressions.
  - Every stage is idempotent — it checks pre-existence (a payload flag, a GetBy lookup, or an already-applied read) before writing.
  - A compensation stage guards on a payload flag recording what the saga actually did, so it never undoes work it did not perform.
  - A business outcome the saga must route on is written into the payload (payload with { Succeeded = false, ErrorCode = ... }) and returned as Ok — not as an AxisResult error.
  - Ambient context is not available to a resumed stage — the app-scoped context (for example a tenant) is re-established from the payload before any facade call.
  - Stage handlers are discovered by the saga-handler assembly scan; there is no per-stage registration.
