notes: >
  The payload lives in the driving contracts (architecture-contracts-location) inside the versioned tree
  (architecture-contracts-versioned-layout), and its accumulator shape is what the stage handlers evolve
  with `with` expressions (architecture-saga-stage-handlers). Saga-lifecycle events co-located here follow
  architecture-bus-events. A payload may reference a use-case DTO from a sibling folder — reuse inside the
  same contracts project is fine.
