notes: >
  This is the case of architecture-swappable-infra-ports where a framework provider package already owns
  the SDK boundary: the application's thin adapter shrinks to provider selection plus AxisResult
  composition. No-throw and the try boundary are the framework rules result-no-throw and result-try-boundary;
  transient classification is result-transient-failure-classification and typed codes are result-error-typing.
  Any concrete provider is only ever a non-exclusive example, never an exhaustive catalogue.
