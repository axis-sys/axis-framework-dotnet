notes: >
  The five-sibling folder shape is a checked invariant above, not narrative; the vertical slice by bounded
  context happens inside every project. The inward dependency direction is executable — architecture tests
  assert the layer and bounded-context boundaries so a violation fails the build. This rule absorbs the
  earlier solution-topology convention. The name grammar of each project ({App}.Contracts.Driving,
  {App}.Adapters.Driving.{Role}, ...) is owned by style-project-naming, not by this rule.
