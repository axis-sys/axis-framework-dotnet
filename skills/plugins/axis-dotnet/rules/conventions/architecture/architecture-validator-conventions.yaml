notes: >
  The ValidationBehavior runs in the mediator pipeline and short-circuits before the handler (framework rule
  mediator-pipeline-behavior), which is why architecture-handler-shape lets a handler cast validated input
  to value objects at the top. TryParse-style helpers over string inputs are the boundary where wire-shaped
  contract DTOs (architecture-contracts-primitive-dtos) become value objects.
