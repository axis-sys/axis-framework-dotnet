    - "src/scaffolds/Core/Scaffolds.ECommerce.Application/Customers/UseCases/MarkEmailValidated/v1/MarkEmailValidatedValidator.cs:10 — value-object input validated via RequiredTryParse + CustomerId.TryParse"
  incorrect: []
exceptions: []
