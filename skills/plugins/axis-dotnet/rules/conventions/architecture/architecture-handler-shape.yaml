notes: >
  Railway composition semantics (Then/Map/Ensure, the valueless-Then value-preservation trap, Try,
  pipeline entry) are defined by the AxisResult framework rules; handlers only consume them. No-throw and
  no-if-else-flow are the framework rules result-no-throw and result-no-if-else-flow;
  cancellation-is-ambient is the framework rule mediator-cancellation-is-ambient.
