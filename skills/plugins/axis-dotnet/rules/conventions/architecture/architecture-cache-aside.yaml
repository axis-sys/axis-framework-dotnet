notes: >
  IAxisCache is one of the swappable infra ports (architecture-swappable-infra-ports): the adapter is a DI
  choice and the component composes AxisResult, never a provider type. The mutation-to-eviction hop is a
  bus event (architecture-bus-events) rather than a direct cache write, which is what keeps a mutator
  ignorant of who caches its data.
