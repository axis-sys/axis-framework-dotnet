notes: >
  Stage handlers and payloads have their own rules (architecture-saga-stage-handlers,
  architecture-saga-payloads); this rule owns the definition DSL, the DI/start surface and the
  framework-hosted resumer. Resumer configuration covers whether it runs, its poll interval, the age after
  which a pending saga resumes and the resume batch size.
