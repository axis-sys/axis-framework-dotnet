    - "src/scaffolds/Contracts/Scaffolds.ECommerce.Contracts.Driving/Catalog/v1/Events/ProductCheckedOutEvent.cs:10 — sealed positional record, ids-only payload (CartId/ProductId as strings, Quantity as int), its own Topic const"
    - "src/scaffolds/Core/Scaffolds.ECommerce.Application/Catalog/Events/ProductCheckedOutEventHandler.cs:8 — internal sealed {Event}Handler in the consuming bounded context; TryParses the untrusted string ids, logs and returns Ok on a malformed payload instead of failing the dispatcher"
  incorrect: []
exceptions: []
