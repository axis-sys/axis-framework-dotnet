notes: >
  The bus is a swappable infra port (architecture-swappable-infra-ports) and is one of the three sanctioned
  cross-bounded-context channels (architecture-cross-bc-communication); the framework rule
  mediator-events-out-of-band governs the out-of-band dispatch. The event record lives in the driving
  contracts (architecture-contracts-location), and a saga-lifecycle event sits beside its payload
  (architecture-saga-payloads). Fire-and-topology means the publisher never learns who consumed the event.
