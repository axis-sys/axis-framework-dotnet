notes: >
  The composition root is where provider choice lives (architecture-di-registration,
  process-provider-switches) and where startup performs no I/O (process-no-startup-io). The single-host
  stance is a monolith default, not a ceiling — extracting a bounded context into its own deployable is the
  promotion path in architecture-hexagonal-topology.
