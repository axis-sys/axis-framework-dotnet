    - "src/2-ApplicationFlow/AxisBus/MemoryBus/AxisMemoryBus.UnitTests/Memory/MemoryBusAdapterTests.cs:106 — two 50ms handlers finish well under 300ms, proving parallelism"
  incorrect: []
exceptions: []
derives_to:
