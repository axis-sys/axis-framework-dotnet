id: bus-topics-are-adapter-hints
title: The params topics are adapter hints, not contract semantics
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  PublishAsync takes params string[] topics, but the contract assigns them no meaning: they are hints the
  adapter is free to interpret. The in-memory adapter ignores them entirely (every handler runs regardless).
  A distributed adapter maps them to topic / routing key / partition key. So the publisher names intent
  without knowing the transport, and application code stays vendor-neutral.
invariants:
  - topics is an optional params string[]; a publish with no topics is valid and behaves identically in-process.
  - The in-memory adapter ignores topics — every registered handler is invoked regardless of the topics passed.
  - A distributed adapter interprets topics as transport routing (topic / routing key / partition key); the publisher need not know which.
