id: bus-memory-no-exception-isolation
title: The in-memory adapter does not catch a throwing handler
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  MemoryBusAdapter only combines the AxisResult values its handlers return — it has no try/catch. A handler
  that throws instead of returning a failed AxisResult (an uncooperative failure) lets the exception escape
  PublishAsync to the publisher, aborting the whole fan-out. Risky work therefore belongs inside the
  handler, wrapped in AxisResult.TryAsync, or behind an adapter that catches and converts.
invariants:
  - MemoryBusAdapter has no try/catch around handler invocation; a thrown exception propagates out of PublishAsync.
  - An exception from one handler is not converted to an AxisError and does not aggregate with the other results.
  - A handler that calls exception-throwing code must wrap it in AxisResult.TryAsync so the failure stays on the rail.
