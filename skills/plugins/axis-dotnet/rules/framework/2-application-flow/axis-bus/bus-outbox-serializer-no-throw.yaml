id: bus-outbox-serializer-no-throw
title: The outbox serializer turns exceptions into an AxisError, never throwing
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisBusSerializer centralizes payload (de)serialization over System.Text.Json and guarantees no exception
  escapes: Serialize and both Deserialize overloads wrap the call in try/catch and return
  AxisError.InternalServerError with a stable code (AXIS_BUS_SERIALIZATION_FAILED /
  AXIS_BUS_DESERIALIZATION_FAILED) instead. A null deserialization result is treated as a failure too.
invariants:
  - Serialize returns AxisResult<string> and converts any thrown exception to AxisError.InternalServerError(SerializationFailed).
  - Deserialize returns the value or AxisError.InternalServerError(DeserializationFailed) on a thrown exception or a null result.
  - No path in the serializer throws to the caller — the failure is always a value on the rail.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisBus/Repository/AxisBus.Repository/AxisBusSerializer.cs:15 — Serialize wraps STJ, returns AxisError on failure"
    - "src/2-ApplicationFlow/AxisBus/Repository/AxisBus.Repository/AxisBusSerializer.cs:27 — Deserialize returns AxisError on exception or null"
examples:
  correct:
