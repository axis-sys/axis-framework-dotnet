id: bus-event-handler-shape
title: A consumer implements IAxisEventHandler<TEvent> returning AxisResult
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  A consumer reacts to an event by implementing IAxisEventHandler<in TEvent> (TEvent : IAxisEvent) with a
  single Task<AxisResult> HandleAsync(TEvent @event) method. The type parameter is contravariant (in), and
  any number of handlers may be registered for the same event — the adapter fans out to all of them.
invariants:
  - A consumer implements IAxisEventHandler<in TEvent> where TEvent : IAxisEvent with one method Task<AxisResult> HandleAsync(TEvent @event).
  - Many handlers may be registered for one event type; every registered handler runs on publish.
  - The handler reports its outcome as the returned AxisResult, not by mutating shared publisher state.
