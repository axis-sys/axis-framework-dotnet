id: bus-emitter-topology-decoupled
title: The emitter does not know its consumers (fire-and-topology)
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: application
severity: should
status: canonical
description: >
  Publishing is fire-and-topology: the emitter states that a fact happened and hands it to IAxisBus, which
  resolves the registered handlers from the container at publish time. The publisher never references a
  consumer type, so adding, removing or changing a reaction is a change to a handler and its registration —
  never an edit to the publisher. This is the decoupling the bus exists to provide.
invariants:
  - The emitter references only IAxisBus and the event type, never any IAxisEventHandler implementation.
  - Handlers are discovered from the service container at publish time, not named by the caller.
  - Adding or removing a reaction to an event is a handler + registration change, with no edit to the publishing code.
