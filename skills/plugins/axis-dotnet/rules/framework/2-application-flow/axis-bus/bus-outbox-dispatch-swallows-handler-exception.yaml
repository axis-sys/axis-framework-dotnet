id: bus-outbox-dispatch-swallows-handler-exception
title: The dispatcher never lets a handler exception escape the poll loop
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  DispatchRowAsync wraps the whole per-row dispatch in try/catch. A handler that throws (surfacing as a
  reflection TargetInvocationException) is caught and treated as an ordinary dispatch failure — the row's lease
  is released and its place kept, exactly like a handler that returned a failed AxisResult — so it never
  propagates to AxisBusDispatcherWorker's loop and never crashes the host; the worker then backs off and raises
  a critical alert (bus-outbox-worker-backoff-alert). This is the deliberate opposite of the in-memory adapter,
  which lets a throwing handler escape.
invariants:
  - Every per-row dispatch is wrapped in try/catch; a thrown handler exception is caught, not propagated to the worker loop.
  - A caught exception is treated as a normal delivery failure (lease released, row kept for re-claim), never a crash and never a terminal skip.
  - This durability contrasts with the in-memory adapter, where a throwing handler escapes PublishAsync.
