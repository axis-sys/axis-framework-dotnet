notes: >
  This is the transactional-outbox shape sketched in custom-adapter.md, shipped as a first-party adapter over
  Postgres/MySQL. Choose it when producers and consumers span processes or an event must survive a crash. Unlike
  the textbook two-connection outbox, the write is atomic with the business state (one transaction), not a
  separate autocommit insert.
