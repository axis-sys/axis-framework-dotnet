id: bus-outbox-write-read-split
title: The durable outbox adapter splits the write path from the read/dispatch path
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The AxisBus.Repository adapter turns a publish into a durable outbox. RepositoryBusAdapter is the write side:
  PublishAsync ENQUEUES the event on the request-scoped queue and returns — it never invokes a handler and never
  writes a row itself; the unit of work drains the queue into its own transaction at commit
  (bus-outbox-enqueue-in-uow-transaction). BusDispatcher is the read side: it claims a partition head, delivers
  it, then deletes it on success or releases the lease on failure. The two sides never call each other. This
  trades the in-memory adapter's synchronous fan-out for durability and atomicity — the event is committed with
  the triggering state change and survives a process crash before dispatch.
invariants:
  - RepositoryBusAdapter.PublishAsync enqueues the event on the request-scoped queue and returns without invoking any handler; the row is written by the unit of work's drain, not by PublishAsync.
  - BusDispatcher reads the outbox (claim, deliver, delete/release) and invokes the handlers; it is a separate component from the write-side adapter.
  - The write side and the read side never call each other.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisBus/Repository/AxisBus.Repository/RepositoryBusAdapter.cs:22 — write side: enqueue on the scoped queue, never invoke a handler"
    - "src/2-ApplicationFlow/AxisBus/Repository/AxisBus.Repository/BusDispatcher.cs:24 — read side: drain the outbox and invoke handlers"
examples:
