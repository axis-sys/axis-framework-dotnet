    - "src/2-ApplicationFlow/AxisBus/Repository/Postgres/AxisBus.Postgres/Adapters/PostgresBusDispatchStore.cs:26 — ClaimHeadsAsync: non-locking discover (DISTINCT ON) + per-PK claim UPDATE + read-back SELECT, no RETURNING/SKIP LOCKED"
    - "src/2-ApplicationFlow/AxisBus/Repository/MySql/AxisBus.MySql/Adapters/MySqlBusDispatchStore.cs:37 — the same non-locking discovery SELECT + per-PK claim + read-back"
    - "src/2-ApplicationFlow/AxisBus/Repository/MySql/AxisBus.MySql/DependencyInjection.cs:44 — connections pinned to READ COMMITTED because the pool is shared with adapters that need it, not because the claim UPDATE does"
