id: bus-outbox-dialect-divergence
title: Only the INSERT diverges by dialect; the claim path mirrors across both stores
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  The publish path is almost fully shared: IAxisBusSqlDialect exposes only InsertSql, and the two dialects
  differ solely in Postgres casting the JSON columns to ::JSONB where MySQL does not — the rest of the write
  goes through the shared RepositoryOutboxDrain. The claim path has no shared core — IBusEventDispatchStore is
  implemented independently by each dialect — but the mechanism itself is identical: a non-locking discovery
  SELECT finds the head of each due partition, an UPDATE by primary key (guarded by a not-currently-claimed
  check) claims it individually, and a read-back SELECT fetches the claimed rows. Neither dialect uses
  UPDATE ... RETURNING or FOR UPDATE SKIP LOCKED. MySQL additionally pins connections to READ COMMITTED and
  wraps writes in a transient-error retry, because its dispatch-store connections share a pool with other
  adapters that do need the looser isolation — not because its own claim UPDATE requires it. Postgres needs
  neither precaution.
invariants:
  - IAxisBusSqlDialect exposes only InsertSql; Postgres casts JSON/topics to ::JSONB, MySQL does not; the rest of the insert is shared in RepositoryOutboxDrain.
  - IBusEventDispatchStore has no shared implementation — Postgres and MySQL each implement claim/delete/release fully — but both follow the same non-locking discover + per-PK claim + read-back mechanism.
  - Neither dialect claims a batch with UPDATE ... RETURNING or FOR UPDATE SKIP LOCKED; the per-PK claim UPDATE (guarded by a not-claimed check) is what makes two dispatchers never take the same head.
  - MySQL additionally pins its dispatch-store connections to READ COMMITTED and wraps writes in a transient-error retry (pool-sharing precaution, not a different claim algorithm); Postgres needs neither.
reference:
  kind: framework-source
  at:
