notes: >
  Mirrors the AxisSaga split: shared-core SQL where it is safe (INSERT), independently-implemented stores for
  the claim (no shared base class) — though the claim algorithm itself is identical across dialects.
  MySqlTransientRetry absorbs residual deadlock/lock-timeout (1213/1205) on top of the READ COMMITTED pin, a
  precaution Postgres's MVCC does not require.
