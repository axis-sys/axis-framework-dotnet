notes: >
  SUPERSEDED by bus-outbox-enqueue-in-uow-transaction. PublishAsync no longer inserts a row: it enqueues the
  event on the request-scoped queue, and the unit of work's drain writes it into the same transaction at commit.
  There is no Pending status, Attempts, RetainForSeconds, ProcessedAt or DeleteNotBefore — the schema dropped
  those columns (bus-outbox-schema). EventType is still the AssemblyQualifiedName, rehydrated by the dispatcher
  via Type.GetType at drain time. Kept for history.
