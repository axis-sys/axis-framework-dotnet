id: bus-outbox-publish-inserts-pending-row
title: Durable publish serializes the event and inserts one Pending row
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: superseded
superseded_by: bus-outbox-enqueue-in-uow-transaction
description: >
  RepositoryBusAdapter.PublishAsync serializes the event to JSON, and on success builds a BusEventRow and
  hands it to IBusEventStore.InsertAsync. The row is stamped with a GUID v7 EventId, the event's
  AssemblyQualifiedName as EventType, Pending status, zero Attempts, CreatedAt = AvailableAt = the injected
  TimeProvider's now, the params topics, and the default retention. If serialization fails the failure
  short-circuits and the store is never called.
invariants:
  - The event is serialized to JSON first; a serialization failure returns that error and InsertAsync is never called.
  - The inserted row has EventId = Guid.CreateVersion7(), EventType = typeof(TEvent).AssemblyQualifiedName, Status = Pending, Attempts = 0.
  - CreatedAt and AvailableAt are both the injected TimeProvider's current UTC instant, so the row is immediately due.
  - The row carries the publish's params topics and the default RetainForSeconds; ClaimedBy, ClaimedUntil, ProcessedAt and DeleteNotBefore start null.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisBus/Repository/AxisBus.Repository/RepositoryBusAdapter.cs:21 — serialize, short-circuit on failure, build row, InsertAsync"
examples:
