notes: >
  Replaces the earlier per-row model (bus-outbox-retry-backoff and bus-outbox-terminal-failed, both superseded):
  no ATTEMPTS column, no per-row exponential backoff, no terminal Failed state and no retention sweep. The
  trade-off is deliberate — the outbox guarantees ordered at-least-once delivery and refuses to advance past a
  failing head, delegating dead-lettering to the broker/operator through the critical alert rather than silently
  skipping. Delivery is at-least-once, so handlers must stay idempotent.
