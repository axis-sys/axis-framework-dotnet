    - "src/2-ApplicationFlow/AxisBus/Repository/AxisBus.Repository/AxisBusDispatcherWorker.cs:57 — exponential backoff of the whole worker capped at MaxPollBackoff"
    - "src/2-ApplicationFlow/AxisBus/Repository/AxisBus.Repository/AxisBusDispatcherWorker.cs:61 — CRITICAL alert on every failing pass; delivery halted until it clears"
