notes: >
  SUPERSEDED by bus-outbox-worker-backoff-alert. The atomic-outbox redesign removed the terminal Failed state,
  the ATTEMPTS/MaxAttempts count and the retention sweep entirely: a poison row (unresolvable type or bad
  payload) is never marked terminal or skipped — it keeps its place, the partition halts, and the worker raises
  a critical alert and retries until the fault clears. Kept for history.
