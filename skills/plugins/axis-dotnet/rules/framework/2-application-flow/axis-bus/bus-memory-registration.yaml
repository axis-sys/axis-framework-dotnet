id: bus-memory-registration
title: AddAxisMemoryBus registers the in-process adapter and scans handlers
tier: framework
family: 2-application-flow
package: AxisBus
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  A single-process app enables the in-memory bus by calling AddAxisMemoryBus(). It registers IAxisBus as the
  MemoryBusAdapter with a Scoped lifetime (one bus per request scope, sharing the scope's IServiceProvider),
  calls AddCqrsMediator(Assembly.GetExecutingAssembly()) to discover IAxisEventHandler<> implementations, and
  returns the same IServiceCollection for chaining. Handlers are resolved from the provider per publish, so
  they may be scoped, transient or singleton.
invariants:
  - AddAxisMemoryBus registers IAxisBus -> MemoryBusAdapter with a Scoped lifetime.
  - AddAxisMemoryBus calls AddCqrsMediator to scan an assembly for IAxisEventHandler<> implementations and register them.
  - AddAxisMemoryBus returns the same IServiceCollection so registration can be chained.
  - Handlers are resolved from IServiceProvider on each publish, so their own lifetime (scoped/transient/singleton) is the caller's choice.
