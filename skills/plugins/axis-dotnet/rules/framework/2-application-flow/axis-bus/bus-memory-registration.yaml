notes: >
  The scan uses Assembly.GetExecutingAssembly() — the AxisMemoryBus assembly itself — so handlers living in
  your application assemblies must be registered by calling AddCqrsMediator(typeof(MyHandler).Assembly) (or
  AddScoped one by one) before AddAxisMemoryBus. The DI test names the lifetime "singleton" but the
  registration is Scoped; the test only resolves twice from the root provider, where a scoped service
  compares equal.
