id: saga-mediator-get-by-id
title: GetByIdAsync reads a saga's state, typed or untyped
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  GetByIdAsync has two overloads. The untyped one returns AxisResult<AxisSagaInstance> carrying the full state
  (Status, CurrentStage, PayloadJson raw, LastErrorCode/Message, Version, CreatedAt, UpdatedAt) — use it for
  logging or admin endpoints. The typed GetByIdAsync<TPayload> additionally deserializes the payload into
  AxisSagaInstance<TPayload>.Payload. Missing row -> NotFound(SagaInstanceNotFound); bad stored JSON ->
  InternalServerError(PayloadDeserializationFailed). This is how a caller polls for a terminal status.
invariants:
  - GetByIdAsync returns AxisResult<AxisSagaInstance> with the raw PayloadJson; GetByIdAsync<TPayload> returns AxisSagaInstance<TPayload> with the deserialized Payload.
  - A missing instance returns AxisError.NotFound(SagaInstanceNotFound); undeserializable JSON returns InternalServerError(PayloadDeserializationFailed).
  - AxisSagaInstance carries the full state (Status, CurrentStage, PayloadJson, LastErrorCode/Message, Version, CreatedAt, UpdatedAt) for status polling.
