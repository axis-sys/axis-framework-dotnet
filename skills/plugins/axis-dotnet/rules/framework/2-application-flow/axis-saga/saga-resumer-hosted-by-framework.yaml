  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/2-ApplicationFlow/AxisSaga/resumer.md"
    - "docs/en-us/2-ApplicationFlow/AxisSaga/getting-started.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  Hand-rolling a resumer BackgroundService is the imperative temptation this rule removes — the framework owns
  the loop, the schema migration and the definition upsert.
