id: saga-resume-is-signal
title: ResumeAsync is a fire-and-forget signal; a re-fire on a terminal saga is harmless
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  ResumeAsync(sagaId) says "please drive this saga forward". The mediator schedules the engine (Task.Run -> a
  fresh scope -> SagaEngine.ExecuteAsync) and returns Ok immediately without waiting. A re-fire is safe for a
  saga that is already Completed / Compensated / Failed: the engine re-acquires the execution lease via
  AcquireLeaseAsync, which excludes terminal sagas, so the run finds nothing to claim and stops. Application
  code drives a saga only through the mediator (StartAsync / ResumeAsync) — never by calling the engine.
invariants:
  - ResumeAsync schedules the engine in the background and returns Ok immediately; it does not await the engine.
  - Re-firing a terminal saga is a no-op because AcquireLeaseAsync excludes Completed/Compensated/Failed instances.
  - Application code never calls SagaEngine directly; it resumes only via IAxisSagaMediator.ResumeAsync.
