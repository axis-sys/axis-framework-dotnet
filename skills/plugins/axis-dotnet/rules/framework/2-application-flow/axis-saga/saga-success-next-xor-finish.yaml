id: saga-success-next-xor-finish
title: A stage's success outcome is either NextStageOnSuccess or FinishOnSuccess, never both
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  On success a stage either advances to a named stage (NextStageOnSuccess) or terminates the chain
  (FinishOnSuccess) — the two are mutually exclusive. The stage builder throws InvalidOperationException if you
  call one after the other. FinishOnSuccess on a forward stage completes the saga (Completed); on an error
  stage it ends the compensation chain (Compensated).
invariants:
  - Calling NextStageOnSuccess after FinishOnSuccess (or the reverse) on the same stage throws InvalidOperationException.
  - A forward stage that finishes on success drives the saga to Completed; an error stage that finishes drives it to Compensated.
  - A stage with neither Next nor Finish set has NextStageOnSuccess == null, which the engine treats as the end of the chain.
reference:
