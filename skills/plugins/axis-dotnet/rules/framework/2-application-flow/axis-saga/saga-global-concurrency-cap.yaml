id: saga-global-concurrency-cap
title: A single process-wide cap in the database bounds how many sagas hold a live lease
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: application
severity: should
status: canonical
lens: [concurrency]
description: >
  A single process-wide ceiling lives in the database, not in settings: the AXIS_SAGA.SAGA_SETTINGS singleton
  row holds MAX_CONCURRENT_SAGAS (seeded to 20, NULL = unbounded), adjustable at runtime with a plain UPDATE and
  no redeploy. The cap is enforced atomically inside AcquireLeaseAsync — a claim succeeds only while fewer than
  the cap hold a live lease. The resumer pre-trims its batch to the free slots (an optimization; the atomic gate
  is the authority), and a completing run pumps the Pending sagas the cap had deferred, so a burst drains as
  slots free rather than waiting on the periodic poll.
invariants:
  - The cap is MAX_CONCURRENT_SAGAS in the SAGA_SETTINGS singleton row (seeded 20, NULL = unbounded), changeable at runtime with an UPDATE.
  - AcquireLeaseAsync enforces the cap atomically — a claim is admitted only while fewer than the cap hold a live lease; the count is by live lease, not by status.
  - The resumer fetches at most the number of free slots per pass, and a run that completes pumps the deferred Pending sagas up to the free capacity.
