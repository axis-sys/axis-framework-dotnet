id: saga-status-model
title: The saga state model is AxisSagaStatus, AxisSagaStageStatus and the AxisSagaInstance record
tier: framework
family: 2-application-flow
package: AxisSaga
concern: package-mechanics
layer: any
severity: must
status: canonical
description: >
  A saga's lifecycle is the AxisSagaStatus enum: Pending -> Running -> Completed | Failed | (Compensating ->
  Compensated). Completed, Failed and Compensated are terminal. Each stage attempt has an AxisSagaStageStatus:
  Started -> Completed | Failed. The persisted state is the immutable AxisSagaInstance record (SagaId, SagaName,
  Status, CurrentStage, PayloadJson, LastErrorCode/Message, Version, CreatedAt, UpdatedAt); the typed
  AxisSagaInstance<TPayload> adds the deserialized Payload.
invariants:
  - AxisSagaStatus is Pending, Running, Completed, Failed, Compensating, Compensated; Completed/Failed/Compensated are terminal.
  - AxisSagaStageStatus is Started, Completed, Failed — one lifecycle per stage attempt.
  - AxisSagaInstance is the immutable state record; AxisSagaInstance<TPayload> extends it with the deserialized Payload.
reference:
  kind: framework-source
  at:
