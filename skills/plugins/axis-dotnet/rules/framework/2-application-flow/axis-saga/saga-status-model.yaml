    - "src/2-ApplicationFlow/AxisSaga/AxisSaga/SharedKernel/AxisSagaStageStatus.cs:3 — Started/Completed/Failed"
    - "src/2-ApplicationFlow/AxisSaga/AxisSaga/SharedKernel/AxisSagaInstance.cs:3 — AxisSagaInstance and its typed variant"
examples:
