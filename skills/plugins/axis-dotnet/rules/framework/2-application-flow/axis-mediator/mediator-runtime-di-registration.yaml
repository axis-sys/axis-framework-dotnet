id: mediator-runtime-di-registration
title: AddAxisMediator wires the mediator and handler Scoped and both accessors Singleton
tier: framework
family: 2-application-flow
package: AxisMediator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  AddAxisMediator() is the single wiring point for the runtime. It registers IAxisMediatorHandler and
  IAxisMediator with a Scoped lifetime (one per request scope) and both IAxisMediatorAccessor and
  IAxisMediatorContextAccessor as Singleton. The accessors are safe as singletons because their state lives
  in static AsyncLocal fields, not instance fields, so no request state is shared across scopes.
  AddPerformanceBehavior() is a separate opt-in that adds the open-generic timing behavior.
invariants:
  - AddAxisMediator registers IAxisMediatorHandler as AxisMediatorHandler and IAxisMediator as AxisMediator with a Scoped lifetime.
  - AddAxisMediator registers IAxisMediatorAccessor as AxisMediatorAccessor and IAxisMediatorContextAccessor as AxisMediatorContextAccessor with a Singleton lifetime.
  - The Singleton accessors are correct only because their backing state is stored in static AsyncLocal fields, not per instance, so no request state leaks across scopes.
  - AddAxisMediator is called once per application and is independent of AddCqrsMediator (handler scan) and AddPerformanceBehavior (opt-in behavior).
