id: mediator-runtime-mediator-accessor
title: AxisMediatorAccessor publishes the current mediator through a static AsyncLocal
tier: framework
family: 2-application-flow
package: AxisMediator
concern: package-mechanics
layer: application
lens: [concurrency]
severity: must
status: canonical
description: >
  AxisMediatorAccessor stores the current IAxisMediator in a static AsyncLocal, so the mediator is reachable
  from anywhere in the same async flow without being injected. The AxisMediator constructor publishes itself
  into the accessor and Dispose clears it. Registered Singleton, the accessor holds no per-request state of
  its own — the AsyncLocal carries the flow-scoped instance and disposing the scope removes it.
invariants:
  - AxisMediatorAccessor backs its AxisMediator property with a static AsyncLocal, so the value flows with the async context, not with the singleton instance.
  - The AxisMediator constructor publishes itself into the accessor on construction; Dispose sets the accessor value back to null.
  - Setting the accessor value to null clears it, so a disposed request scope leaves no dangling mediator in the AsyncLocal.
