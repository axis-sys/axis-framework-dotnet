id: mediator-runtime-context-accessor
title: AxisMediatorContextAccessor stores the ambient context in static AsyncLocal fields
tier: framework
family: 2-application-flow
package: AxisMediator
concern: package-mechanics
layer: application
lens: [concurrency]
severity: must
status: canonical
description: >
  AxisMediatorContextAccessor is the runtime store for the ambient request context — OriginId, JourneyId,
  AxisEntityId and the CancellationToken — each held in a static AsyncLocal field. Application middleware at
  the request edge populates it; the mediator reads through it, delegating its OriginId, JourneyId,
  AxisEntityId and CancellationToken properties to this accessor. Registered Singleton, it carries no
  per-instance state; the AsyncLocal fields scope each value to the current async flow.
invariants:
  - AxisMediatorContextAccessor backs OriginId, JourneyId, AxisEntityId and CancellationToken with static AsyncLocal fields.
  - The values are populated by application middleware at the request edge, not by the framework runtime.
  - The IAxisMediator OriginId, JourneyId, AxisEntityId and CancellationToken read straight through this accessor rather than storing their own copies.
