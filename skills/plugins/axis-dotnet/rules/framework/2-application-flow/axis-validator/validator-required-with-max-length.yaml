id: validator-required-with-max-length
title: RequiredWithMaxLength requires a present string no longer than the limit
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  RequiredWithMaxLength layers a length ceiling on the presence check: the value must be present (not null,
  empty or whitespace-only) AND its length must be at most the given limit. The limit defaults to
  IAxisValidatorBase.DefaultMaxLength (255). Both a missing value and an over-length value report the same
  single error code.
invariants:
  - The value must pass the presence check (not null, empty or whitespace-only).
  - The value length must be at most the given length, which defaults to 255.
  - A missing value and an over-length value both fail with the same error code.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation/AxisValidatorBase.cs:86 — presence + Length <= length; default 255"
    - "src/2-ApplicationFlow/AxisValidator/AxisValidator/AxisValidatorBase.cs:9 — DefaultMaxLength = 255"
examples:
  correct:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation.UnitTests/AxisValidatorBaseTests.cs:135 — valid passes; null, empty, whitespace and too-long fail with the code"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-validator
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/2-ApplicationFlow/AxisValidator/validator-base.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  To distinguish "missing" from "too long" you must split into two rules with two codes; the helper
  deliberately collapses both into one code.
