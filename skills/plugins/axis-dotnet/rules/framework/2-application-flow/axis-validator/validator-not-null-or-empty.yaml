id: validator-not-null-or-empty
title: NotNullOrEmpty rejects null, default and blank, and runs dependent rules only when present
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  NotNullOrEmpty is the presence helper. A property fails when it is null, equal to default(TProperty), or a
  string that is empty or whitespace-only. Two further overloads take dependent rules — an Action, or an
  Action<TProperty> handed the non-null value — that run only when the property is present, so nested checks
  never fire on a missing parent.
invariants:
  - NotNullOrEmpty fails when the value is null, equals default(TProperty), or is a whitespace-only string.
  - The Action overload runs its nested rules only when the property is non-null (guarded by When).
  - The Action<TProperty> overload passes the non-null value into the lambda and runs it only when present.
