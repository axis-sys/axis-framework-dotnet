id: validator-range
title: Range bounds a present nullable struct inclusively and skips a null value
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  Range validates a nullable value type against optional inclusive bounds. A null value passes (Range is an
  optional constraint, not a presence check). When the value is present it must be >= min (if a min is given)
  and <= max (if a max is given); either bound may be omitted, and with no bounds any present value passes.
invariants:
  - A null value passes Range (it does not assert presence).
  - When present, the value must be >= min if min is supplied and <= max if max is supplied, both inclusive.
  - Either bound may be omitted; with neither bound, any present value passes.
reference:
