id: validator-error-code-is-contract
title: The error code is the contract, not the message
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  Every helper takes a stable errorCode string and attaches it with WithErrorCode. On failure the adapter
  projects each FluentValidation failure into AxisError.ValidationRule(failure.ErrorCode), so the code — not
  a human message — travels on the failure rail and is what callers, tests and presentation resolvers key
  off. Messages are resolved downstream from the code; a validator never encodes the message as its contract.
invariants:
  - Every helper attaches its error via WithErrorCode(errorCode); the code is a stable string decided by the author.
  - The adapter builds each failure as AxisError.ValidationRule(failure.ErrorCode), carrying the code, not the FluentValidation message.
  - Distinguishing "missing" from "malformed" requires two separate rules with two codes; a single helper reports one code for both.
