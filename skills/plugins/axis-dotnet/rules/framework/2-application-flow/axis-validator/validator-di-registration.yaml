id: validator-di-registration
title: AddAxisValidator wires the validators, the adapter and both pipeline behaviors
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: must
status: canonical
description: >
  A subdomain enables Axis validation by calling AddAxisValidator(assemblies) once. It scans the given
  assemblies for FluentValidation validators (including internal types), registers the FluentValidatorAdapter
  as the scoped IAxisValidator<> implementation, and registers both ValidationBehavior overloads as transient
  IAxisPipelineBehavior. This is the single wiring point; validators are discovered by assembly scan, not
  registered one by one.
invariants:
  - AddAxisValidator(params Assembly[]) registers FluentValidation validators from the given assemblies, including internal types.
  - It registers FluentValidatorAdapter<> as IAxisValidator<> with a scoped lifetime.
  - It registers ValidationBehavior<> and ValidationBehavior<,> as transient IAxisPipelineBehavior for both request shapes.
