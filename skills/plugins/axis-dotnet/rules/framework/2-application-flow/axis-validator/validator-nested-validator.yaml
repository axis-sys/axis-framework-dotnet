id: validator-nested-validator
title: UsesValidator and EachUsesValidator compose a child validator for nested shapes
tier: framework
family: 2-application-flow
package: AxisValidator
concern: package-mechanics
layer: application
severity: should
status: canonical
description: >
  UsesValidator delegates a reference-type property to a nested AxisValidatorBase<TProperty>, and
  EachUsesValidator delegates each item of a collection to a nested AxisValidatorBase<TItem>. A null nested
  property is skipped and passes; a present one is validated, and its failures carry the CHILD validator's
  own error codes rather than a single parent code. These two helpers live on the concrete base, not on the
  IAxisValidatorBase interface.
invariants:
  - UsesValidator validates a present reference-type property with a nested AxisValidatorBase and skips a null property.
  - EachUsesValidator validates each item of a collection with a nested AxisValidatorBase.
  - Failures from a nested validator carry that validator's own error codes, not a single parent code.
reference:
  kind: framework-source
  at:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation/AxisValidatorBase.cs:210 — EachUsesValidator via RuleForEach.SetValidator; UsesValidator via RuleFor.SetValidator"
examples:
  correct:
    - "src/2-ApplicationFlow/AxisValidator/FluentValidation/AxisValidator.FluentValidation.UnitTests/AxisValidatorBaseTests.cs:793 — EachUsesValidator per item and UsesValidator with null-skip and nested code propagation"
  incorrect: []
exceptions:
  - These two helpers are declared on the concrete AxisValidatorBase<T> only; they are not part of the IAxisValidatorBase<T> interface vocabulary.
derives_to:
  skills:
    - axis-validator
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/2-ApplicationFlow/AxisValidator/validator-base.md"
ledger:
