notes: >
  Recover, MapError, Match, TapError, OrElse and RequireNotFound act on the error side or terminate the
  chain and never receive the token. The reference-app convention prefers registering the request token
  as a scoped service so handlers read it ambiently rather than threading it, reserving the CT-aware
  overloads for explicit-threading cases.
