id: result-match-terminal
title: Collapse the railway to a final value with Match at the terminal
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: must
status: canonical
description: >
  Match is the exit of the railway: it runs exactly one branch — onSuccess or onFailure — and returns a
  concrete final value of TResult, leaving the AxisResult world behind. Use it at the edge (an HTTP
  response, a message, a DTO) or when a decision must branch on the failure content. It is the safe
  alternative to reading .Value, which throws when the result is a failure.
invariants:
  - Match runs exactly one branch and returns its result — never both, never neither.
  - onFailure receives the error list (IReadOnlyList<AxisError>); onSuccess on AxisResult<TValue> receives the value, while onSuccess on the valueless AxisResult takes no argument.
  - Match returns a final value of TResult, so it belongs at the terminal of the pipeline, not mid-chain.
  - Prefer Match over reading .Value, which throws on a failure.
  - MatchAsync is the awaited form with the same one-branch semantics.
reference:
