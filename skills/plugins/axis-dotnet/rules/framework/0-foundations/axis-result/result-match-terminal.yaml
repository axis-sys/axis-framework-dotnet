    - "src/0-Foundations/AxisResult/AxisResult/AxisResult.Functional.cs:128 — Match on AxisResult<TValue> (onSuccess receives Value)"
    - "docs/en-us/0-Foundations/AxisResult/match.md — Match as the terminal exit and safe alternative to .Value"
