notes: >
  TryBind/TryBindAsync are the flattening siblings for callbacks that themselves return AxisResult and
  share the same IsCritical rethrow and Task-only rules; they are covered by their own rule. The
  reference app documents the same boundary convention in its rulebook and becomes an examples.correct
  anchor once the convention tier is migrated.
