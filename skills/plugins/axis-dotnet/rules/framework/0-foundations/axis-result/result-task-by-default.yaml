notes: >
  The zero-allocation benefit applies only when a ValueTask completes synchronously; a misused
  ValueTask is worse than a Task. The reference app carries the same guidance as its async
  Task-vs-ValueTask convention, which becomes an examples anchor once the convention tier is migrated.
