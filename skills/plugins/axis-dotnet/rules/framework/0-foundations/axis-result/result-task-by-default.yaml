id: result-task-by-default
title: Default to Task<AxisResult<T>>; use ValueTask only on a measured hot path
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: should
status: canonical
description: >
  Every async operator in AxisResult ships in two mirrored forms, one returning Task and one
  returning ValueTask, over an identical composition pipeline. Default to Task because it is safe to
  await more than once, store, and combine. Reach for ValueTask only on a hot path proven by
  profiling where the call frequently completes synchronously, and only once you accept its
  consumption rules.
invariants:
  - Async methods that return an AxisResult default to Task<AxisResult> or Task<AxisResult<T>>.
  - Every railway operator exposes both a Task-returning and a ValueTask-returning form with an identical pipeline.
  - ValueTask is chosen only on a hot path measured by profiling where the method frequently completes synchronously.
  - A ValueTask result is never awaited more than once, stored in a field, or passed to Task.WhenAll/WhenAny without first calling AsTask.
  - AsValueTaskAsync lifts an already-computed AxisResult onto the ValueTask surface without allocating a Task.
