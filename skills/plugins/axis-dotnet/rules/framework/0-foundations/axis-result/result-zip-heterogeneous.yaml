notes: >
  Zip is the sequential, fail-fast combinator for heterogeneous values; use ZipParallel when the
  operations are independent and should run concurrently. Each arity exposes four overloads (plain
  value, Task, AxisResult, Task of AxisResult) so a step may itself be fallible or async. The spread
  ThenAsync overloads complete the tuple surface: Zip accumulates, ThenAsync (valueless) runs a side
  effect keeping the tuple, Map collapses — no ValueN access anywhere in the pipeline.
