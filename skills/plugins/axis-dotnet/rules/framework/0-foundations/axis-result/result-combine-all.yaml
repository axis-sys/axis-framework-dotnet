notes: >
  Distinct from Zip, which combines 2-4 different-typed values into a tuple; Combine/All fold
  a homogeneous collection. The accumulate-don't-short-circuit contract is the whole point:
  reach for these to surface every failure at once, and reach for a Then/fold when a later
  step depends on an earlier one's value.
