id: result-combine-all
title: Collect every error across independent results with Combine and All
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: should
status: canonical
description: >
  Combine folds many valueless AxisResult into one, gathering EVERY error across the
  independent results instead of stopping at the first. All does the same for same-typed
  AxisResult<T>, aggregating them into AxisResult<IReadOnlyList<T>>. Both accumulate rather
  than short-circuit, so they fit independent work (validate all fields, fetch a batch) —
  not ordered dependent writes, which belong in a fold that threads the value on the rail.
invariants:
  - Combine returns Ok only when no input result fails; otherwise it returns an Error carrying every failing result's errors.
  - All returns Ok with the ordered IReadOnlyList of values only when every result succeeds; if any fails it returns an Error with all errors and no value list.
  - Neither Combine nor All short-circuits on the first failure — both walk all inputs and accumulate every error.
  - The Task overloads (AllAsync/CombineAsync over IEnumerable<Task<...>>) run all operations in parallel via Task.WhenAll.
  - The ValueTask overloads and the (items, operation) overloads run sequentially, awaiting each operation before starting the next.
