notes: >
  These are ergonomic entry points, not distinct semantics: Rop() and the implicit value operator both
  equal AxisResult.Ok, and AsTaskAsync() is Task.FromResult. The reference app documents the same
  pipeline-entry ergonomics in its rulebook; that rule becomes an examples.correct anchor once the
  convention tier is migrated.
