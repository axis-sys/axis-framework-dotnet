notes: >
  Mirrors the operator table in recover.md. The ALL vs ANY split is load-bearing: RecoverWhen(type)
  and RecoverWhen(code) use Errors.Any, while RecoverNotFound and RequireNotFound use Errors.All. The
  RecoverNotFound (AxisResult.Functional.cs:162) and RequireNotFound (AxisResult.Functional.cs:50)
  implementations were confirmed but sit outside the anchor set given for this rule. The reference app
  rulebook documents the same recover discipline; that rule becomes an examples.correct anchor once
  the convention tier is migrated. A type-changing overload was first prototyped as RecoverNotFound<TNew>
  and reverted: it silently broke the "success unchanged" invariant every sibling in this family upholds
  (it also runs map() on success), so it was renamed to ElseNotFound and moved to its own rule
  (result-else-notfound) instead of overloading this operator's name.
