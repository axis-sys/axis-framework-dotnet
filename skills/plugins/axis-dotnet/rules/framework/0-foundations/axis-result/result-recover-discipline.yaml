    - "src/0-Foundations/AxisResult/AxisResult/AxisResult.Functional.cs:187 — RecoverConflict family, Errors.All on Conflict, value and result recovery"
    - "src/0-Foundations/AxisResult/AxisResult/AxisResult.Functional.cs:30 — OrElse alternative producer with optional error combination"
