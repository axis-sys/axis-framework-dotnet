notes: >
  The absence of a Message field is deliberate: Code is the stable key for logs, metrics and retry,
  while human-facing text is resolved at the presentation edge (see errors-and-types.md). The
  reference app documents the same principle in its rulebook as rop-errors-as-values; that rule
  becomes an examples.correct anchor once the convention tier is migrated.
