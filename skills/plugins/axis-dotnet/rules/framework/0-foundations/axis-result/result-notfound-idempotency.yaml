notes: >
  RequireNotFound and WithValueAsync also expose Task-returning extension variants
  (RequireNotFoundAsync, WithValueAsync) so the pattern composes over an async reader. The
  get-or-create sibling that recovers to a value rather than switching branches is RecoverNotFound.
  Its dual on the write side is RecoverConflict, guarding the create branch: a read-mostly ensure
  reads first, creates on NotFound, and the loser of a concurrent first-sight race recovers from the
  Conflict by re-reading the winner — idempotent from the caller's view, with the hot path a single read.
  The reference app documents the same idempotency semantic in its rulebook; that rule becomes an
  examples.correct anchor once the convention tier is migrated.
