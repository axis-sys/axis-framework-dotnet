id: result-notfound-idempotency
title: Express existence checks on the railway with RequireNotFound and OrElse-on-NotFound
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: should
status: canonical
description: >
  Existence checks belong on the rail, not in an imperative if/throw. For create-must-not-exist,
  run the reader Get, then RequireNotFound(conflict): a found value becomes the conflict failure, an
  all-NotFound failure flips to success, and any other failure propagates unchanged. Because
  RequireNotFound lives on the non-generic AxisResult and drops the upstream value, re-attach the
  new instance with WithValueAsync before continuing. For get-or-create, recover the all-NotFound
  branch instead so the miss produces the created value.
invariants:
  - RequireNotFound(errorIfFound) fails with errorIfFound when the upstream result is a success (the entity was found).
  - RequireNotFound turns an all-NotFound failure into a valueless success and propagates any failure whose errors are not all NotFound.
  - RequireNotFound is declared on the non-generic AxisResult, so its result carries no value and the downstream value must be supplied explicitly.
  - WithValueAsync(value) promotes a Task<AxisResult> to Task<AxisResult<TNew>>, wrapping value on success and propagating the errors on failure.
  - The canonical create-if-not-exists chain is Get -> RequireNotFound(conflict) -> WithValueAsync(new) -> Map/Then(create), so a duplicate short-circuits to the conflict before creation runs.
  - Get-or-create must gate the fallback on an all-NotFound failure so unrelated errors are not silently swallowed by the create branch.
