notes: >
  Born from a design conversation: the user asked for a "RecoverNotFound-like" operator whose
  alternative value could be a new type. The first attempt overloaded RecoverNotFound<TNew> itself,
  which silently violated the "Recover never touches success" invariant the whole family shares
  (see result-recover-discipline's notes for that reverted attempt). Renaming to ElseNotFound keeps
  each family's contract exception-free — a reader can trust "Recover*" means "failure rail only"
  without having to remember one overload that isn't. It is documented as its own section in
  recover.md rather than the operator table, since it isn't a member of that table's family.
