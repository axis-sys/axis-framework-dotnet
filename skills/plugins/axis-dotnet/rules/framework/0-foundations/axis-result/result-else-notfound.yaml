id: result-else-notfound
title: ElseNotFound converges a found value and a NotFound default into a new type; it is not a Recover operator
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: should
status: canonical
description: >
  ElseNotFound<TNew> exists for the case where a caller wants a single call to produce a value of a
  DIFFERENT type than the source AxisResult<TValue>, whether the source was found or was a NotFound
  miss: map the found value into TNew, or recover a default TNew when every error is NotFound. Any
  other failure still propagates as AxisResult<TNew>, untouched. It deliberately does NOT start with
  "Recover" — every Recover/RecoverWhen/RecoverNotFound/OrElse overload returns the source unchanged
  on success (see result-recover-discipline); ElseNotFound cannot make that promise, because producing
  TNew from a success requires running a mapper. Naming it as a distinct operator, rather than as a
  RecoverNotFound<TNew> overload, keeps that family's "never touches success" invariant true without
  exception.
invariants:
  - On success, ElseNotFound applies map(Value) and returns Ok with the projected TNew — this is the one property that separates it from every Recover* operator, which never touch a successful result.
  - On a failure whose errors are ALL AxisErrorType.NotFound, ElseNotFound applies recovery() and returns Ok with the resulting TNew.
  - On any other failure (including a mix of NotFound and non-NotFound errors), ElseNotFound propagates the original errors as AxisResult<TNew> unchanged, exactly like Map<TNew>/Then<TNew> propagate on the failure rail.
  - ElseNotFound is ergonomic sugar for Map<TNew>(map).RecoverNotFound(recovery) fused into one call; prefer that composition instead when either branch itself needs to be fallible (returns AxisResult<TNew>) — reach for Then<TNew>(...).RecoverNotFound(Func<AxisResult<TNew>>) in that case, since ElseNotFound only covers the non-failing Map-like shape on both sides.
  - Do not reach for ElseNotFound when the recovered value keeps the SAME type as the source — RecoverNotFound(func) already covers that case without a type parameter.
reference:
  kind: framework-source
  at:
