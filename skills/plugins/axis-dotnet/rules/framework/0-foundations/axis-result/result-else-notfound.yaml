    - "src/0-Foundations/AxisResult/AxisResult/AxisResultExtensions.cs — ElseNotFoundAsync<TValue, TNew> over Task<AxisResult<TValue>>"
    - "src/0-Foundations/AxisResult/AxisResult/AxisResultExtensions.ValueTask.cs — ElseNotFoundAsync<TValue, TNew> over ValueTask<AxisResult<TValue>>"
