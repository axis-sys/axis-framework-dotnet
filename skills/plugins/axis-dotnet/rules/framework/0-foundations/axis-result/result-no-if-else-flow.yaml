  reviewed_on: 2026-07-12
notes: >
  Match and MatchAsync are the sanctioned terminal branch (AxisResult.Functional.cs lines 20 and 128);
  everything upstream stays on the chain. The reference app rulebook states the same discipline and
  becomes an examples.correct anchor once the convention tier is migrated.
