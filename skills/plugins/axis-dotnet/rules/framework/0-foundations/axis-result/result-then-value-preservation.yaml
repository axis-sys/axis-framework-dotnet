id: result-then-value-preservation
title: A valueless Then preserves the original value
tier: framework
family: 0-foundations
package: AxisResult
concern: package-mechanics
layer: any
severity: must
status: canonical
description: >
  Then has four forms distinguished by what the delegate returns and takes. The valueless form
  (delegate returns AxisResult, not AxisResult<T>) runs a step for its success/failure outcome but
  PASSES THROUGH the upstream value, so the next operator still sees the original T. Missing this is
  the most common ROP mistake — people reach for a variable to "hold" the value across a side effect.
invariants:
  - A Then whose delegate returns AxisResult (valueless) preserves the upstream value for later operators.
  - A Then whose delegate returns AxisResult<U> replaces the value with U.
  - The value-taking and valueless forms both short-circuit on the first failure.
  - On a tuple-valued track (after Zip), ThenAsync offers spread overloads that pass the tuple elements as separate delegate parameters; the valueless spread form preserves the whole tuple, the value-returning spread form replaces it. Available for 2-, 3- and 4-tuples on Task pipelines.
