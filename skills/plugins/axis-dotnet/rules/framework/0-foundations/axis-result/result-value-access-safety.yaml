notes: >
  The Deconstruct is safe because AxisResult<T> stores the value in a TValue? field and copies it out
  unconditionally, so no success check is needed before pattern matching. The reference app carries the
  matching convention-tier rule that will supply examples.correct once that tier is migrated.
