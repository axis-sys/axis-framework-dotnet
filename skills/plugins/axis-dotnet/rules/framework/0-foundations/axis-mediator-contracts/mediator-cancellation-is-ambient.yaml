notes: >
  This is the canonical home of the "CancellationToken is ambient" rule; axis-result reinforces the same
  point in monadic composition. Analyzer AXIS0400 — flag a CancellationToken parameter on a
  method of a type implementing an Axis handler interface. The default(CancellationToken) == None trap
  means a missing middleware seed is silent, so it cannot be null-checked.
