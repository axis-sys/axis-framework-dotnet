id: types-value-object-equality
title: Generated equality is case-insensitive over the backing string, with a matching GetHashCode
tier: framework
family: 0-foundations
package: AxisTypes
concern: package-mechanics
layer: any
severity: must
status: canonical
description: >
  When CaseInsensitiveEquals is on (the default), the generator emits Equals and a matching GetHashCode
  that compare the backing property case-insensitively, so two value objects differing only in case are
  equal and hash equally. The comparison is Ordinal by default, or InvariantCulture when UseInvariantCulture
  is set, and the Equals signature differs for value versus reference types.
invariants:
  - With CaseInsensitiveEquals on, the generator emits Equals and GetHashCode that compare the backing property with a case-insensitive StringComparison.
  - The comparison is OrdinalIgnoreCase by default and InvariantCultureIgnoreCase when UseInvariantCulture is set.
  - A value-type value object gets Equals(T other); a reference-type value object gets a virtual Equals(T? other) guarded against null.
  - GetHashCode uses the same case-insensitive comparer as Equals, so equal values always produce equal hash codes.
