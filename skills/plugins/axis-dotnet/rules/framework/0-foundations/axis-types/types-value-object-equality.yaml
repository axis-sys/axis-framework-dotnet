    - "src/0-Foundations/AxisTypes/AxisTypes.SourceGenerator/ValueObjectGenerator.cs:124 — value-type Equals(T) vs reference-type virtual Equals(T?)"
    - "src/0-Foundations/AxisTypes/AxisTypes.UnitTests/AxisEntityIdTests.cs:64 — equality and GetHashCode are case-insensitive"
