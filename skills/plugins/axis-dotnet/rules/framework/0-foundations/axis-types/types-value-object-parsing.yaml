notes: >
  This asymmetry is the value-object counterpart of errors-as-values: parsing untrusted input must not
  throw for control flow, so it goes through TryParse; the implicit conversion is reserved for trusted
  in-code values. The reference app codifies the same trap as its "VO never receives null" rule.
