id: email-settings-shape
title: AxisEmailSettings groups Sender and Smtp with empty defaults
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisEmailSettings is a record with two nested groups: Sender (Address, Password, Name) and Smtp (Host, Port,
  SslEnabled). Sender and Smtp are non-null by default (each initialised to new()); every string defaults to
  string.Empty, Port to 0 and SslEnabled to false. The nested types are SenderData and SmtpData.
invariants:
  - AxisEmailSettings has two members, Sender (SenderData) and Smtp (SmtpData), each initialised to new() so neither is null.
  - SenderData exposes Address, Password and Name, all defaulting to string.Empty.
  - SmtpData exposes Host (string.Empty), Port (0) and SslEnabled (false).
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisEmail/AxisEmail/AxisEmailSettings.cs:3 — record with Sender and Smtp"
    - "src/3-Infra/AxisEmail/AxisEmail/AxisEmailSettings.cs:8 — SenderData Address/Password/Name"
    - "src/3-Infra/AxisEmail/AxisEmail/AxisEmailSettings.cs:15 — SmtpData Host/Port/SslEnabled"
examples:
  correct:
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit.UnitTests/AxisEmailTests.cs:80 — Sender defaults to empty"
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit.UnitTests/AxisEmailTests.cs:91 — Smtp defaults to empty"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-email
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisEmail/settings.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  Sender and Smtp being non-null by default is why the adapter can read _settings.Sender.Address without a
  null check even when configuration is absent (the value is empty, not null).
