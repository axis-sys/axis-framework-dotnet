id: email-transactional-scope
title: AxisEmail is for transactional and internal mail, not bulk or inbound
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: should
status: canonical
description: >
  The port is sized for one transactional or internal message at a time — order confirmations, password
  resets, alerts, admin pings. It is not a bulk-marketing engine (no bounce/click/reputation handling), not an
  inbound-mail receiver, and not a chat transport. Reach for a dedicated ESP, an inbound webhook, or a chat
  API for those.
invariants:
  - Use SendAsync for transactional and internal notifications (confirmations, resets, alerts, admin pings).
  - Do not use it for bulk marketing — use a dedicated ESP that handles bounce/click/reputation.
  - It sends only; it does not receive inbound mail and is not a chat/instant-message transport.
