id: email-data-required-fields
title: AxisEmailData requires To, Subject and Body
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  Three fields are compiler-required on AxisEmailData: To, Subject and Body. To is an
  IEnumerable<(string Name, string Email)> of recipients; Subject and Body are strings. The required modifier
  forces each to be assigned in the object initializer, so an email cannot be built without recipients, a
  subject and a body.
invariants:
  - To, Subject and Body carry the required modifier and must be set in the object initializer.
  - To is typed IEnumerable<(string Name, string Email)>; each recipient is a (Name, Email) tuple.
  - required guarantees the property is assigned, not that the collection is non-empty — an empty To still surfaces only as a delivery failure.
