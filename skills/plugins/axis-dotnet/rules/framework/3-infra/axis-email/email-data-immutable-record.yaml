id: email-data-immutable-record
title: AxisEmailData is an immutable record built once at the call site
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisEmailData is an immutable record: every member has an init-only setter. It is built once in the object
  initializer at the call site and never mutated by the adapter, which only reads it. Two payloads with the
  same fields are value-equal.
invariants:
  - AxisEmailData is declared record with init-only setters on every property.
  - The adapter never mutates the payload; it only reads its fields when building the message.
