id: email-mimekit-smtp-transport
title: The adapter connects, authenticates, sends and disconnects over SMTP
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
lens: [security]
severity: must
status: canonical
description: >
  After building the message the adapter drives MailKit's SmtpClient: connect to Smtp.Host on Smtp.Port with
  SecureSocketOptions.Auto when SslEnabled is true and SecureSocketOptions.None when false, authenticate with
  the sender's credentials, send the message, then disconnect(true). The SslEnabled flag is the only TLS
  switch.
invariants:
  - The adapter connects with client.ConnectAsync(Smtp.Host, Smtp.Port, options) where options is Auto when SslEnabled else None.
  - It then calls AuthenticateAsync(Sender.Address, Sender.Password), SendAsync(message) and DisconnectAsync(true).
  - SslEnabled=false selects SecureSocketOptions.None (no TLS); SslEnabled=true selects SecureSocketOptions.Auto (opportunistic TLS).
