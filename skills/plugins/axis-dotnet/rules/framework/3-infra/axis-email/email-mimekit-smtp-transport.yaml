notes: >
  SecureSocketOptions.Auto lets MailKit negotiate STARTTLS/SSL; None sends in plaintext. There is no explicit
  certificate policy or STARTTLS-required enforcement — a plaintext port with SslEnabled false sends
  unencrypted.
