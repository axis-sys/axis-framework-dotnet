id: email-mimekit-message-mapping
title: The MimeKit adapter maps AxisEmailData onto a MimeMessage
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  SendAsync builds a MimeMessage from the payload and settings: From = new MailboxAddress(Sender.Name,
  Sender.Address); Subject = data.Subject; Body = new TextPart(data.BodyTextType) { Text = data.Body }; and
  each To/Cc tuple becomes new MailboxAddress(name, email). The sender comes from settings, every other field
  from the payload.
invariants:
  - From is set from AxisEmailSettings.Sender (Name and Address), not from the payload.
  - Subject comes from the payload; Body is wrapped as new TextPart(data.BodyTextType) with Text = data.Body.
  - Each To and Cc tuple is added as new MailboxAddress(name, email) to message.To / message.Cc.
reference:
  kind: framework-source
  at:
