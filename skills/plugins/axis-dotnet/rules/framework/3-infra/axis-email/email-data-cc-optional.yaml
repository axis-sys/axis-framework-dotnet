id: email-data-cc-optional
title: Cc is optional and defaults to empty
tier: framework
family: 3-infra
package: AxisEmail
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  Carbon-copy recipients are optional. Cc is an IEnumerable<(string Name, string Email)> that defaults to an
  empty collection, so an email with no Cc is valid. When present, the adapter adds each tuple to the
  message's Cc list exactly as it does for To.
invariants:
  - Cc is IEnumerable<(string Name, string Email)> and defaults to an empty collection.
  - An AxisEmailData with no Cc is valid; the adapter simply iterates an empty Cc.
  - Each Cc tuple, when present, is added as new MailboxAddress(name, email) to message.Cc.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisEmail/AxisEmail/AxisEmailData.cs:9 — Cc defaults to empty"
    - "src/3-Infra/AxisEmail/MimeKit/AxisEmail.MimeKit/AxisEmailService.cs:26 — iterates Cc into message.Cc"
examples:
