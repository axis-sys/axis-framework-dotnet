id: cache-store-never-throws-ambient-ct
title: The L2 store never throws and reads the ambient CancellationToken
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  CacheEntryStore is the dialect-agnostic L2 tier: it drives plain ADO.NET over a DbConnection and never
  throws — every method wraps its work in try/catch and returns an AxisResult, mapping any exception to
  AxisError.InternalServerError(AXIS_CACHE_PERSISTENCE_FAILED) after logging via IAxisLogger. The
  CancellationToken is read from IAxisMediatorAccessor (never a parameter) and flows into every async
  ADO.NET call.
invariants:
  - Every CacheEntryStore method returns an AxisResult and never throws; an exception becomes AXIS_CACHE_PERSISTENCE_FAILED, logged via IAxisLogger.
  - The store reads the CancellationToken from IAxisMediatorAccessor.AxisMediator?.CancellationToken and passes it to each ExecuteReader/ExecuteNonQuery/ReadAsync call.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Store/CacheEntryStore.cs:16 — dialect-agnostic store over DbConnection, IAxisLogger injected"
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Store/CacheEntryStore.cs:34 — Token from the ambient accessor, defaulting to None"
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Store/CacheEntryStore.cs:67 — catch -> AXIS_CACHE_PERSISTENCE_FAILED after logging"
examples:
