id: cache-repository-write-propagates-l2-failure
title: A two-tier write goes to L2 first with its failure propagated, then warms L1
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  SetAsync in the two-tier adapter serializes the value, writes L2 first, and PROPAGATES an L2 failure — if
  the durable write fails, SetAsync fails and L1 is not warmed, so L1 never holds a value that L2 rejected.
  Only after L2 succeeds does it warm L1 best-effort. The L2 store, being the source of truth, is the tier
  whose failure the caller sees.
invariants:
  - SetAsync writes L2 before warming L1 and returns the L2 failure when the durable write fails.
  - L1 is warmed only after a successful L2 write, so L1 cannot hold a value L2 did not accept.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/RepositoryCacheAdapter.cs:46 — SetAsync: serialize, L2 upsert (failure propagated), then WarmL1"
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Ports/ICacheEntryStore.cs:14 — UpsertAsync: a failure here is propagated, L2 is the source of truth"
examples:
  correct:
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository.UnitTests/RepositoryCacheAdapterTests.cs:59 — a failed L2 write is propagated and L1 is not warmed"
  incorrect: []
exceptions: []
