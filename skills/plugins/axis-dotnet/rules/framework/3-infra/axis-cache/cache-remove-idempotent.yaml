id: cache-remove-idempotent
title: RemoveAsync is idempotent — removing a missing key still succeeds
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: contracts
severity: must
status: canonical
description: >
  RemoveAsync(key) deletes the entry and reports success whether or not the key was present. Removal is
  idempotent, so a caller invalidating after a mutation never has to check existence first and can compose
  RemoveAsync on the railway (e.g. .ThenAsync after the write commits) without a spurious failure branch.
invariants:
  - RemoveAsync returns success even when the key was not in the cache.
  - Callers do not have to check ExistsAsync before RemoveAsync — removal is unconditional and idempotent.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/AxisCache/IAxisCache.cs:11 — RemoveAsync returns Task<AxisResult>"
    - "src/3-Infra/AxisCache/MemoryCache/AxisMemoryCache/MemoryCacheAdapter.cs:60 — Remove then Ok, regardless of prior presence"
examples:
