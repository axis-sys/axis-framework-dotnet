  reviewed_on: 2026-07-12
notes: >
  The docs (iaxiscache.md, memory-adapter.md) now state this split explicitly — the TryAsync methods rethrow
  the cancellation, only GetOrCreateAsync surfaces it as a failed AxisResult. That GetOrCreateAsync maps the
  cancellation to InternalServerError(ex.Message) is itself a coarse mapping — a candidate for a typed
  cancelled code rather than a 500-shaped error.
