id: cache-repository-l1-ttl-bounded
title: L1 lifetime is the smaller of the configured L1 TTL and the value's own remaining life
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  When the two-tier adapter warms L1 it caps the entry's lifetime at the smaller of the configured L1Ttl and
  the value's own remaining time to its L2 expiry, so an L1 copy never outlives the authoritative L2 entry.
  A value already expired at now is not cached in L1 at all. This bounds cross-instance staleness to at most
  L1Ttl regardless of the value's expiry.
invariants:
  - WarmL1 sets the L1 TTL to min(L1Ttl, expiresAt - now) so L1 never outlives the L2 entry.
  - A value whose remaining lifetime is zero or negative is not written to L1.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/RepositoryCacheAdapter.cs:102 — WarmL1 caps ttl at the value's remaining lifetime; already-expired is skipped"
examples:
