id: cache-ambient-cancellation
title: The cache honours the ambient CancellationToken, never a parameter
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  No IAxisCache method takes a CancellationToken. Adapters read it from the ambient request context —
  IAxisMediatorAccessor.AxisMediator?.CancellationToken, defaulting to CancellationToken.None — exactly as
  the rest of Axis flows cancellation. The memory adapter checks it before touching the store; the two-tier
  store passes it into every ADO.NET call. Cancellation is never plumbed through the call site.
invariants:
  - No IAxisCache method accepts a CancellationToken parameter.
  - Adapters obtain the token from IAxisMediatorAccessor.AxisMediator?.CancellationToken, defaulting to CancellationToken.None.
  - The token flows into the underlying store operation (ThrowIfCancellationRequested / the ADO.NET call), not through the caller.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisCache/MemoryCache/AxisMemoryCache/MemoryCacheAdapter.cs:9 — token from mediatorAccessor.AxisMediator?.CancellationToken ?? None"
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Store/CacheEntryStore.cs:34 — Token property reads the same ambient source"
