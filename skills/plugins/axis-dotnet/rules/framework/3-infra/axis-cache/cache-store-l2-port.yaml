id: cache-store-l2-port
title: ICacheEntryStore is the L2 port — get, upsert, remove, delete-expired
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: contracts
severity: must
status: canonical
description: >
  The durable tier behind the two-tier adapter is ICacheEntryStore: GetAsync(key, nowUtc) returns the live
  CacheEntry or null (absent or expired), UpsertAsync inserts-or-replaces, RemoveAsync deletes, and
  DeleteExpiredAsync bulk-removes rows past a given instant. A CacheEntry carries only the serialized
  ValueJson and an optional absolute ExpiresAt. Every method returns AxisResult and never throws.
invariants:
  - ICacheEntryStore declares GetAsync(key, nowUtc), UpsertAsync, RemoveAsync and DeleteExpiredAsync — every method returning an AxisResult.
  - CacheEntry is a record of (string ValueJson, DateTimeOffset? ExpiresAt) — the serialized value plus its optional absolute expiry.
  - GetAsync returns null when the key is absent or expired at nowUtc.
