id: cache-repository-two-tier
title: The SQL adapter is a two-tier cache — L1 memory over a durable L2 store
tier: framework
family: 3-infra
package: AxisCache
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  RepositoryCacheAdapter is a two-tier IAxisCache: an in-process L1 (IMemoryCache) in front of a durable,
  cross-instance L2 (ICacheEntryStore) that is the source of truth. Reads serve an L1 hit immediately and
  fall back to L2 on a miss, rehydrating L1; surviving a restart and being visible to every instance come
  from L2. The tight L1 window is the only staleness a reader can observe across instances.
invariants:
  - The adapter reads L1 (IMemoryCache) first and falls back to L2 (ICacheEntryStore) only on an L1 miss, rehydrating L1 from the L2 value.
  - L2 is the durable, cross-instance source of truth; L1 is a private per-process accelerator lost on restart.
  - A value survives a process restart and is shared across instances only because it lives in L2.
reference:
  kind: framework-source
  at:
