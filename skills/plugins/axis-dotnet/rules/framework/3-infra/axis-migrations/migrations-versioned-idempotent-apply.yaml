  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisRepository/migrations.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  A version is an immutable unit — evolve a schema by appending V2, V3, ... never by editing an already-shipped
  version's script, which the runner would never re-run.
