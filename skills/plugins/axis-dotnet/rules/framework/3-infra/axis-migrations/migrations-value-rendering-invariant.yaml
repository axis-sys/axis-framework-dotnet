id: migrations-value-rendering-invariant
title: Seed values render culture-invariantly with numerics unquoted and strings escaped
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  RenderValue turns a seed cell into a SQL literal by kind, and the rules are safety-critical. Numeric literals
  (int, long, decimal, double, float) are emitted UNQUOTED and ALWAYS with InvariantCulture, because a
  culture-specific ToString would emit a decimal comma (e.g. "1,5" on de-DE) and silently corrupt the value or
  break the INSERT. Strings are single-quoted with embedded quotes doubled; booleans go through the dialect's
  bool literal; null goes through the overridable RenderNull hook; an IFormattable (Guid, DateOnly) is quoted
  with an invariant ToString, and any other value falls through to a quoted ToString.
invariants:
  - Numeric literals are rendered unquoted and always with InvariantCulture, never a culture-specific ToString.
  - A string is single-quoted with each embedded single quote doubled.
  - null is rendered through the overridable RenderNull hook (default NULL) and a boolean through the dialect's RenderBoolLiteral.
  - An IFormattable value is quoted with an invariant ToString; any other value falls through to a quoted ToString.
