id: migrations-index-model-forms
title: The four index builders record uniqueness and an optional partial predicate
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  An index is one model — AxisIndex(Name, Columns, Unique, PartialPredicate) — surfaced through four fluent
  builders that set those two axes: Index (plain), Unique (unique key), PartialIndex (non-unique with a WHERE
  predicate) and PartialUnique (unique with a WHERE predicate). The predicate is a raw portable boolean; how
  each engine honours partiality is the dialect's concern, but the recorded model is uniform.
invariants:
  - Index adds a non-unique AxisIndex with no predicate; Unique adds a unique AxisIndex with no predicate.
  - PartialIndex adds a non-unique AxisIndex carrying its WHERE predicate; PartialUnique adds a unique AxisIndex carrying its WHERE predicate.
  - The partial predicate is a raw portable boolean expression stored verbatim on the AxisIndex.
