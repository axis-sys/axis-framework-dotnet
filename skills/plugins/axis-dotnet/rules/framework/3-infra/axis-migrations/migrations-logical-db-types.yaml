id: migrations-logical-db-types
title: Column types are a closed set of logical AxisDbType cases mapped per dialect
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisDbType is a closed, logical, dialect-agnostic type set (Varchar, Text, Int, Bool, Json, TimestampUtc,
  Decimal) — never a raw SQL type string. Parameterless cases are exposed as shared singletons and the
  parameterized ones (Varchar length, Decimal precision/scale) carry their arguments as record fields. The
  dialect owns the concrete mapping, so a column's physical type is decided once per database in the dialect,
  not at each declaration site.
invariants:
  - AxisDbType is a closed hierarchy of exactly seven cases (VarcharType, TextType, IntType, BoolType, JsonType, TimestampUtcType, DecimalType) with a private constructor.
  - The scalar factories (Text, Int, Bool, Json, TimestampUtc) return shared singleton instances; Varchar(length) and Decimal(precision, scale) carry their arguments.
  - The concrete SQL type for each case is decided by the dialect's RenderType, never by the caller.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisDbType.cs:8 — closed record hierarchy, singleton scalar factories, parameterized Varchar/Decimal"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresSqlDialect.cs:9 — RenderType maps each case to the concrete Postgres type"
examples:
