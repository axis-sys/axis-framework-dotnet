    - axis-migrations
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisRepository/ddl.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  RenderForeignKey is abstract, not virtual: Postgres and MySQL render it identically today, but forcing each
  adapter to opt in keeps a future dialect with different FK syntax from silently inheriting a default.
