id: migrations-foreign-key-uniform
title: A foreign key renders as one table-level named CONSTRAINT on every dialect
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisForeignKey models a single-column foreign key (name, column, referenced table, referenced column, and an
  optional ON DELETE CASCADE). Every dialect renders it identically as a table-level named constraint —
  CONSTRAINT {Name} FOREIGN KEY ({Column}) REFERENCES {Table} ({Column}) — through the shared
  ForeignKeyConstraint helper; OnDeleteCascade appends ON DELETE CASCADE and nothing else.
invariants:
  - A foreign key is added via AxisTable.ForeignKey(name, column, referencedTable, referencedColumn, onDeleteCascade) and recorded as an AxisForeignKey.
  - Every dialect renders it as CONSTRAINT {Name} FOREIGN KEY ({Column}) REFERENCES {ReferencedTable} ({ReferencedColumn}) via the shared ForeignKeyConstraint helper.
  - OnDeleteCascade true appends exactly ON DELETE CASCADE; false appends nothing.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisForeignKey.cs:8 — AxisForeignKey with OnDeleteCascade, table-level named constraint"
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisSqlDialectBase.cs:34 — ForeignKeyConstraint helper reused by both dialects"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresSqlDialect.cs:43 — RenderForeignKey delegates to ForeignKeyConstraint"
examples:
  correct:
    - "src/3-Infra/AxisRepository/AxisRepository.UnitTests/AxisSqlDialectBaseTests.cs:89 — ForeignKeyConstraintRendersWithAndWithoutCascade"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres.IntegrationTests/PostgresDdlBuilderIntegrationTests.cs:110 — ForeignKeyCascadeDeletesChildren"
  incorrect: []
exceptions: []
derives_to:
