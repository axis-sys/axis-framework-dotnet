id: migrations-utc-timestamp-normalization
title: A seed timestamp is normalized to UTC before it is rendered as a literal
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  Every timestamp value in a seed is normalized to UTC before RenderTimestampLiteral turns it into SQL, so a
  literal always carries the UTC wall-clock. A DateTimeOffset is converted to UTC; a DateTime is normalized by
  Kind — Utc is taken as-is, Local is converted to UTC, and Unspecified is TAKEN as UTC (the store's
  convention, since every timestamp column defaults to and connects in UTC). Literals are formatted with the
  shared microsecond-precision invariant format, and the per-dialect literal syntax differs.
invariants:
  - A DateTimeOffset seed value is converted to UTC before rendering.
  - A DateTime is normalized by Kind — Utc as-is, Local converted to UTC, Unspecified taken as UTC.
  - The UTC instant is formatted with FormatUtcTimestamp (yyyy-MM-dd HH:mm:ss.ffffff, InvariantCulture) and then rendered by the dialect's RenderTimestampLiteral.
