id: migrations-pure-sql-no-orm
title: Migrations are pure SQL applied by the raw driver with no ORM or external tool
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  A migration is pure SQL applied through the raw provider driver (Npgsql / MySqlConnector) — there is no ORM,
  no code-first model diffing, and no external migration framework. A Bounded Context declares its schema once
  as a (Version, Script)[] set, rendering each script from its AxisTable definitions per dialect, and hands that
  set to the runner. Swapping the dialect (and the runner) is the whole of retargeting the same declaration to
  another engine.
invariants:
  - A migration script is plain SQL executed by the provider driver; no ORM or external migration tool is involved.
  - A Bounded Context declares its migration set once as a (Version, Script)[] and renders each script per dialect from its AxisTable definitions.
  - Retargeting the same declaration to another engine is done by swapping the dialect and runner, not by rewriting the scripts.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresMigrationRunner.cs:50 — the script is executed verbatim via NpgsqlCommand, no ORM"
    - "src/3-Infra/AxisCache/Repository/AxisCache.Repository/Persistence/AxisCacheSchema.cs:16 — Migrations(dialect) renders one (Version, Script)[] per dialect"
examples:
  correct:
    - "src/3-Infra/AxisCache/Repository/Postgres/AxisCache.Postgres/Persistence/AxisCacheMigrations.cs:10 — the same schema declaration applied with the Postgres dialect and runner"
    - "src/3-Infra/AxisCache/Repository/MySql/AxisCache.MySql/Persistence/AxisCacheMigrations.cs:10 — the same schema declaration applied with the MySQL dialect and runner"
  incorrect: []
exceptions: []
