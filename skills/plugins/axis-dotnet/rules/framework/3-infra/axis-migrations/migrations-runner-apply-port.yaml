id: migrations-runner-apply-port
title: IAxisMigrationRunner is the swappable apply port instantiated directly, not injected
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  IAxisMigrationRunner is the "apply" half of the schema seam that pairs with IAxisSqlDialect's "render" half.
  Its one method, RunAsync(connectionString, schema, (Version, Script)[] migrations), bootstraps the schema and
  its MIGRATIONS control table, then applies each pending version in order. A dialect-agnostic caller migrates
  any provider by swapping the injected runner together with the matching dialect. Unlike the unit of work and
  repository, the runner is NOT registered in DI — a bootstrap caller (a startup worker or a test fixture)
  instantiates the concrete runner directly and awaits RunAsync.
invariants:
  - IAxisMigrationRunner exposes one method, RunAsync(connectionString, schema, (Version, Script)[]), that bootstraps the schema plus MIGRATIONS and applies the pending versions in order.
  - Each database adapter provides a concrete runner owning its own bootstrap, concurrency lock and transaction semantics.
  - The runner is instantiated directly by the bootstrap caller (new PostgresMigrationRunner().RunAsync(...)); it is not registered in the DI container.
