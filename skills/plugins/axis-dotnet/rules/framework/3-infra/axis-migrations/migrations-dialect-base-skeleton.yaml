id: migrations-dialect-base-skeleton
title: AxisSqlDialectBase fixes the CREATE TABLE assembly and forces every dialect token
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisSqlDialectBase implements the shared, database-free rendering skeleton — it assembles
  CREATE TABLE IF NOT EXISTS with the body in a fixed order (columns, inline index lines, foreign keys, table
  checks), then post-table statements, then the seed — and forces every adapter to decide the dialect-specific
  tokens through abstract members (RenderType, RenderDefault, RenderCheck, RenderCollation, RenderBoolLiteral,
  RenderSeedConflict, RenderInlineIndexLines, RenderPostTableStatements, RenderForeignKey,
  RenderTimestampLiteral). A new adapter cannot compile until it has answered each one.
invariants:
  - RenderCreateTable emits CREATE TABLE IF NOT EXISTS {Name} with the body assembled in the fixed order columns, inline index lines, foreign keys, table checks.
  - Every dialect-specific token is an abstract member the adapter must implement, so a new dialect cannot compile with a token left undecided.
  - The base provides reusable helpers (ForeignKeyConstraint, RenderTableCheck, RenderNull, Quote, FormatUtcTimestamp) that adapters share instead of re-deriving.
