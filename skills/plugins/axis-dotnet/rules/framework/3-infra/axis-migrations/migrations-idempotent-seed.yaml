    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql.IntegrationTests/MySqlDdlBuilderIntegrationTests.cs:138 — SeedIsAppliedOnceAndIsIdempotent"
  incorrect: []
exceptions: []
