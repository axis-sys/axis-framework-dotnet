id: migrations-idempotent-seed
title: A seed is an idempotent insert made a no-op on its conflict columns
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AxisSeed models reference rows inserted at migration time and made a no-op when the ConflictColumns already
  exist, so re-running the migration never duplicates or overwrites seeded data. The dialect renders the
  no-op with its native upsert — Postgres ON CONFLICT (...) DO NOTHING, MySQL ON DUPLICATE KEY UPDATE col = col.
  MySQL deliberately does NOT use INSERT IGNORE, which would also swallow foreign-key and NOT NULL errors and
  hide a genuinely broken seed.
invariants:
  - A seed is declared via AxisTable.WithSeed(columns, conflictColumns, rows) and recorded as an AxisSeed of those columns, conflict columns and rows.
  - The seed renders as an INSERT made a no-op on the conflict columns — Postgres ON CONFLICT (...) DO NOTHING, MySQL ON DUPLICATE KEY UPDATE col = col.
  - MySQL must not render INSERT IGNORE, because it would also swallow FK and NOT NULL violations.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/Ddl/AxisSeed.cs:9 — AxisSeed(Columns, ConflictColumns, Rows); ON DUPLICATE KEY UPDATE not INSERT IGNORE"
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql/MySqlSqlDialect.cs:45 — RenderSeedConflict emits ON DUPLICATE KEY UPDATE col = col"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresSqlDialect.cs:40 — RenderSeedConflict emits ON CONFLICT (...) DO NOTHING"
examples:
