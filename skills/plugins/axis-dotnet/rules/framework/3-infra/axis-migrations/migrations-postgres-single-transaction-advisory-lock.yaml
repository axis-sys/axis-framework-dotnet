id: migrations-postgres-single-transaction-advisory-lock
title: Postgres applies the whole pending batch in one transaction under a transactional advisory lock
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  The Postgres runner applies the entire pending batch inside a SINGLE transaction, so the batch is all-or-nothing —
  a failure rolls back every version applied in that run and the schema is never left half-migrated. Concurrent
  runners for the same schema are serialized with a transactional advisory lock, pg_advisory_xact_lock(hashtext(schema)),
  taken as the first statement in the transaction and released automatically on commit or rollback, so two
  instances starting at once cannot apply the same migration twice.
invariants:
  - All pending versions in one run are applied inside a single transaction that is committed once at the end.
  - Concurrent migrations for the same schema are serialized by pg_advisory_xact_lock(hashtext(schema)) taken inside that transaction.
  - The transactional advisory lock is released automatically on commit or rollback, never held past the transaction.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresMigrationRunner.cs:31 — single BeginTransactionAsync wrapping the batch, committed once"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresMigrationRunner.cs:35 — pg_advisory_xact_lock(hashtext(@schema)) as the first statement"
examples:
