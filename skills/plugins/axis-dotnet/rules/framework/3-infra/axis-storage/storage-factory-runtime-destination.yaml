    - "src/3-Infra/AxisStorage/FileSystem/AxisStorage.FileSystem.UnitTests/FileSystemStorageFactoryTests.cs:13 — same instance for the same Root"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob.UnitTests/AzureBlob/DependencyInjectionTests.cs:136 — the factory is registered as a Singleton"
  incorrect: []
exceptions: []
