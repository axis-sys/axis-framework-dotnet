notes: >
  R2's Create takes the WHOLE CloudflareR2Settings because R2 credentials are per-bucket; the Azure factory
  reuses one process-wide credential and varies only the destination. The destination-descriptor factory is
  the subject of the out-of-repo ADR-0002 (referenced for intent only).
