id: storage-presigned-url-get-only
title: GetPresignedUrlAsync mints a GET-only URL and does not check existence
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
lens: [security]
severity: must
status: canonical
description: >
  GetPresignedUrlAsync returns a signed URL valid until now + expiration, letting the client fetch the object
  directly from the bucket with no proxying through your app. Object existence is NOT checked — a URL is
  minted whether or not the key exists, and the client sees a 404 when it fetches a missing key. The contract
  has no verb/method parameter: the in-box adapters mint GET URLs only; a presigned PUT needs a richer
  abstraction.
invariants:
  - GetPresignedUrlAsync mints a URL good until now + expiration.
  - The minted URL is for HTTP GET only; the contract exposes no verb or method parameter.
  - GetPresignedUrlAsync does not verify that the key exists before minting the URL.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/CloudflareR2StorageAdapter.cs:73 — GetPreSignedURLAsync with Verb = HttpVerb.GET, Expires = UtcNow + expiration"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:59 — GetPresignedUrlAsync builds a read-only SAS URL"
examples:
  correct:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2.UnitTests/CloudflareR2/CloudflareR2StorageAdapterTests.cs:312 — verifies the request uses Verb GET"
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2.IntegrationTests/CloudflareR2StorageAdapterIntegrationTests.cs:217 — a URL is minted even when the key does not exist"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-storage
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisStorage/presigned-urls.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  Sharp edge — GET only, no existence check. For uploads from the client (a presigned PUT), expose a richer
  abstraction on your adapter. The servable-URL resolver (see storage-servable-url-decides-vs-reports) reuses
  this same signing path when the container is private.
