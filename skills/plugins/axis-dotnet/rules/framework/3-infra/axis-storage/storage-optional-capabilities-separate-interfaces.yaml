id: storage-optional-capabilities-separate-interfaces
title: Container, listing and URL-resolution are separate optional interfaces
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  IAxisStorage stays at five methods every provider must implement. Container administration, prefix listing
  and servable-URL resolution are NOT universal enough to force on every adapter, so they live in three
  separate optional interfaces in the same AxisStorage package: IAxisStorageContainer, IAxisStorageLister and
  IAxisStorageUrlResolver. An adapter may implement only IAxisStorage; a consumer injects exactly the
  capability its handler needs, or casts an IAxisStorage it already holds (storage as IAxisStorageUrlResolver).
invariants:
  - IAxisStorageContainer, IAxisStorageLister and IAxisStorageUrlResolver are interfaces separate from IAxisStorage, in the AxisStorage package.
  - An adapter may implement only IAxisStorage and none of the optional capabilities.
  - A consumer injects the specific capability interface it needs, or reaches it by casting an IAxisStorage (storage as IAxisStorageUrlResolver).
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/AxisStorage/IAxisStorageContainer.cs:3 — the container capability interface"
    - "src/3-Infra/AxisStorage/AxisStorage/IAxisStorageLister.cs:3 — the listing capability interface"
    - "src/3-Infra/AxisStorage/AxisStorage/IAxisStorageUrlResolver.cs:3 — the servable-URL capability interface"
examples:
