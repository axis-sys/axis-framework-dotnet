    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:44 — DeleteIfExistsAsync"
    - "src/3-Infra/AxisStorage/FileSystem/AxisStorage.FileSystem/FileSystemStorageAdapter.cs:30 — File.Delete guarded by File.Exists"
examples:
