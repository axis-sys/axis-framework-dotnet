id: storage-delete-idempotent
title: DeleteAsync is idempotent — deleting a missing key still succeeds
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  DeleteAsync returns Ok() whether or not the key existed, so callers never need an ExistsAsync pre-check.
  The in-box adapters realize this against each backend: S3 DeleteObject is inherently idempotent, Azure uses
  DeleteIfExistsAsync, and the filesystem guards File.Delete with File.Exists.
invariants:
  - DeleteAsync succeeds whether or not the key existed (idempotent at the contract level).
  - A caller need not call ExistsAsync before DeleteAsync.
reference:
  kind: framework-source
  at:
