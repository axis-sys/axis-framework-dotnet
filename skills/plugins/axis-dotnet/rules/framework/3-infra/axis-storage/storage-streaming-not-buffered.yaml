id: storage-streaming-not-buffered
title: Upload and download stream through the adapter without buffering the whole object
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
lens: [performance]
severity: should
status: canonical
description: >
  The contract takes and returns Stream, and the in-box adapters pass those streams straight to and from the
  SDK, so a multi-gigabyte object is never materialized in memory or on disk. UploadAsync reads content once,
  sequentially (a forward-only stream is fine); DownloadAsync hands back the backend's forward-only response
  stream directly rather than copying it into a buffer.
invariants:
  - UploadAsync passes the caller's Stream to the SDK without buffering the whole object; content is read once, sequentially.
  - DownloadAsync returns the backend's response Stream directly, not a copy held in a buffer.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/CloudflareR2StorageAdapter.cs:17 — PutObjectRequest.InputStream is the caller's stream; DownloadAsync returns response.ResponseStream"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:41 — DownloadStreamingAsync returns the response content stream directly"
    - "src/3-Infra/AxisStorage/FileSystem/AxisStorage.FileSystem/FileSystemStorageAdapter.cs:19 — UploadAsync copies the caller's stream into the file with CopyToAsync"
examples:
