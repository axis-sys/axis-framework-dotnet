id: storage-r2-servable-url-from-config
title: The R2 adapter decides public-vs-signed from CloudflareR2Settings.PublicUrl
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
lens: [security]
severity: should
status: canonical
description: >
  R2's GetServableUrlAsync makes the public-vs-signed decision from configuration, not a live probe. When
  CloudflareR2Settings.PublicUrl is set, it returns {PublicUrl.TrimEnd('/')}/{key} as a raw public URL
  (IsPublic true, ExpiresAt null) with no S3 call — R2 serves the object over the CDN/r2.dev domain directly;
  when PublicUrl is null or blank it returns a presigned URL (IsPublic false, ExpiresAt = now + expiration),
  the same signing path as GetPresignedUrlAsync. Unlike Azure, there is no public-access probe and therefore
  no cache or TTL.
invariants:
  - When PublicUrl is set, GetServableUrlAsync returns {PublicUrl}/{key} as a raw public URL with no S3 call.
  - When PublicUrl is null or blank, GetServableUrlAsync returns a presigned URL valid for expiration.
  - The R2 adapter makes this decision from configuration, with no live public-access probe and no cache.
