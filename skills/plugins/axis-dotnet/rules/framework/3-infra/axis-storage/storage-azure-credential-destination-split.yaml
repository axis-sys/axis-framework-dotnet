notes: >
  The split lets the runtime-destination factory reuse one process-wide credential while varying only the
  destination (see storage-factory-runtime-destination). The shared-key branch is what points the same
  wiring at Azurite (devstoreaccount1) or at an account without AAD access; its SAS consequence lives in
  storage-azure-delegated-sas.
