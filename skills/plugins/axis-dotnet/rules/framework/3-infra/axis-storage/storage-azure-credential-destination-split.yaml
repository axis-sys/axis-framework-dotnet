id: storage-azure-credential-destination-split
title: The Azure adapter splits application credential from destination, with a resolution cascade
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
lens: [security]
severity: must
status: canonical
description: >
  AddAxisAzureBlobStorage takes two separate objects: AzureBlobCredentialSettings (the application's own
  identity, shared across every container it touches) and AzureBlobSettings (account URL + container, the
  where). The credential decision lives in the AzureBlobClients seam: when AccountName and AccountKey are
  both set, a StorageSharedKeyCredential is used (emulator / key-based accounts) and takes precedence over
  the entire AAD chain; otherwise AzureBlobCredential.Create resolves by cascade — a complete Service
  Principal (TenantId + ClientId + ClientSecret), then a DefaultAzureCredential scoped to
  ManagedIdentityClientId, then a plain DefaultAzureCredential (managed identity in Azure, az login
  locally). An incomplete Service Principal falls through to DefaultAzureCredential.
invariants:
  - Credential (AzureBlobCredentialSettings) and destination (AzureBlobSettings) are two separate objects.
  - When AccountName and AccountKey are both present, a StorageSharedKeyCredential is used and takes precedence over the whole AAD chain.
  - The shared-key-vs-AAD decision is resolved once in the AzureBlobClients seam, which returns the BlobServiceClient factory both registrations consume.
  - AzureBlobCredential.Create prefers a complete Service Principal, then a managed-identity-scoped DefaultAzureCredential, then a plain DefaultAzureCredential.
  - An incomplete Service Principal (missing any of TenantId, ClientId or ClientSecret) falls back to DefaultAzureCredential.
  - AddAxisAzureBlobStorageFactory registers a TokenCredential singleton only on the AAD path — a shared-key composition has no token credential to expose.
