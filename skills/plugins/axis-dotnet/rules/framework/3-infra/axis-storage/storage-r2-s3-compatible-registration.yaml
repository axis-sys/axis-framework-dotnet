id: storage-r2-s3-compatible-registration
title: AddAxisCloudflareR2Storage wires an S3 client for R2's S3-compatible endpoint
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  AddAxisCloudflareR2Storage constructs one AmazonS3Client against R2's endpoint — ServiceURL =
  https://{AccountId}.r2.cloudflarestorage.com, AuthenticationRegion USEast1, ForcePathStyle true (R2 requires
  path-style) — and registers it as a Singleton (the SDK handles connection pooling). The same adapter is
  bound under all four interfaces. R2 speaks the S3 API, so any S3-compatible store reachable via the AWS SDK
  (e.g. MinIO in tests) works with this adapter.
invariants:
  - AddAxisCloudflareR2Storage builds an AmazonS3Client with ForcePathStyle true, USEast1 authentication region and ServiceURL derived from AccountId.
  - The IAmazonS3 client is registered as a Singleton.
  - CloudflareR2Settings.ServiceUrl is computed as https://{AccountId}.r2.cloudflarestorage.com.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/DependencyInjection.cs:13 — constructs the AmazonS3Client (ForcePathStyle, USEast1, ServiceUrl) and registers it Singleton"
    - "src/3-Infra/AxisStorage/CloudflareR2/AxisStorage.CloudflareR2/CloudflareR2Settings.cs:11 — ServiceUrl computed from AccountId"
examples:
