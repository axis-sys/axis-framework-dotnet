notes: >
  This is the Azure realization of the GET-only presigned URL (storage-presigned-url-get-only); the same SAS
  path serves the private branch of GetServableUrlAsync. Which branch a client lands on is decided by the
  credential composition in storage-azure-credential-destination-split (shared key over the AAD chain).
