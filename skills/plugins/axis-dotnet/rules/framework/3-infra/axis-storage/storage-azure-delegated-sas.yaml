id: storage-azure-delegated-sas
title: Azure SAS signing branches on the credential — user-delegation key on AAD, self-signed on shared key
tier: framework
family: 3-infra
package: AxisStorage
concern: package-mechanics
layer: driven
lens: [security]
severity: should
status: canonical
description: >
  BuildSasUrlAsync branches on the client's credential. On the AAD path it mints presigned/SAS URLs with a
  UserDelegationKey (GetUserDelegationKeyAsync) plus a BlobSasBuilder granting Read only — an Azure
  AD-delegated SAS, so on that path no storage account key ever leaves the adapter; the delegation key is
  cached (~50 minutes) behind a lock and refreshed on expiry. On the shared-key path (a client built from
  AccountName/AccountKey — emulator or key-based account) the method short-circuits on CanGenerateSasUri
  and the client self-signs the SAS with the account key via GenerateSasUri, still Read-only.
invariants:
  - BuildSasUrlAsync short-circuits when BlobClient.CanGenerateSasUri is true — a shared-key client self-signs the SAS via GenerateSasUri, with no user-delegation round trip.
  - On the shared-key branch the SAS is signed with the storage account key and still grants Read only, expiring at now + expiration.
  - On the AAD branch, presigned/SAS URLs are signed with a UserDelegationKey and a BlobSasBuilder granting Read only.
  - On the AAD branch, no storage account key is used or exposed by the adapter.
  - The delegation key is cached (~50 minutes) and refreshed on expiry; the shared-key branch never fetches one.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:121 — BuildSasUrlAsync: the two signing branches"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:127 — the CanGenerateSasUri short-circuit (shared-key self-signed SAS)"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:174 — DelegationKeyAsync caches the key behind a lock"
    - "src/3-Infra/AxisStorage/AzureBlob/AxisStorage.AzureBlob/AzureBlobStorageAdapter.cs:16 — DelegationKeyLifetime is 50 minutes"
