notes: >
  The mediator owns the rule "the CancellationToken is ambient, never a parameter"; AxisRepository is one of
  its consumers. A cancelled operation surfaces as a thrown OperationCanceledException, re-thrown by the base
  (repository-cancellation-rethrown), not mapped to an AxisError.
