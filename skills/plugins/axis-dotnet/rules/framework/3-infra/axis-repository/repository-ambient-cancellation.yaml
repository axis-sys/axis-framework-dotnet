id: repository-ambient-cancellation
title: The cancellation token is ambient from the mediator, never a method parameter
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  A repository method takes no CancellationToken parameter. AxisRepositoryBase reads the ambient token from
  the injected IAxisMediator and threads it into every ADO.NET call — NewCommandAsync, ExecuteNonQueryAsync,
  ExecuteReaderAsync and ReadAsync — and each unit of work uses the same mediator token for open, commit and
  rollback. Cancellation therefore flows uniformly without polluting any repository signature.
invariants:
  - No IAxisDbRepository or IAxisUnitOfWork method accepts a CancellationToken parameter.
  - AxisRepositoryBase exposes the ambient token as mediator.CancellationToken and passes it to every ExecuteNonQueryAsync, ExecuteReaderAsync and ReadAsync call.
  - Each unit of work uses mediator.CancellationToken for OpenConnectionAsync, BeginTransactionAsync, CommitAsync and RollbackAsync.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:13 — protected CancellationToken => mediator.CancellationToken, threaded into every command"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresUnitOfWork.cs:41 — the unit of work reads ct = mediator.CancellationToken for connect/commit/rollback"
examples:
