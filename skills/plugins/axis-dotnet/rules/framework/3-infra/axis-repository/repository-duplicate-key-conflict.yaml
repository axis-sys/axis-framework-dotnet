id: repository-duplicate-key-conflict
title: A unique-constraint violation maps to a Conflict with a caller-overridable code and faults the unit of work
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  When IsDuplicateKey classifies the DbException, ExecuteAsync and ExecuteCountAsync return
  AxisError.Conflict, mark the unit of work faulted, and use the caller-supplied duplicateKeyCode when it is
  non-null, falling back to the dialect default "{PREFIX}_DUPLICATE_KEY_ERROR". A conflict is a 409 domain
  outcome, not a 500 — a caller inserting a uniquely-keyed row passes a domain code (e.g. ITEM_ALREADY_EXISTS)
  so the failure reads as its own business rule.
invariants:
  - A duplicate-key DbException returns AxisError.Conflict and calls uow.MarkFaulted().
  - The code is duplicateKeyCode when non-null, otherwise the dialect default "{ErrorPrefix}_DUPLICATE_KEY_ERROR".
  - Only ExecuteAsync and ExecuteCountAsync carry the duplicateKeyCode override; Get and List have no duplicate path.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:83 — catch IsDuplicateKey: MarkFaulted + Conflict(duplicateKeyCode ?? default)"
examples:
  correct:
    - "src/3-Infra/AxisRepository/AxisRepository.UnitTests/AxisRepositoryBaseTests.cs:148 — DuplicateKeyUsesProvidedCodeOrDialectDefault"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres.IntegrationTests/PostgresRepositoryBaseTests.cs:233 — ExecuteAsyncReturnsConflictOnDuplicateKey with ITEM_ALREADY_EXISTS"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-repository
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisRepository/repository-base.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The duplicateKeyCode parameter defaults to null and the fallback "?? default" triggers on null, so calling
  ExecuteAsync without a code yields the dialect default "{ErrorPrefix}_DUPLICATE_KEY_ERROR"; pass a domain
  string to name the conflict as its own business rule.
