id: repository-returns-result-never-throws
title: Every repository and unit-of-work method returns AxisResult and never throws for an expected outcome
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The whole AxisRepository surface speaks AxisResult. IAxisDbRepository and IAxisUnitOfWork return
  Task<AxisResult>/Task<AxisResult<T>>, and an expected database failure (duplicate key, missing schema,
  transient, generic execution error) is encoded as a typed AxisError on the failure rail, not raised as an
  exception. The only try/catch is the exception boundary inside AxisRepositoryBase and each unit of work,
  where a provider DbException is caught and mapped so no call site ever wraps a repository call in try/catch.
invariants:
  - Every method of IAxisDbRepository and IAxisUnitOfWork returns Task<AxisResult> or Task<AxisResult<T>>.
  - An expected provider failure is caught inside the base and returned as a typed AxisError value, never propagated as an exception.
  - The only try/catch is the internal exception boundary in AxisRepositoryBase and the unit-of-work implementations; call sites chain on the railway with no try/catch.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/IAxisDbRepository.cs:12 — the four members all return Task<AxisResult(<T>)>"
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:66 — ExecuteCoreAsync: the single try/catch that maps DbException to AxisError"
examples:
  correct:
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres.IntegrationTests/PostgresRepositoryBaseTests.cs:138 — a failed connection is mapped to an error, not thrown"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-repository
    - axis-result
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisRepository/why-axisrepository.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  This is the AxisResult no-throw rule (result-no-throw) applied at the persistence edge. Fatal (non-DbException)
  errors and OperationCanceledException are the two deliberate exceptions to "map, do not throw" — they
  propagate (repository-fatal-exception-propagates, repository-cancellation-rethrown).
