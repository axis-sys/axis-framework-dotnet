id: repository-fatal-exception-propagates
title: Only DbException is mapped; a non-DbException propagates as a fatal error
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The exception boundary maps only provider database failures. Every catch in the core methods is typed to
  DbException (plus the OperationCanceledException re-throw); any other exception — a programming error, a
  null-reference, an unexpected library fault — is NOT caught and propagates to the caller. The base does not
  own a catch-all: turning a genuine defect into a tidy AxisResult would hide it.
invariants:
  - The exception catches in AxisRepositoryBase are typed to DbException (with the OperationCanceledException re-throw); there is no catch-all catch (Exception).
  - A thrown non-DbException (e.g. InvalidOperationException) escapes the repository unchanged rather than being mapped to an AxisResult failure.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:98 — the terminal handler is catch (DbException ex), not catch (Exception)"
examples:
  correct:
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres.IntegrationTests/PostgresRepositoryBaseTests.cs:340 — a fatal InvalidOperationException propagates from Execute/Get/List"
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql.IntegrationTests/MySqlRepositoryBaseTests.cs:456 — MySQL parity: fatal exception propagates"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-repository
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisRepository/repository-base.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The complement of repository-returns-result-never-throws — expected provider failures become values, but a
  fatal defect is left to fail loudly. A failed lazy connection start is deliberately re-shaped into a
  DbException (repository-lazy-start-surfaces-dberror) precisely so it lands on the value rail instead of here.
