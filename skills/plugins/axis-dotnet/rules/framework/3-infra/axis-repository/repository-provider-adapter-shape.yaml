id: repository-provider-adapter-shape
title: A provider adapter is a typed repository base, a sealed executor, a unit of work and a one-line typed interface
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  Each database adapter follows the same four-part shape. {Provider}RepositoryBase closes AxisRepositoryBase
  over the provider's Command, Reader and ParameterCollection and implements the five classification hooks.
  {Provider}DbRepository is the sealed ready-to-use IAxisDbRepository executor over that base. {Provider}UnitOfWork
  implements the transaction lifecycle against the provider's data source with telemetry spans. I{Provider}UnitOfWork
  is a one-line interface that closes IDbUnitOfWork<TCommand> over the provider command and adds nothing, so
  consumers keep injecting the provider name while every member comes from the shared seam.
invariants:
  - {Provider}RepositoryBase inherits AxisRepositoryBase<{Command}, {Reader}, {ParameterCollection}> and overrides the five classification hooks.
  - {Provider}DbRepository is a sealed IAxisDbRepository executor deriving {Provider}RepositoryBase.
  - I{Provider}UnitOfWork is IDbUnitOfWork<{Command}> with no added members; {Provider}UnitOfWork implements the lifecycle with telemetry spans.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/PostgresRepositoryBase.cs:9 — closes the base over Npgsql types, overrides the hooks"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres/IPostgresUnitOfWork.cs:11 — IPostgresUnitOfWork : IDbUnitOfWork<NpgsqlCommand> with no members"
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql/MySqlRepositoryBase.cs:9 — the MySQL parity over MySqlConnector types"
examples:
