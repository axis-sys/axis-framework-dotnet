id: repository-mysql-classification
title: The MySQL adapter classifies failures by MySqlException Number, transient codes shared through MySqlTransientErrors
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  MySqlRepositoryBase implements the classification hooks against MySqlException.Number. Transient is delegated
  to MySqlTransientErrors.IsTransient — the single source of truth covering 1213 (deadlock), 1205 (lock-wait
  timeout), 1040 (too many connections) and the connection classes 2002/2003/2006/2013 — so the repository and
  any adapter that retries outside the unit of work (the AxisSaga MySQL store, which writes in autocommit)
  share the exact same classification. Duplicate is 1062; schema-missing is 1146 (no such table) or 1049
  (unknown database). ErrorPrefix is MYSQL.
invariants:
  - IsTransient delegates to MySqlTransientErrors.IsTransient, matching {1213, 1205, 1040, 2002, 2003, 2006, 2013}.
  - IsDuplicateKey matches Number 1062; IsSchemaMissing matches 1146 or 1049.
  - MySqlTransientErrors is the single shared classification, reused by adapters that retry outside the unit of work; ErrorPrefix is "MYSQL".
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql/MySqlRepositoryBase.cs:15 — IsTransient via MySqlTransientErrors; IsDuplicateKey 1062; IsSchemaMissing 1146/1049; MYSQL"
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql/MySqlTransientErrors.cs:15 — the shared transient code set"
examples:
  correct:
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql.IntegrationTests/MySqlRepositoryBaseTests.cs:508 — a 1213 deadlock after a write surfaces as the typed transient"
    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql.IntegrationTests/MySqlRepositoryBaseTests.cs:407 — a 1146 missing relation maps to SCHEMA_NOT_READY"
  incorrect: []
exceptions: []
derives_to:
  skills:
    - axis-repository
  hooks: []
  scaffolds: []
  docs:
    - "docs/en-us/3-Infra/AxisRepository/mysql-adapter.md"
ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  Sharing MySqlTransientErrors keeps the saga's autocommit store and the unit-of-work repository from drifting
  on which MySQL errors are retryable. MySQL raises 1146 both for a missing table and for a table qualified by
  a database that does not exist.
