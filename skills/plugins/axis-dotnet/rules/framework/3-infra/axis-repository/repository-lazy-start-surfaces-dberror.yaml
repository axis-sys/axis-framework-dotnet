    - "src/3-Infra/AxisRepository/MySql/AxisRepository.MySql.IntegrationTests/MySqlRepositoryBaseTests.cs:154 — MySQL maps the unreachable database to MYSQL_EXECUTION_ERROR"
  incorrect: []
