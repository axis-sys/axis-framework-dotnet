notes: >
  This is the one place a signature cannot carry AxisResult, so the code re-shapes the failure into the type
  the boundary already handles. The mapped code is the generic execution error, because from the base's view
  the AxisDbException is an unclassified DbException (not transient, duplicate or schema-missing).
