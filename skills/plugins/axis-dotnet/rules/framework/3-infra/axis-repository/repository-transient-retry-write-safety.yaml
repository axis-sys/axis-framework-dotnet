    - "src/3-Infra/AxisRepository/AxisRepository.UnitTests/AxisRepositoryBaseTests.cs:93 — TransientAfterAWriteIsSurfacedAsTypedTransientNotRetried (0 reconnects)"
  incorrect: []
exceptions: []
