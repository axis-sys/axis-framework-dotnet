id: repository-transient-retry-write-safety
title: A transient is retried in place only while no durable write has landed; after a write it is surfaced for full replay
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
lens: [concurrency]
severity: must
status: canonical
description: >
  WithRetryAsync retries a transient failure with a fixed backoff of [100, 200, 400, 1000] ms — but ONLY while
  the transaction holds no uncommitted write (uow.HasUncommittedWrites is false). Each retry releases the
  connection (ReleaseConnectionAsync) and reconnects on a fresh connection and transaction. Once a write has
  landed, the transient is NOT retried in place: a transient aborts the whole transaction, so reconnecting
  would replay onto a fresh transaction and silently lose the earlier write. Instead the failure surfaces as
  the typed transient so the caller replays the entire unit of work.
invariants:
  - WithRetryAsync retries a transient with the backoff schedule [100, 200, 400, 1000] ms, calling ReleaseConnectionAsync before each retry.
  - Retry happens only while uow.HasUncommittedWrites is false; after the delays are exhausted the typed transient is surfaced.
  - Once a write has landed (HasUncommittedWrites true), a transient is surfaced immediately with no reconnect, so the caller replays the whole unit of work.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:32 — WithRetryAsync: delays [100,200,400,1000]"
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:47 — retry guard: IsTransient && attempt < delays.Length && !uow.HasUncommittedWrites"
examples:
  correct:
