notes: >
  This is the ConsumeSeat-under-contention shape: transience must survive a durable write. The saga resumer is
  the canonical caller that replays the whole unit of work on a surfaced transient. The retry is exhausted
  after four delays (~1.7s total) before the typed transient is surfaced (repository-transient-typed-error).
