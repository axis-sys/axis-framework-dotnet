id: repository-unitofwork-release-connection
title: ReleaseConnectionAsync returns a pooled connection mid-unit-of-work so a slow external call cannot pin it
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: should
status: canonical
description: >
  ReleaseConnectionAsync rolls back any uncommitted work and hands the connection back to the pool, so a slow
  external call in the middle of a unit of work does not pin a pooled connection — and an open transaction —
  idle across it. Callers release only after capturing the reads they need and before long external I/O; the
  next command transparently reopens a fresh connection and transaction. The connection is disposed in a
  finally so the pool slot is always returned even if the rollback throws. The interface member has no default
  implementation — every implementer must supply one — and the convention for implementations that do not pool
  a connection is to simply return Task.CompletedTask; the retry loop uses it to reset before a reconnect.
invariants:
  - ReleaseConnectionAsync rolls back uncommitted work, disposes the connection in a finally (so the pool slot always returns), and clears HasUncommittedWrites.
  - After release the next command transparently reopens a fresh connection and transaction.
  - IAxisUnitOfWork.ReleaseConnectionAsync has no interface default; every implementer must supply one, and the convention for implementations that do not pool a connection is to return Task.CompletedTask.
