notes: >
  Start is lazy: the connection opens on first command, not at registration, so a scoped unit of work that is
  never used costs no connection. The dialect-specific NewCommandAsync and fault/write flags live on the
  IDbUnitOfWork<TCommand> extension (repository-dbunitofwork-dialect-seam).
