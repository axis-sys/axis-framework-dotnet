id: repository-unitofwork-transaction-surface
title: IAxisUnitOfWork is the AxisResult-returning transaction lifecycle, one implementation per dialect
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  IAxisUnitOfWork is the transactional lifecycle over one ADO.NET connection. StartAsync opens the connection
  and begins the transaction lazily and idempotently; SaveChangesAsync commits, failing fast with a typed
  error when the unit of work is faulted or no transaction was started; RollbackAsync rolls back the current
  transaction if any. It implements IDisposable and IAsyncDisposable so the connection is always returned to
  the pool. Every method returns AxisResult, and each dialect adapter supplies exactly one implementation.
invariants:
  - IAxisUnitOfWork exposes StartAsync, SaveChangesAsync and RollbackAsync, each returning Task<AxisResult>.
  - StartAsync opens the connection and begins the transaction lazily (idempotent if already started).
  - SaveChangesAsync fails with a typed error ("{PREFIX}_TRANSACTION_FAULTED" / "{PREFIX}_TRANSACTION_NOT_STARTED") when faulted or not started.
  - IAxisUnitOfWork implements IDisposable and IAsyncDisposable.
