id: repository-dialect-agnostic-io
title: Parameters bind through IDbParamBinder and rows map through DbDataReader, so a shared repository never names a provider type
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
severity: must
status: canonical
description: >
  The IAxisDbRepository surface is written over the common ADO.NET abstractions so one repository runs on any
  provider. Parameters are bound through IDbParamBinder.Add(name, value) using named placeholders (@id) — a
  leading @ in the name is trimmed and a null value becomes DBNull; AddJson is semantically identical to Add
  (the value is a JSON string) because any dialect cast such as Postgres ::JSONB lives in the SQL, not in the
  binder. Rows are read through a Func<DbDataReader, T> map delegate by ordinal. A shared repository therefore
  never names NpgsqlParameter, MySqlParameter or a provider-specific reader.
invariants:
  - IDbParamBinder.Add(name, value) adds one named parameter, trimming a leading @ and converting null to DBNull.
  - IDbParamBinder.AddJson(name, json) is semantically Add; the JSON cast lives in the dialect's SQL, not the binder.
  - Callers map rows via Func<DbDataReader, T> by ordinal; the binder surface names no provider parameter or reader type.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/IDbParamBinder.cs:11 — Add trims @, null becomes DBNull; AddJson is Add"
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:264 — CommandBinder implements IDbParamBinder over a DbCommand"
examples:
