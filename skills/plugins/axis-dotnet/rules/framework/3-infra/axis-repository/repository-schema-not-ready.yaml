notes: >
  A genuinely misspelled table surfaces as this same typed error rather than a 500 — an accepted trade so the
  common pre-migration case stays quiet. A real execution failure against an existing table keeps the generic
  error and MUST NOT be reclassified here (repository-generic-execution-error).
