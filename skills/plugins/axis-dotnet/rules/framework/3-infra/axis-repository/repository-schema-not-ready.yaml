id: repository-schema-not-ready
title: A missing relation or schema maps to a transient ServiceUnavailable without an error log
tier: framework
family: 3-infra
package: AxisRepository
concern: package-mechanics
layer: driven
lens: [observability]
severity: must
status: canonical
description: >
  A missing relation or schema is an EXPECTED state before migrations run (schemas are created on demand), so
  when IsSchemaMissing classifies the DbException every surface returns AxisError.ServiceUnavailable
  ("{PREFIX}_SCHEMA_NOT_READY") and faults the unit of work — but deliberately does NOT write an error log,
  because a poller would otherwise turn every pre-migration pass into startup noise. It is a typed transient
  (IsTransient true) so callers can distinguish "waiting for migrations" from a real database failure, yet it
  is not retried in place because the schema will not appear within the retry window.
invariants:
  - A schema-missing DbException returns AxisError.ServiceUnavailable("{ErrorPrefix}_SCHEMA_NOT_READY") on every surface (Execute, ExecuteCount, Get, List).
  - The schema-not-ready path faults the unit of work but does NOT call LogError.
  - The error is transient (IsTransient true) yet is surfaced immediately, without any in-place retry.
reference:
  kind: framework-source
  at:
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:60 — SchemaNotReady(): MarkFaulted + ServiceUnavailable, no LogError"
    - "src/3-Infra/AxisRepository/AxisRepository/AxisRepositoryBase.cs:88 — catch IsSchemaMissing => SchemaNotReady()"
examples:
  correct:
