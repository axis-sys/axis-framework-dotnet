    - "src/3-Infra/AxisRepository/AxisRepository.UnitTests/AxisRepositoryBaseTests.cs:207 — SchemaMissingFaultsTheUnitOfWorkWithoutRetrying"
    - "src/3-Infra/AxisRepository/Postgres/AxisRepository.Postgres.IntegrationTests/PostgresRepositoryBaseTests.cs:293 — 42P01 before migrations maps to POSTGRES_SCHEMA_NOT_READY"
  incorrect: []
exceptions: []
