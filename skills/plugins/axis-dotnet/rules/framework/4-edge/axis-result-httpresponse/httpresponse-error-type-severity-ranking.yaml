notes: >
  The severity ranking is a separate table from the per-type status map (httpresponse-error-type-status-map):
  status answers "which HTTP code for this type", severity answers "which type wins when several are present".
  Note the default rank of 95 sits ABOVE ServiceUnavailable (90) despite the status default being 500 — an
  unmapped type is treated as nearly the most severe. The tie-break is order-sensitive because the comparison is
  strictly greater-than, so the first error of the winning severity keeps the win.
