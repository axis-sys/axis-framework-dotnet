id: httpresponse-no-content-drops-value
title: A NoContent success status returns NoContentResult and drops the AxisResult value
tier: framework
family: 4-edge
package: AxisResult.HttpResponse
concern: package-mechanics
layer: driving
severity: must
status: canonical
description: >
  HttpStatusCode.NoContent (204) is special-cased on the value-carrying overload. Even when an
  AxisResult<TData> succeeds WITH a value, passing statusCode = NoContent to HttpContext.SendAsync returns a
  NoContentResult and discards the value rather than serializing it into an ObjectResult body. This lets a
  controller express a 204 intent at the edge (update, mark-as-read) without changing the handler's
  Task<AxisResult<T>> contract. Any other statusCode serializes the value as the body; only NoContent drops it.
invariants:
  - SendAsync<TData> returns a NoContentResult (204, no body) when the result is a success and statusCode == HttpStatusCode.NoContent, discarding result.Value.
  - For every success status other than NoContent, SendAsync<TData> serializes result.Value in an ObjectResult; the value is dropped only for NoContent.
  - The NoContent special-case applies to the value overload; the valueless Task<AxisResult> overload has no value to drop and simply returns StatusCodeResult(statusCode).
reference:
  kind: framework-source
  at:
    - "src/4-Edge/AxisResult.HttpResponse/AxisHttpContextExtensions.cs:19 — SendAsync<TData>, the public entry point that delegates to the internal render path"
    - "src/4-Edge/AxisResult.HttpResponse/AxisResultHttpExtensions.cs:21 — if the success status is NoContent return new NoContentResult()"
    - "src/4-Edge/AxisResult.HttpResponse/AxisResultHttpExtensions.cs:24 — otherwise ObjectResult(result.Value){StatusCode}"
