ledger:
  reviewed_against: 685c311
  reviewed_on: 2026-07-12
notes: >
  The 204-vs-200 gotcha: a valueless AxisResult success defaults to 200 (a bodyless StatusCodeResult), while a
  value-carrying AxisResult<T> only becomes a bodyless 204 when you explicitly ask for NoContent — in which
  case the value is silently dropped. If you want the value in the body, use any status other than NoContent.
