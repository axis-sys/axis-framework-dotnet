notes: >
  This is the sibling gap the httpresponse-problem-details-builder rule flagged: the builder had a rule but
  the render entry point did not. The public surface is deliberately one pair of HttpContext.SendAsync
  extension members: the older per-result sync extensions became internal implementation detail and the
  Task-based per-result extensions were deleted, so user code has exactly one way in and the traceId can
  never be forgotten or faked. The success rail is intentionally minimal — a StatusCodeResult
  or an ObjectResult — because all the failure richness is delegated to the one builder, keeping a single
  source of the severity/suppression logic. There is no minimal-API IResult overload; the package targets MVC
  IActionResult only.
