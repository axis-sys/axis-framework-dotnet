id: httpresponse-send-success-shapes
title: HttpContext.SendAsync renders a successful AxisResult as a bodyless status or a value ObjectResult
tier: framework
family: 4-edge
package: AxisResult.HttpResponse
concern: package-mechanics
layer: driving
severity: must
status: canonical
description: >
  The two HttpContext.SendAsync extension members (C# 14 extension members on HttpContext) are the package's
  single public entry point: they await a Task<AxisResult> / Task<AxisResult<TData>> and collapse it into an
  ASP.NET Core IActionResult at the controller edge, injecting the traceId from HttpContext.TraceIdentifier
  automatically — the caller never passes it. On the SUCCESS rail a valueless AxisResult becomes a bodyless
  StatusCodeResult and an AxisResult<T> becomes an ObjectResult carrying the value, both stamped with
  statusCode (default 200 OK). On the FAILURE rail both overloads delegate to the same internal render path
  (over AxisProblemDetailsBuilder.Build), so a controller never branches on IsSuccess by hand. This rule owns
  the success shapes and the delegation; the failure body itself is shaped by
  httpresponse-problem-details-builder, and the NoContent value-drop special-case is
  httpresponse-no-content-drops-value.
invariants:
  - context.SendAsync(Task<AxisResult> resultTask, statusCode = OK) awaits the task and returns a bodyless StatusCodeResult((int)statusCode) when the result is a success; statusCode defaults to HttpStatusCode.OK (200).
  - context.SendAsync<TData>(Task<AxisResult<TData>> resultTask, statusCode = OK) awaits the task and returns an ObjectResult(result.Value) with StatusCode = (int)statusCode when the result is a success and statusCode is not NoContent.
  - On failure both overloads return the ObjectResult(ProblemDetails) produced by the internal render path over AxisProblemDetailsBuilder.Build(result.Errors, context.TraceIdentifier); the controller never inspects IsSuccess/IsFailure itself.
  - statusCode governs only the success rail; on failure the status comes from the errors (via the builder) and statusCode is ignored.
  - The traceId is never a caller parameter — SendAsync reads HttpContext.TraceIdentifier and threads it to the builder on failure; on the success rail it is not surfaced in the response.
  - Both overloads throw ArgumentNullException on a null context or a null resultTask; there is no synchronous public overload — an already-materialized result is sent as HttpContext.SendAsync(Task.FromResult(result)).
