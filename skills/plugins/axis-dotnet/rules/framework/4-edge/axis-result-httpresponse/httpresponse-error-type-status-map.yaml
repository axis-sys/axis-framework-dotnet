notes: >
  Gotchas worth remembering: Timeout and GatewayTimeout are two distinct AxisErrorType values that render to the
  SAME 504, and TooManyRequests needs the numeric cast because System.Net.HttpStatusCode predates 429. Mapping
  has no arm and therefore reports 500. The status selection across a multi-error failure is governed by the
  severity ranking (httpresponse-error-type-severity-ranking); this rule is only the per-type status.
