id: httpresponse-problem-details-builder
title: AxisProblemDetailsBuilder renders AxisError as ProblemDetails decoupled from IActionResult
tier: framework
family: 4-edge
package: AxisResult.HttpResponse
concern: package-mechanics
layer: any
severity: must
status: canonical
description: >
  HttpContext.SendAsync already resolves, for controllers, the rich rendering of a
  failed AxisResult: pick the most severe error's status, suppress InternalServerError detail (count-only)
  and assemble a ProblemDetails with Type/Title/Status/Detail + Extensions["errors"]/["traceId"]. That
  logic used to live entirely inside a private method reachable only from the IActionResult pipeline.
  AxisProblemDetailsBuilder extracts it into a public, framework-level type with no dependency on
  IActionResult/ActionContext, so middleware and IAsyncAuthorizationFilter — which run before or beside
  MVC — can reuse the exact same severity/suppression rule instead of reimplementing it by hand. The
  builder only BUILDS (a pure (int, ProblemDetails) tuple); consuming it from an HttpContext lives in
  AxisProblemDetailsHttpExtensions, split by what the caller does with the response.
  AxisResultHttpExtensions.BuildProblemDetailsResult is now a one-line wrapper over Build; there is a
  single source of the severity rule for the whole package.
invariants:
  - Build(errors, traceId) returns the HTTP status of the most severe AxisErrorType present in errors, using AxisErrorTypeHttpMapping.Severity() as the ranking (ties keep the first-seen max).
  - Build suppresses AxisErrorType.InternalServerError entries from the "errors" extension but counts them in Detail as "{visible} error(s) returned. {internal} internal error(s) suppressed.".
  - Build sets Extensions["traceId"] to the traceId parameter unconditionally, on both the normal and the empty-errors fallback path.
  - Build sets ProblemDetails.Type to AxisProblemDetailsConfiguration.ProblemTypeBaseUri followed by the kebab-case of the winning AxisErrorType (e.g. ValidationRule -> validation-rule).
  - Build(errors, traceId) with an empty errors list returns a 500 with Detail "Failure without errors." instead of throwing or indexing errors[0] — a defensive fallback for callers outside the AxisResult flow, since a failed AxisResult itself always carries Errors.Count > 0.
  - AxisProblemDetailsBuilder never touches an HttpContext or HttpResponse; it is a pure function of (errors, traceId) and carries no dependency on Microsoft.AspNetCore.Http.
  - context.WriteProblemDetailsAsync(errors) WRITES the response — sets Response.StatusCode then calls Response.WriteAsJsonAsync(details) — for middleware, which has no ActionContext and must produce the response itself.
  - context.ToProblemDetailsResult(errors) RETURNS an ObjectResult carrying the ProblemDetails and StatusCode, and does not touch the response — for an IAsyncAuthorizationFilter, which short-circuits MVC by assigning context.Result.
  - Each extension has a single-error convenience overload that wraps the error in a one-element list and delegates to the IReadOnlyList<AxisError> overload.
  - Both extensions derive status and body from AxisProblemDetailsBuilder.Build; neither reimplements the severity/suppression logic, so they cannot diverge from what a controller returns.
  - No public member of this package pairs a synchronous X with an XAsync that performs different work; the write path is named for the effect (Write…Async) and the pure path for the computation (Build).
  - AxisResultHttpExtensions.BuildProblemDetailsResult delegates to AxisProblemDetailsBuilder.Build and wraps the tuple in an ObjectResult; it does not reimplement the severity/suppression logic.
  - For the same errors and traceId, AxisProblemDetailsBuilder.Build and the HttpContext.SendAsync failure path produce the same StatusCode and an equivalent ProblemDetails body (Type/Title/Status/Detail/Extensions["traceId"]).
