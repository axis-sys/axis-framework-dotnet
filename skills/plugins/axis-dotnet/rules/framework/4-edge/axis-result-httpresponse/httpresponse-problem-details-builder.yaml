notes: >
  A reference app had two middleware/filter consumers hand-rolling this rendering outside the
  MVC pipeline, one of them with a latent severity bug caused by the duplication itself — the motivation
  for extracting the builder as public. AxisErrorTypeHttpMapping stays internal (implementation detail of
  the error->status map); only the (int, ProblemDetails) tuple is public, so exposing the builder does
  not leak an MVC-shaped type to non-MVC callers. The consumers were first written as
  AxisProblemDetailsBuilder.BuildAsync, which was renamed before release: Build/BuildAsync read as a
  sync/async pair of the SAME operation, but BuildAsync returned Task (not Task<(int, ProblemDetails)>)
  and wrote the response. Naming each member for its effect — Build computes, WriteProblemDetailsAsync
  writes, ToProblemDetailsResult converts — also restores the honesty of the "Builder" suffix. Both
  consumers are C# 14 extension members on HttpContext, so a middleware author finds them by typing
  `context.`. The dedicated teaching skill for this package is axis-result-httpresponse; axis-result
  (section "Borda HTTP") maps the whole AxisResult trail across the three packages it crosses (AxisResult,
  AxisLogger, AxisResult.HttpResponse) without restating this package's own rules. The sibling rule
  httpresponse-send-success-shapes covers the HttpContext.SendAsync overloads.
