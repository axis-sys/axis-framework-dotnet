id: httpresponse-registration-reads-config-key
title: AddAxisResultHttpResponse applies the type base URI from configuration and returns services unchanged
tier: framework
family: 4-edge
package: AxisResult.HttpResponse
concern: package-mechanics
layer: driving
severity: must
status: canonical
description: >
  AddAxisResultHttpResponse is the composition-root hook that wires the ProblemDetails type base URI from
  configuration. It reads the single key AxisResult:Http:ProblemTypeBaseUri and forwards it to
  ConfigureProblemTypeBaseUri; because that method ignores null/blank, the call is a no-op when the key is
  absent or empty (the framework default is kept). It registers no services and returns the same
  IServiceCollection for chaining — the package needs no runtime services, only the one-time static override.
invariants:
  - AddAxisResultHttpResponse reads configuration["AxisResult:Http:ProblemTypeBaseUri"] and passes it to AxisProblemDetailsConfiguration.ConfigureProblemTypeBaseUri.
  - When the config key is absent or blank the call is a no-op (ConfigureProblemTypeBaseUri ignores null/whitespace) and the default base URI is retained.
  - AddAxisResultHttpResponse registers no services into the container; it only applies the static configuration override.
  - AddAxisResultHttpResponse returns the same IServiceCollection it received, so registration can be chained.
reference:
  kind: framework-source
  at:
    - "src/4-Edge/AxisResult.HttpResponse/DependencyInjection.cs:18 — AddAxisResultHttpResponse(this IServiceCollection, IConfiguration)"
    - "src/4-Edge/AxisResult.HttpResponse/DependencyInjection.cs:21 — ConfigureProblemTypeBaseUri(configuration[\"AxisResult:Http:ProblemTypeBaseUri\"])"
    - "src/4-Edge/AxisResult.HttpResponse/DependencyInjection.cs:23 — return services (unchanged, no registrations)"
