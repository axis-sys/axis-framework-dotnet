notes: >
  The class name is AxisResultHttpResponseDependencyInjection but the public method is AddAxisResultHttpResponse.
  Calling it is optional: without it the type URIs simply use the axis.dev default. The override it applies is the
  static state described in httpresponse-problem-type-base-uri-config.
