notes: >
  Codifies learning routed-L0001 — the rename axis.axis_identity -> axis.axis_entity_id (commit 3acbf9a)
  went green because nothing pinned the literal, silently breaking dashboards. The golden test is the guard.
  AuthTelemetryTagNames carries a security lens (auth.brute_force_suspected et al.).
