notes: >
  Opt-in gotcha — AddOpenTelemetryAxis does NOT register this behavior; you add it separately as
  IAxisPipelineBehavior<> / <,>. The span uses the default Internal kind. AxisPipelineContextKeys.Span lives
  in AxisMediator.Contracts (src/0-Foundations/.../Pipelines/AxisPipelineContextKeys.cs:7).
