    - "src/1-Observability/AxisTelemetry/AxisTelemetry/OpenTelemetry/OpenTelemetryAdapter.cs:17 — StartSpan wraps StartActivity in ActivityAxisSpan"
    - "src/1-Observability/AxisTelemetry/AxisTelemetry/OpenTelemetry/OpenTelemetryAdapter.cs:38 — MapKind AxisSpanKind -> ActivityKind"
