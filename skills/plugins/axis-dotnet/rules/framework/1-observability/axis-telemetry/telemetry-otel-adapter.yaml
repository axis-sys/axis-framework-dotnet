id: telemetry-otel-adapter
title: OpenTelemetryAdapter is the production sink over BCL ActivitySource and Meter
tier: framework
family: 1-observability
package: AxisTelemetry
concern: package-mechanics
layer: driven
lens: [observability]
severity: must
status: canonical
description: >
  OpenTelemetryAdapter is the bundled production implementation of both ports over the BCL primitives
  System.Diagnostics.ActivitySource and System.Diagnostics.Metrics.Meter — not the OpenTelemetry SDK types,
  so any listener (the OTel SDK, Application Insights, Sentry, a custom collector) can consume the data.
  StartSpan calls ActivitySource.StartActivity(name, MapKind(kind)) and wraps the result in an
  ActivityAxisSpan; CurrentTraceId/CurrentSpanId read from Activity.Current; and MapKind translates each
  AxisSpanKind to its ActivityKind one-to-one.
invariants:
  - OpenTelemetryAdapter implements IAxisTelemetry and IAxisMetrics over ActivitySource and Meter (BCL types, not the OpenTelemetry SDK).
  - StartSpan calls ActivitySource.StartActivity(name, MapKind(kind)) and returns an ActivityAxisSpan wrapping the Activity.
  - CurrentTraceId/CurrentSpanId are Activity.Current?.TraceId/SpanId as strings.
  - MapKind maps Server/Client/Producer/Consumer to the matching ActivityKind and everything else to ActivityKind.Internal.
