id: telemetry-span-fluent-disposable
title: IAxisSpan is fluent and IDisposable — chain the mutators, end it with using
tier: framework
family: 1-observability
package: AxisTelemetry
concern: package-mechanics
layer: contracts
lens: [observability]
severity: must
status: canonical
description: >
  IAxisSpan is the unit of work you actually tag. It exposes the read-only TraceId/SpanId and four mutators —
  SetTag(key, value), SetStatus(status, description?), RecordException(ex) and AddEvent(name, attributes) —
  each of which returns the same IAxisSpan so calls chain fluently next to StartSpan. It implements
  IDisposable, and disposing ends the span; wrap it in `using var` so the span closes on every exit path
  (success, exception, early return). Open one span per operation and do not nest unless the work truly nests.
invariants:
  - IAxisSpan exposes TraceId and SpanId (read-only) plus exactly four mutators — SetTag, SetStatus, RecordException, AddEvent.
  - Every mutator returns IAxisSpan (itself) so the calls chain.
  - IAxisSpan is IDisposable and disposing ends the span; callers use `using var` to guarantee it closes on all paths.
