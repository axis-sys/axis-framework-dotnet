id: telemetry-behavior-request-type
title: RequestType is "query" only for IAxisQuery in the valued overload, else "command"
tier: framework
family: 1-observability
package: AxisTelemetry
concern: package-mechanics
layer: application
lens: [observability]
severity: should
status: canonical
description: >
  The axis.request_type tag distinguishes commands from queries, and the two TelemetryBehavior overloads set
  it differently. The valueless TelemetryBehavior<TRequest> always tags RequestType = "command" (a request
  with no typed response is a command). The valued TelemetryBehavior<TRequest, TResponse> computes it at run
  time as `request is IAxisQuery ? "query" : "command"`, so a typed request is labelled a query only when it
  implements IAxisQuery. That is the only behavioural difference between the two overloads' tagging.
invariants:
  - The valueless overload always tags RequestType with the literal "command".
  - The valued overload tags RequestType as "query" when the request is an IAxisQuery, otherwise "command".
