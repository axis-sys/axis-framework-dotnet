notes: >
  Application code keeps seeing only IAxisTelemetry/IAxisMetrics, so swapping Azure Monitor for an OTLP
  collector (or turning telemetry off) is a one-line DI change. The distro attaches trace/log exporters when
  the host starts its IHostedServices — a bare BuildServiceProvider() that never starts them exports metrics
  only. Without a connection string the call degrades gracefully (see
  telemetry-azuremonitor-disabled-fallback).
