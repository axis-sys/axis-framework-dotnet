id: telemetry-azuremonitor-adapter
title: AddAzureMonitorAxis pairs the OpenTelemetry adapter with the Azure Monitor distro in one call
tier: framework
family: 1-observability
package: AxisTelemetry
concern: package-mechanics
layer: driven
lens: [observability]
severity: must
status: canonical
description: >
  AxisTelemetry.AzureMonitor is the pairing package for Azure Monitor / Application Insights. Its single
  extension AddAzureMonitorAxis(IServiceCollection, IConfiguration, Action<AzureMonitorAxisOptions>?)
  composes AddOpenTelemetryAxis() (the OpenTelemetryAdapter singleton behind IAxisTelemetry + IAxisMetrics)
  with the official distro Azure.Monitor.OpenTelemetry.AspNetCore via AddOpenTelemetry().UseAzureMonitor(...),
  subscribing the "Axis.AxisMediator" ActivitySource and Meter so Axis spans and metrics flow to Application
  Insights alongside the distro's ASP.NET Core / HttpClient instrumentation and ILogger export. Cost is
  governed by AzureMonitorAxisOptions: trace sampling (SamplingRatio / TracesPerSecond) and the log-export
  filters, which trim only what is ingested (billed), never local providers.
invariants:
  - AddAzureMonitorAxis applies the optional configure delegate to a new AzureMonitorAxisOptions and registers that same instance as a singleton.
  - The connection string resolves with precedence AzureMonitorAxisOptions.ConnectionString, then the APPLICATIONINSIGHTS_CONNECTION_STRING configuration key, then ConnectionStrings:ApplicationInsights.
  - With a connection string, it calls AddOpenTelemetryAxis() and then AddOpenTelemetry().UseAzureMonitor(...), so both ports resolve to the one OpenTelemetryAdapter and the distro exports what it emits.
  - It subscribes OpenTelemetryAdapter.SourceName ("Axis.AxisMediator") on both the tracing (AddSource) and metrics (AddMeter) pipelines.
  - It forwards options.SamplingRatio, options.TracesPerSecond and options.EnableLiveMetrics to the distro; TracesPerSecond null restores deterministic ratio-based sampling (since distro 1.5 the default is a 5-traces/s rate limiter that overrides SamplingRatio).
  - ServiceName (with optional ServiceVersion) and ResourceAttributes are applied as OpenTelemetry resource attributes; ServiceVersion is ignored when ServiceName is not set.
  - Log-export filters target only OpenTelemetryLoggerProvider — EnableLogExport false silences the whole export pipeline (LogLevel.None), otherwise MinimumLogLevel is the global floor and CategoryLogLevels are per-category overrides; local providers keep their own verbosity.
  - IncludeScopes and IncludeFormattedMessage are applied to OpenTelemetryLoggerOptions (more context per exported entry, more bytes ingested).
