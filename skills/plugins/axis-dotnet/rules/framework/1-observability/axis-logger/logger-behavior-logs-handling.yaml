id: logger-behavior-logs-handling
title: LoggingBehavior logs "Handling {RequestName}" before next() and nothing about the outcome
tier: framework
family: 1-observability
package: AxisLogger
concern: package-mechanics
layer: application
lens: [observability]
severity: should
status: canonical
description: >
  Both LoggingBehavior<TRequest> and LoggingBehavior<TRequest, TResponse> do exactly one thing before
  delegating: LogInformation($"Handling {requestName}.", ("RequestName", requestName)), then await next().
  They do NOT wrap next() in try/catch, do NOT log the outcome and do NOT time anything — pair with LogResult
  (manual or your own behaviour) for the outcome side of the request.
invariants:
  - Each LoggingBehavior variant logs "Handling {RequestName}." at Information with a RequestName property, using typeof(TRequest).Name.
  - The behaviour logs before calling next() and then just awaits it; it adds no try/catch, no outcome log and no timing.
reference:
  kind: framework-source
  at:
