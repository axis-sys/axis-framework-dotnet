notes: >
  Named methods over a generic Log(level, ...) is the same design choice AxisFailureLogSeverity /
  AxisSuccessLogSeverity make for the LogIf* extensions (see logger-result-log-if): keep IAxisLogger
  decoupled from MEL's LogLevel and make illegal severities unrepresentable.
