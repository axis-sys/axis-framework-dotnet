notes: >
  Transient open generics let the mediator materialise one behaviour instance per request type. Registering
  TimeProvider.System here is also what makes a bare AddAxisLogger() + AddLoggingBehavior() pair resolvable —
  see the TimeProvider gotcha in logger-registration-scoped.
